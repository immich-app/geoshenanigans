name: Update TIGER Address Data

on:
  schedule:
    - cron: '23 4 1 3 *'  # Annually on March 1 at 4:23 UTC (after Census Bureau releases ~Feb)
  workflow_dispatch:

env:
  S3_BUCKET: geoshenanigans-reverse-geocoding
  S3_ENDPOINT: https://t3.storage.dev

permissions:
  contents: read

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq aria2
          curl -sL "https://github.com/peak/s5cmd/releases/download/v2.3.0/s5cmd_2.3.0_Linux-64bit.tar.gz" \
            -o /tmp/s5cmd.tar.gz
          sudo tar xzf /tmp/s5cmd.tar.gz -C /usr/local/bin s5cmd

      - name: Configure credentials
        run: |
          echo "::add-mask::$AWS_ACCESS_KEY_ID"
          echo "::add-mask::$AWS_SECRET_ACCESS_KEY"
          echo "AWS_ACCESS_KEY_ID=$KEY" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$SECRET" >> "$GITHUB_ENV"
        env:
          KEY: ${{ secrets.TIGRIS_WRITE_KEY_ID }}
          SECRET: ${{ secrets.TIGRIS_WRITE_ACCESS_KEY }}

      - name: Download preprocessed TIGER data
        run: |
          # Use OpenCage's preprocessed TIGER data (much smaller than raw shapefiles)
          # Try latest year first, fall back to previous
          for YEAR in 2025 2024 2023; do
            URL="https://downloads.opencagedata.com/public/tiger${YEAR}-nominatim-preprocessed.csv.tar.gz"
            echo "Trying $URL..."
            STATUS=$(curl -sI "$URL" 2>/dev/null | head -1 | awk '{print $2}')
            if [ "$STATUS" = "200" ]; then
              echo "Found TIGER $YEAR data"
              echo "TIGER_YEAR=$YEAR" >> "$GITHUB_ENV"
              echo "Downloading..."
              aria2c -x 16 -s 16 -d /tmp -o tiger-data.tar.gz "$URL"
              echo "Downloaded: $(stat -c%s /tmp/tiger-data.tar.gz) bytes"
              break
            fi
          done

          if [ ! -f /tmp/tiger-data.tar.gz ]; then
            echo "::error::No preprocessed TIGER data found"
            exit 1
          fi

      - name: Extract and upload
        run: |
          echo "Extracting..."
          mkdir -p /tmp/tiger-csv
          tar xzf /tmp/tiger-data.tar.gz -C /tmp/tiger-csv
          CSV_COUNT=$(ls /tmp/tiger-csv/*.csv 2>/dev/null | wc -l)
          echo "$CSV_COUNT CSV files extracted"

          # Upload to Tigris
          S5="s5cmd --endpoint-url $S3_ENDPOINT --retry-count 5"
          echo "Uploading to Tigris..."
          tar czf /tmp/tiger-processed.tar.gz -C /tmp/tiger-csv .
          $S5 cp /tmp/tiger-processed.tar.gz "s3://$S3_BUCKET/geocoder/tiger/$TIGER_YEAR/tiger-nominatim-preprocessed.csv.tar.gz"

          # Update latest.json
          jq -n \
            --arg year "$TIGER_YEAR" \
            --arg updated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson csv_count "$CSV_COUNT" \
            '{year: $year, csv_count: $csv_count, updated_at: $updated_at}' \
            | $S5 pipe "s3://$S3_BUCKET/geocoder/tiger/latest.json"

          echo "Uploaded to s3://$S3_BUCKET/geocoder/tiger/$TIGER_YEAR/"
          $S5 cat "s3://$S3_BUCKET/geocoder/tiger/latest.json" | jq .

      - name: Summary
        if: always()
        run: |
          echo "## TIGER Data Update" >> "$GITHUB_STEP_SUMMARY"
          echo "- Year: ${TIGER_YEAR:-unknown}" >> "$GITHUB_STEP_SUMMARY"
          if [ -d /tmp/tiger-csv ]; then
            echo "- CSV files: $(ls /tmp/tiger-csv/*.csv 2>/dev/null | wc -l)" >> "$GITHUB_STEP_SUMMARY"
          fi
