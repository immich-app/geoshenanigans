name: Build Geocoder Index

concurrency:
  group: geocoder-build
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      build_date:
        description: 'Build a specific date (YYYY-MM-DD). Leave empty for today.'
        required: false
        type: string
      runner:
        description: 'Runner label'
        required: false
        type: string
        default: 'pokedex-giant'
      force_fresh:
        description: 'Ignore previous build and build fresh (no patch)'
        required: false
        type: boolean
        default: false

env:
  S3_BUCKET: geoshenanigans-reverse-geocoding
  S3_PREFIX: geocoder
  S3_ENDPOINT: https://t3.storage.dev
  S3_PUBLIC_URL: https://geoshenanigans-reverse-geocoding.t3.tigrisfiles.io

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ inputs.runner || 'pokedex-giant' }}
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # ── Setup ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake g++ libz-dev libzstd-dev \
            libbz2-dev libexpat1-dev libs2-dev libosmium2-dev aria2 jq osmium-tool
          curl -sL "https://github.com/peak/s5cmd/releases/download/v2.3.0/s5cmd_2.3.0_Linux-64bit.tar.gz" \
            -o /tmp/s5cmd.tar.gz
          sudo tar xzf /tmp/s5cmd.tar.gz -C /usr/local/bin s5cmd

      - name: Configure credentials
        run: |
          echo "::add-mask::$AWS_ACCESS_KEY_ID"
          echo "::add-mask::$AWS_SECRET_ACCESS_KEY"
          echo "CACHE_AWS_KEY=$AWS_ACCESS_KEY_ID" >> "$GITHUB_ENV"
          echo "CACHE_AWS_SECRET=$AWS_SECRET_ACCESS_KEY" >> "$GITHUB_ENV"
          echo "AWS_ACCESS_KEY_ID=$KEY" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$SECRET" >> "$GITHUB_ENV"
        env:
          KEY: ${{ secrets.TIGRIS_WRITE_KEY_ID }}
          SECRET: ${{ secrets.TIGRIS_WRITE_ACCESS_KEY }}

      - name: Build tools
        run: |
          cd geocoder/builder && mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc) build-index geocoder-diff geocoder-patch
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Setup
        id: setup
        env:
          BUILD_DATE: ${{ inputs.build_date }}
          FORCE_FRESH: ${{ inputs.force_fresh }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          # Workdir + cache config
          WORKDIR="$RUNNER_TEMP/geocoder"
          mkdir -p "$WORKDIR"
          echo "workdir=$WORKDIR" >> "$GITHUB_OUTPUT"
          echo "cache_endpoint=http://${BUCKET_HOST}:${BUCKET_PORT}" >> "$GITHUB_OUTPUT"
          echo "cache_bucket=$BUCKET_NAME" >> "$GITHUB_OUTPUT"

          # Determine target date + sequence
          SERVER="https://planet.openstreetmap.org/replication/day"
          CURRENT_SEQ=$(curl -sL "$SERVER/state.txt" | grep sequenceNumber | cut -d= -f2)
          CURRENT_DATE=$(curl -sL "$SERVER/state.txt" | grep timestamp | cut -d= -f2 | tr '\\' ' ' | cut -dT -f1 | tr -d ' ')

          TARGET_DATE="${BUILD_DATE:-$CURRENT_DATE}"
          PREV_DATE=$(date -u -d "$TARGET_DATE - 1 day" +%Y-%m-%d)
          DAYS_OFFSET=$(( ($(date -u -d "$CURRENT_DATE" +%s) - $(date -u -d "$TARGET_DATE" +%s)) / 86400 ))
          TARGET_SEQ=$((CURRENT_SEQ - DAYS_OFFSET))

          echo "today=$TARGET_DATE" >> "$GITHUB_OUTPUT"
          echo "yesterday=$PREV_DATE" >> "$GITHUB_OUTPUT"
          echo "today_seq=$TARGET_SEQ" >> "$GITHUB_OUTPUT"

          echo "Build date: $TARGET_DATE (seq $TARGET_SEQ)"
          echo "Previous:   $PREV_DATE"
          echo "Server:     $CURRENT_DATE (seq $CURRENT_SEQ, offset: -${DAYS_OFFSET}d)"

          # Check if previous build exists on Tigris with compatible build_version
          EXPECTED_BUILD_VERSION=8
          PREV_BUILD="s3://$S3_BUCKET/$S3_PREFIX/builds/$PREV_DATE"
          if [ "$FORCE_FRESH" = "true" ]; then
            echo "has_previous=false" >> "$GITHUB_OUTPUT"
            echo "force_fresh=true requested — building fresh (ignoring $PREV_DATE)"
          elif s5cmd --endpoint-url $S3_ENDPOINT ls "$PREV_BUILD/" 2>/dev/null | head -1 | grep -q .; then
            # Check build_version in previous manifest
            PREV_VERSION=$(s5cmd --endpoint-url $S3_ENDPOINT cat "$PREV_BUILD/manifest.json" 2>/dev/null \
              | jq -r '.build_version // 0' 2>/dev/null || echo 0)
            if [ "$PREV_VERSION" = "$EXPECTED_BUILD_VERSION" ]; then
              echo "has_previous=true" >> "$GITHUB_OUTPUT"
              echo "Previous build ($PREV_DATE) found, build_version=$PREV_VERSION — compatible"
            else
              echo "has_previous=false" >> "$GITHUB_OUTPUT"
              echo "Previous build ($PREV_DATE) found but build_version=$PREV_VERSION (expected $EXPECTED_BUILD_VERSION) — incompatible, building fresh"
            fi
          else
            echo "has_previous=false" >> "$GITHUB_OUTPUT"
            echo "No previous build ($PREV_DATE) — building fresh"
          fi

      # ── Download PBF + previous indexes (parallel) ─────────────────
      - name: Download PBF and previous indexes
        id: download
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          CACHE_ENDPOINT: ${{ steps.setup.outputs.cache_endpoint }}
          CACHE_BUCKET: ${{ steps.setup.outputs.cache_bucket }}
          YESTERDAY: ${{ steps.setup.outputs.yesterday }}
          TODAY: ${{ steps.setup.outputs.today }}
          HAS_PREVIOUS: ${{ steps.setup.outputs.has_previous }}
        run: |
          CACHE="env AWS_ACCESS_KEY_ID=$CACHE_AWS_KEY AWS_SECRET_ACCESS_KEY=$CACHE_AWS_SECRET s5cmd --endpoint-url $CACHE_ENDPOINT --retry-count 5 --numworkers 15"
          S5="s5cmd --endpoint-url $S3_ENDPOINT --retry-count 5 --numworkers 32"
          STEP_START=$(date +%s)

          # Retry wrapper: retries a command up to N times with backoff
          retry() {
            local max_attempts=${1:-3}; shift
            local attempt=1
            while [ $attempt -le $max_attempts ]; do
              if "$@"; then return 0; fi
              echo "  Attempt $attempt/$max_attempts failed, retrying in ${attempt}0s..."
              sleep $((attempt * 10))
              attempt=$((attempt + 1))
            done
            echo "  All $max_attempts attempts failed"
            return 1
          }

          # Cache check: returns 0 if path exists, with retries for transient failures
          cache_exists() {
            local pattern="$1"
            local check="$2"
            for i in 1 2 3; do
              if $CACHE ls "$pattern" 2>/dev/null | grep -q "$check"; then return 0; fi
              [ $i -lt 3 ] && sleep $((i * 5))
            done
            return 1
          }

          # ── Background: download previous indexes ──
          if [ "$HAS_PREVIOUS" = "true" ]; then
            (
              START=$(date +%s)
              CACHE_BUILD="s3://$CACHE_BUCKET/geocoder-cache/builds/$YESTERDAY"

              if cache_exists "$CACHE_BUILD/.cache-complete" ".cache-complete"; then
                echo "[indexes] Downloading $YESTERDAY from local cache..."
                if ! retry 3 $CACHE cp --concurrency 16 "$CACHE_BUILD/*" "$WORKDIR/old-output/"; then
                  echo "[indexes] Cache download failed — falling back to Tigris..."
                  rm -rf "$WORKDIR/old-output"
                  $S5 cp --concurrency 8 "s3://$S3_BUCKET/$S3_PREFIX/builds/$YESTERDAY/*" "$WORKDIR/old-output/"
                fi
              else
                echo "[indexes] Cache miss — downloading $YESTERDAY via Tigris S3..."
                $S5 cp --concurrency 8 "s3://$S3_BUCKET/$S3_PREFIX/builds/$YESTERDAY/*" "$WORKDIR/old-output/"

                echo "[indexes] Backfilling local cache..."
                $CACHE cp --concurrency 16 "$WORKDIR/old-output/*" "$CACHE_BUILD/" 2>/dev/null || true
              fi

              COUNT=$(find "$WORKDIR/old-output" -type f | wc -l)
              SIZE=$(du -sb "$WORKDIR/old-output" | cut -f1)
              ELAPSED=$(($(date +%s) - START))
              echo "[indexes] Done: $COUNT files ($((SIZE/1024/1024)) MiB) in ${ELAPSED}s ($((SIZE/1024/1024/(ELAPSED+1))) MB/s)"
              if [ "$COUNT" -eq 0 ]; then echo "::error::Download produced 0 files"; exit 1; fi

              # Decompress .bin.zst files in place — geocoder-diff operates on raw bytes.
              # Uses all cores with one file at a time (zstd -T0).
              DECOMP_START=$(date +%s)
              ZST_COUNT=$(find "$WORKDIR/old-output" -name "*.bin.zst" | wc -l)
              if [ "$ZST_COUNT" -gt 0 ]; then
                echo "[indexes] Decompressing $ZST_COUNT .bin.zst files..."
                find "$WORKDIR/old-output" -name "*.bin.zst" -print0 \
                  | xargs -0 -n1 -P4 zstd -d -T0 --rm --quiet
                echo "[indexes] Decompressed in $(($(date +%s) - DECOMP_START))s"
              fi
            ) &
            IDX_PID=$!
          fi

          # ── Foreground: download PBF ──
          download_pbf_from_cache() {
            local SRC="$1" DEST="$2" LABEL="$3"
            echo "[pbf] Downloading $LABEL from cache..."
            START=$(date +%s)
            if retry 3 $CACHE cp --concurrency 16 "$SRC" "$DEST"; then
              SIZE=$(stat -c%s "$DEST")
              ELAPSED=$(($(date +%s) - START))
              echo "[pbf] Done: $((SIZE/1024/1024)) MiB in ${ELAPSED}s ($((SIZE/1024/1024/(ELAPSED+1))) MB/s)"
              return 0
            fi
            echo "[pbf] Cache download failed after retries"
            rm -f "$DEST"
            return 1
          }

          if cache_exists "s3://$CACHE_BUCKET/geocoder-cache/planet-${TODAY}.osm.pbf" "planet-"; then
            if download_pbf_from_cache \
                "s3://$CACHE_BUCKET/geocoder-cache/planet-${TODAY}.osm.pbf" \
                "$WORKDIR/planet.osm.pbf" "today's PBF ($TODAY)"; then
              echo "pbf_source=today" >> "$GITHUB_OUTPUT"
            else
              echo "[pbf] Falling back to yesterday's PBF..."
              # Fall through to next check
              :
            fi
          fi

          if [ ! -f "$WORKDIR/planet.osm.pbf" ] && \
             cache_exists "s3://$CACHE_BUCKET/geocoder-cache/planet-${YESTERDAY}.osm.pbf" "planet-"; then
            if download_pbf_from_cache \
                "s3://$CACHE_BUCKET/geocoder-cache/planet-${YESTERDAY}.osm.pbf" \
                "$WORKDIR/planet.osm.pbf" "yesterday's PBF ($YESTERDAY)"; then
              echo "pbf_source=yesterday" >> "$GITHUB_OUTPUT"
            fi
          fi

          if [ ! -f "$WORKDIR/planet.osm.pbf" ]; then
            echo "[pbf] No cached PBF available — downloading from mirrors..."
            aria2c -x 16 -s 16 -j 16 --max-tries=3 \
              -d "$WORKDIR" -o planet.osm.pbf \
              "https://planet.openstreetmap.org/pbf/planet-latest.osm.pbf" \
              || true
            SIZE=$(stat -c%s "$WORKDIR/planet.osm.pbf")
            echo "[pbf] Done: $((SIZE/1024/1024)) MiB"
            echo "pbf_source=mirror" >> "$GITHUB_OUTPUT"
          fi

          # Download wikidata sitelinks (if available)
          echo "[wikidata] Checking for sitelinks data..."
          WIKIDATA_LATEST=$(curl -sL "$S3_PUBLIC_URL/geocoder/wikidata/latest.json" 2>/dev/null)
          WD_DATE=$(echo "$WIKIDATA_LATEST" | jq -r '.dump_date // ""' 2>/dev/null)
          if [ -n "$WD_DATE" ]; then
            echo "[wikidata] Found sitelinks from $WD_DATE, downloading..."
            curl -sL -o "$WORKDIR/qid_sitelinks.bin" \
              "$S3_PUBLIC_URL/geocoder/wikidata/$WD_DATE/qid_sitelinks.bin" || true
            if [ -f "$WORKDIR/qid_sitelinks.bin" ] && [ "$(stat -c%s "$WORKDIR/qid_sitelinks.bin")" -gt 1000 ]; then
              echo "[wikidata] Downloaded: $(( $(stat -c%s "$WORKDIR/qid_sitelinks.bin") / 6 )) entries"
              echo "wikidata_sitelinks=$WORKDIR/qid_sitelinks.bin" >> "$GITHUB_OUTPUT"
              echo "wikidata_date=$WD_DATE" >> "$GITHUB_OUTPUT"
            else
              echo "[wikidata] Download failed or empty, skipping"
              rm -f "$WORKDIR/qid_sitelinks.bin"
            fi
          else
            echo "[wikidata] No sitelinks data available"
          fi

          # Download GeoNames postcode data (4.3M postcodes from ~100 countries)
          echo "[geonames] Downloading GeoNames postcode data..."
          GEONAMES_FILE="$WORKDIR/postcode_centroids_external.csv.gz"
          python3 -c "
          import zipfile, io, gzip, urllib.request, os, tempfile
          entries = {}
          tmpdir = tempfile.mkdtemp()
          for url, cc_filter in [
              ('https://download.geonames.org/export/zip/allCountries.zip', None),
              ('https://download.geonames.org/export/zip/GB_full.csv.zip', 'GB'),
              ('https://download.geonames.org/export/zip/CA_full.csv.zip', 'CA'),
              ('https://download.geonames.org/export/zip/NL_full.csv.zip', 'NL'),
          ]:
              zpath = os.path.join(tmpdir, os.path.basename(url))
              try:
                  urllib.request.urlretrieve(url, zpath)
                  with zipfile.ZipFile(zpath) as z:
                      with z.open(z.namelist()[0]) as f:
                          for line in io.TextIOWrapper(f, encoding='utf-8', errors='replace'):
                              parts = line.strip().split('\t')
                              if len(parts) < 11: continue
                              cc, pc, lat, lng = parts[0], parts[1], parts[9], parts[10]
                              if cc_filter and cc != cc_filter: continue
                              try:
                                  lat_f, lng_f = float(lat), float(lng)
                                  if lat_f == 0 and lng_f == 0: continue
                                  entries[(cc, pc)] = (lat_f, lng_f)
                              except: pass
              except Exception as e:
                  print(f'  Warning: {url}: {e}')
          with gzip.open('$GEONAMES_FILE', 'wt') as f:
              f.write('postcode,lat,lon,country_code\n')
              for (cc, pc), (lat, lng) in sorted(entries.items()):
                  f.write(f'{pc},{lat},{lng},{cc}\n')
          print(f'[geonames] {len(entries)} postcodes, {os.path.getsize(\"$GEONAMES_FILE\")//1024//1024} MiB')
          " 2>&1
          if [ -f "$GEONAMES_FILE" ] && [ "$(stat -c%s "$GEONAMES_FILE")" -gt 1000 ]; then
            echo "postcode_centroids_external=$GEONAMES_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "[geonames] Download failed, skipping"
          fi

          # Download TIGER data (if available)
          echo "[tiger] Checking for TIGER address data..."
          TIGER_LATEST=$(curl -sL --fail "$S3_PUBLIC_URL/geocoder/tiger/latest.json" 2>/dev/null || echo '{}')
          TIGER_YEAR=$(echo "$TIGER_LATEST" | jq -r '.year // ""' 2>/dev/null || echo "")
          if [ -n "$TIGER_YEAR" ]; then
            echo "[tiger] Found TIGER $TIGER_YEAR data, downloading..."
            curl -sL -o "$WORKDIR/tiger-data.tar.gz" \
              "$S3_PUBLIC_URL/geocoder/tiger/$TIGER_YEAR/tiger-nominatim-preprocessed.csv.tar.gz" || true
            if [ -f "$WORKDIR/tiger-data.tar.gz" ] && [ "$(stat -c%s "$WORKDIR/tiger-data.tar.gz")" -gt 1000 ]; then
              echo "[tiger] Downloaded: $(( $(stat -c%s "$WORKDIR/tiger-data.tar.gz") / 1024 / 1024 )) MiB"
              echo "tiger_data=$WORKDIR/tiger-data.tar.gz" >> "$GITHUB_OUTPUT"
            else
              echo "[tiger] Download failed or empty, skipping"
              rm -f "$WORKDIR/tiger-data.tar.gz"
            fi
          else
            echo "[tiger] No TIGER data available"
          fi

          # Wait for index download
          if [ "$HAS_PREVIOUS" = "true" ]; then
            echo "Waiting for index download..."
            wait $IDX_PID
          fi
          echo "All downloads complete in $(($(date +%s) - STEP_START))s"

      # ── Apply replication diffs ───────────────────────────────────
      - name: Apply replication diffs
        if: steps.download.outputs.pbf_source != 'today'
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          TODAY: ${{ steps.setup.outputs.today }}
          TODAY_SEQ: ${{ steps.setup.outputs.today_seq }}
          PBF_SOURCE: ${{ steps.download.outputs.pbf_source }}
        run: |
          SERVER="https://planet.openstreetmap.org/replication/day"

          if [ "$PBF_SOURCE" = "yesterday" ]; then
            DIR1=$(printf "%03d" $((TODAY_SEQ / 1000000)))
            DIR2=$(printf "%03d" $(((TODAY_SEQ / 1000) % 1000)))
            FILE=$(printf "%03d" $((TODAY_SEQ % 1000)))
            echo "Downloading replication diff (seq $TODAY_SEQ)..."
            curl -sL -o "$WORKDIR/diff-today.osc.gz" \
              "$SERVER/$DIR1/$DIR2/${FILE}.osc.gz"
            DIFF_SIZE=$(stat -c%s "$WORKDIR/diff-today.osc.gz")
            echo "Diff: $((DIFF_SIZE/1024/1024)) MiB"

            echo "Applying diff with osmium apply-changes..."
            START=$(date +%s)
            osmium apply-changes "$WORKDIR/planet.osm.pbf" "$WORKDIR/diff-today.osc.gz" \
              -o "$WORKDIR/planet-tmp.osm.pbf" --overwrite
            echo "Applied in $(($(date +%s) - START))s"
            mv "$WORKDIR/planet-tmp.osm.pbf" "$WORKDIR/planet.osm.pbf"
            rm -f "$WORKDIR/diff-today.osc.gz"
          else
            # Mirror path — PBF may be a few days behind
            PBF_DATE=$(osmium fileinfo -g header.option.osmosis_replication_timestamp "$WORKDIR/planet.osm.pbf" 2>/dev/null | cut -dT -f1)
            DAYS_NEEDED=$(( ($(date -u -d "$TODAY" +%s) - $(date -u -d "$PBF_DATE" +%s)) / 86400 ))
            PBF_SEQ=$((TODAY_SEQ - DAYS_NEEDED))
            echo "PBF date=$PBF_DATE seq=$PBF_SEQ, need $DAYS_NEEDED diffs"

            if [ $DAYS_NEEDED -gt 0 ]; then
              DIFFS=""
              for S in $(seq $((PBF_SEQ + 1)) $TODAY_SEQ); do
                DIR1=$(printf "%03d" $((S / 1000000)))
                DIR2=$(printf "%03d" $(((S / 1000) % 1000)))
                FILE=$(printf "%03d" $((S % 1000)))
                curl -sL -o "$WORKDIR/diff-${S}.osc.gz" "$SERVER/$DIR1/$DIR2/${FILE}.osc.gz"
                DIFFS="$DIFFS $WORKDIR/diff-${S}.osc.gz"
              done
              echo "Applying $DAYS_NEEDED diffs..."
              START=$(date +%s)
              osmium apply-changes "$WORKDIR/planet.osm.pbf" $DIFFS \
                -o "$WORKDIR/planet-tmp.osm.pbf" --overwrite
              echo "Applied in $(($(date +%s) - START))s"
              mv "$WORKDIR/planet-tmp.osm.pbf" "$WORKDIR/planet.osm.pbf"
              rm -f $DIFFS
            fi
          fi

      # ── Build index ────────────────────────────────────────────────
      - name: Build geocoder index
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          CACHE_ENDPOINT: ${{ steps.setup.outputs.cache_endpoint }}
          CACHE_BUCKET: ${{ steps.setup.outputs.cache_bucket }}
          TODAY: ${{ steps.setup.outputs.today }}
          PBF_SOURCE: ${{ steps.download.outputs.pbf_source }}
        run: |
          CACHE="env AWS_ACCESS_KEY_ID=$CACHE_AWS_KEY AWS_SECRET_ACCESS_KEY=$CACHE_AWS_SECRET s5cmd --endpoint-url $CACHE_ENDPOINT --retry-count 5 --numworkers 15"

          # Cache the up-to-date PBF in background (skip if today's was already cached)
          if [ "$PBF_SOURCE" != "today" ]; then
            echo "Caching today's PBF in background..."
            $CACHE cp --concurrency 16 "$WORKDIR/planet.osm.pbf" \
              "s3://$CACHE_BUCKET/geocoder-cache/planet-${TODAY}.osm.pbf" &
          fi

          # Build args
          BUILD_ARGS="--continents --multi-output --multi-quality"
          WIKIDATA_FILE="${{ steps.download.outputs.wikidata_sitelinks }}"
          if [ -n "$WIKIDATA_FILE" ] && [ -f "$WIKIDATA_FILE" ]; then
            BUILD_ARGS="$BUILD_ARGS --wikidata-sitelinks $WIKIDATA_FILE"
            echo "Using wikidata sitelinks from ${{ steps.download.outputs.wikidata_date }}"
          fi
          TIGER_FILE="${{ steps.download.outputs.tiger_data }}"
          if [ -n "$TIGER_FILE" ] && [ -f "$TIGER_FILE" ]; then
            BUILD_ARGS="$BUILD_ARGS --tiger-data $TIGER_FILE"
            echo "Using TIGER address data"
          fi
          GEONAMES_FILE="${{ steps.download.outputs.postcode_centroids_external }}"
          if [ -n "$GEONAMES_FILE" ] && [ -f "$GEONAMES_FILE" ]; then
            BUILD_ARGS="$BUILD_ARGS --external-postcodes $GEONAMES_FILE"
            echo "Using GeoNames postcode data"
          fi

          echo "Building geocoder index for $TODAY..."
          START=$(date +%s)
          # Tee the full log to a file so continent warnings etc. aren't lost,
          # while still streaming the tail to the step output for quick glance.
          build-index "$WORKDIR/output/" "$WORKDIR/planet.osm.pbf" \
            $BUILD_ARGS 2>&1 | tee "$WORKDIR/build.log" | tail -30
          echo "Build completed in $(($(date +%s) - START))s"
          echo "Build log kept at $WORKDIR/build.log ($(wc -l < "$WORKDIR/build.log") lines)"
          echo "$(find "$WORKDIR/output" -name "*.bin" | wc -l) bin files produced"

          # Wait for background PBF cache upload, then free disk
          wait
          rm -f "$WORKDIR/planet.osm.pbf"

      # ── Generate patches + verify ─────────────────────────────────
      - name: Generate patches and verify
        if: steps.setup.outputs.has_previous == 'true'
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          CACHE_ENDPOINT: ${{ steps.setup.outputs.cache_endpoint }}
          CACHE_BUCKET: ${{ steps.setup.outputs.cache_bucket }}
          OLD_DATE: ${{ steps.setup.outputs.yesterday }}
          NEW_DATE: ${{ steps.setup.outputs.today }}
        run: |
          S5="s5cmd --endpoint-url $S3_ENDPOINT --retry-count 5 --numworkers 32"
          CACHE="env AWS_ACCESS_KEY_ID=$CACHE_AWS_KEY AWS_SECRET_ACCESS_KEY=$CACHE_AWS_SECRET s5cmd --endpoint-url $CACHE_ENDPOINT --retry-count 5 --numworkers 15"

          # Patch generation runs against uncompressed .bin files (old was
          # decompressed during download, new was just built). Compression
          # happens in the next step, before the finalize upload.
          echo "Generating patches ($OLD_DATE → $NEW_DATE)..."
          START=$(date +%s)

          echo "## Patch Results ($OLD_DATE → $NEW_DATE)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Variant | Files | Patch Size | Verified |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|-----------|----------|" >> "$GITHUB_STEP_SUMMARY"

          RESULTS_DIR="$WORKDIR/results"
          mkdir -p "$RESULTS_DIR"
          VARIANTS=$(cd "$WORKDIR/output" && find . -name "*.bin" -exec dirname {} \; | sort -u | sed 's|^\./||')

          # Generate patch, verify, and place patch.gcpatch alongside the .bin files
          JOBS=0
          MAX_JOBS=$(nproc)
          for variant in $VARIANTS; do
            (
              NEW_DIR="$WORKDIR/output/$variant"
              OLD_DIR="$WORKDIR/old-output/$variant"
              N_NEW=$(ls "$NEW_DIR"/*.bin 2>/dev/null | wc -l)
              N_OLD=$(ls "$OLD_DIR"/*.bin 2>/dev/null | wc -l)
              SAFE=$(echo "$variant" | tr '/' '_')

              [ "$N_NEW" -lt 2 ] && exit 0
              if [ "$N_OLD" -ne "$N_NEW" ]; then
                echo "SKIP" > "$RESULTS_DIR/$SAFE"
                exit 0
              fi

              # Generate patch into the output directory (colocated with .bin files)
              PATCH_FILE="$NEW_DIR/patch.gcpatch"
              geocoder-diff "$OLD_DIR" "$NEW_DIR" -o "$PATCH_FILE" 2>/dev/null
              PATCH_KB=$(( $(stat -c%s "$PATCH_FILE" 2>/dev/null || echo 0) / 1024 ))

              # Verify
              VERIFY_DIR="$WORKDIR/verify-$SAFE"
              mkdir -p "$VERIFY_DIR"
              geocoder-patch "$OLD_DIR" "$PATCH_FILE" -o "$VERIFY_DIR/" 2>/dev/null

              MATCH=0
              for f in "$NEW_DIR"/*.bin; do
                b=$(basename "$f")
                cmp -s "$VERIFY_DIR/$b" "$NEW_DIR/$b" && MATCH=$((MATCH + 1))
              done
              rm -rf "$VERIFY_DIR"

              if [ $MATCH -eq $N_NEW ]; then
                echo "PASS $N_NEW $PATCH_KB" > "$RESULTS_DIR/$SAFE"
              else
                echo "FAIL $MATCH $N_NEW $PATCH_KB" > "$RESULTS_DIR/$SAFE"
              fi
            ) &

            JOBS=$((JOBS + 1))
            if [ $JOBS -ge $MAX_JOBS ]; then
              wait -n 2>/dev/null || true
              JOBS=$((JOBS - 1))
            fi
          done
          wait
          echo "Patch generation + verification completed in $(($(date +%s) - START))s"

          # Collect results
          PASS=0; FAIL=0; SKIP=0
          for variant in $VARIANTS; do
            SAFE=$(echo "$variant" | tr '/' '_')
            [ ! -f "$RESULTS_DIR/$SAFE" ] && continue
            RESULT=$(cat "$RESULTS_DIR/$SAFE")

            if [ "$RESULT" = "SKIP" ]; then
              SKIP=$((SKIP + 1))
            elif echo "$RESULT" | grep -q "^PASS"; then
              N=$(echo "$RESULT" | awk '{print $2}')
              KB=$(echo "$RESULT" | awk '{print $3}')
              echo "  $variant: PASS ($N/$N, ${KB} KiB)"
              echo "| $variant | $N | ${KB} KiB | PASS |" >> "$GITHUB_STEP_SUMMARY"
              PASS=$((PASS + 1))
            else
              M=$(echo "$RESULT" | awk '{print $2}')
              N=$(echo "$RESULT" | awk '{print $3}')
              KB=$(echo "$RESULT" | awk '{print $4}')
              echo "::error::$variant: FAIL ($M/$N)"
              echo "| $variant | $N | ${KB} KiB | **FAIL** |" >> "$GITHUB_STEP_SUMMARY"
              FAIL=$((FAIL + 1))
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total: $PASS pass, $FAIL fail, $SKIP skip**" >> "$GITHUB_STEP_SUMMARY"
          echo "Results: $PASS pass, $FAIL fail, $SKIP skip"

          # Patches stay in $WORKDIR/output/*.gcpatch — uploaded alongside
          # compressed .bin.zst files in the Finalize step below.

          [ $FAIL -gt 0 ] && exit 1 || true

      # ── Compress .bin files + rewrite manifest with per-file sizes ─
      - name: Compress index files
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
        run: |
          COMPRESS_START=$(date +%s)
          BIN_COUNT=$(find "$WORKDIR/output" -name "*.bin" | wc -l)
          NPROC=$(nproc)
          # Strategy: many parallel zstd processes, each effectively
          # single-threaded for small files (zstd's internal ZSTDMT only
          # splits files larger than its window — 128 MB at level 22 —
          # so small files always run on 1 core regardless of -T0).
          # With most of our 769 output files under 128 MB, we need
          # ~NPROC parallel processes to saturate all cores. The few
          # large files (geo_cells.bin, addr_points.bin) still benefit
          # from zstd's internal MT via -T0, because the outer worker
          # pool gets scheduled by the OS alongside them.
          #
          # Largest-first scheduling (in the python below) ensures the
          # biggest files start immediately and overlap with many small
          # files finishing on other workers. Cap at a reasonable max so
          # we don't thrash on smaller runners.
          WORKERS=$(( NPROC / 2 ))
          [ "$WORKERS" -lt 1 ] && WORKERS=1
          [ "$WORKERS" -gt 48 ] && WORKERS=48
          echo "Compressing $BIN_COUNT .bin files with zstd --ultra -22 --long=27 -T0 ($WORKERS parallel workers, $NPROC-thread runner)..."

          WORKERS=$WORKERS python3 - <<'PY'
          import json, os, subprocess, hashlib
          from concurrent.futures import ProcessPoolExecutor, as_completed

          out = os.environ["WORKDIR"] + "/output"
          mpath = f"{out}/manifest.json"
          with open(mpath) as f:
              m = json.load(f)

          bin_files = []
          for root, _, fs in os.walk(out):
              for name in fs:
                  if name.endswith(".bin"):
                      bin_files.append(os.path.join(root, name))
          # Largest-first scheduling minimizes tail latency.
          bin_files.sort(key=lambda p: -os.path.getsize(p))

          def process(full):
              h = hashlib.sha256()
              with open(full, "rb") as f:
                  for chunk in iter(lambda: f.read(1 << 20), b""):
                      h.update(chunk)
              raw_size = os.path.getsize(full)
              # Maximum compression:
              #   --ultra -22   level 22 (max zstd offers)
              #   --long=27     128 MB long-range window (better ratio for
              #                 repetitive structured binary data)
              #   -T0           use every core in the system for this file —
              #                 zstd's internal multithreading. Combined with
              #                 a small number of parallel workers, this fills
              #                 80-thread runners without oversubscribing.
              subprocess.run(
                  ["zstd", "--ultra", "-22", "--long=27", "-T0", "--quiet", full],
                  check=True,
              )
              zst = full + ".zst"
              comp_size = os.path.getsize(zst)
              os.remove(full)
              return {
                  "path": os.path.relpath(full, out),
                  "raw_size": raw_size,
                  "compressed_size": comp_size,
                  "sha256": h.hexdigest(),
              }

          files = []
          total_raw = 0
          total_comp = 0
          workers = int(os.environ.get("WORKERS", "1"))
          with ProcessPoolExecutor(max_workers=workers) as ex:
              futures = {ex.submit(process, f): f for f in bin_files}
              for fut in as_completed(futures):
                  entry = fut.result()
                  files.append(entry)
                  total_raw += entry["raw_size"]
                  total_comp += entry["compressed_size"]
                  pct = 100 * entry["compressed_size"] / entry["raw_size"] if entry["raw_size"] else 0
                  print(f"  {entry['path']}: {entry['raw_size']/1e6:.0f} → {entry['compressed_size']/1e6:.0f} MiB ({pct:.0f}%)", flush=True)

          files.sort(key=lambda x: x["path"])
          m["files"] = files
          with open(mpath, "w") as f:
              json.dump(m, f, indent=2)

          if total_raw:
              ratio = 100 * total_comp / total_raw
              print(f"Total: {total_raw/1e9:.2f} GB raw → {total_comp/1e9:.2f} GB compressed ({ratio:.0f}%)")
          PY

          echo "Compression done in $(($(date +%s) - COMPRESS_START))s"
          ZST_COUNT=$(find "$WORKDIR/output" -name "*.bin.zst" | wc -l)
          echo "$ZST_COUNT .bin.zst files produced"

      # ── Finalize upload + manifest ──────────────────────────────────
      - name: Finalize upload and manifest
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          CACHE_ENDPOINT: ${{ steps.setup.outputs.cache_endpoint }}
          CACHE_BUCKET: ${{ steps.setup.outputs.cache_bucket }}
          NEW_DATE: ${{ steps.setup.outputs.today }}
          OLD_DATE: ${{ steps.setup.outputs.yesterday }}
          HAS_PREVIOUS: ${{ steps.setup.outputs.has_previous }}
        run: |
          S5="s5cmd --endpoint-url $S3_ENDPOINT --retry-count 5 --numworkers 32"
          CACHE="env AWS_ACCESS_KEY_ID=$CACHE_AWS_KEY AWS_SECRET_ACCESS_KEY=$CACHE_AWS_SECRET s5cmd --endpoint-url $CACHE_ENDPOINT --retry-count 5 --numworkers 15"

          # Clear stale files from prior builds at this date, then upload
          # compressed .bin.zst + patches + json in one shot. Tigris
          # occasionally fails multipart uploads under concurrency — the
          # verify loop below re-uploads anything missing.
          echo "Clearing stale files at s3://$S3_BUCKET/$S3_PREFIX/builds/$NEW_DATE/..."
          $S5 rm "s3://$S3_BUCKET/$S3_PREFIX/builds/$NEW_DATE/*" 2>/dev/null || true

          echo "Uploading .bin.zst + patches to Tigris..."
          UPLOAD_START=$(date +%s)
          s5cmd --endpoint-url $S3_ENDPOINT --retry-count 10 --numworkers 4 cp --concurrency 8 \
            "$WORKDIR/output/*" "s3://$S3_BUCKET/$S3_PREFIX/builds/$NEW_DATE/" || \
            echo "::warning::Some files failed on first pass — verify loop will retry"
          echo "Tigris upload first pass complete in $(($(date +%s) - UPLOAD_START))s"
          $CACHE cp --concurrency 16 \
            "$WORKDIR/output/*" "s3://$CACHE_BUCKET/geocoder-cache/builds/$NEW_DATE/" 2>/dev/null || true

          # ── Augment build tool's manifest.json with date/previous info ──
          PREV_VAL="$( [ "$HAS_PREVIOUS" = "true" ] && echo "$OLD_DATE" || echo "null" )"
          jq --arg date "$NEW_DATE" \
             --arg previous "$PREV_VAL" \
             --arg built_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
             --arg wikidata_date "${{ steps.download.outputs.wikidata_date || 'null' }}" \
             '. + {date: $date, previous: (if $previous == "null" then null else $previous end), built_at: $built_at, wikidata_date: (if $wikidata_date == "null" then null else $wikidata_date end)}' \
             "$WORKDIR/output/manifest.json" > "$WORKDIR/output/manifest.tmp" \
             && mv "$WORKDIR/output/manifest.tmp" "$WORKDIR/output/manifest.json"
          echo "Manifest size: $(stat -c%s "$WORKDIR/output/manifest.json") bytes"

          # Generate checksums — .bin.zst + .gcpatch + .json. Note that the
          # manifest.files[].sha256 field holds the RAW (pre-compression)
          # hashes for server-side verification after decompression, while
          # this checksums.sha256 holds the on-wire hashes (compressed).
          echo "Generating checksums..."
          (cd "$WORKDIR/output" && find . -type f \( -name "*.bin.zst" -o -name "*.gcpatch" -o -name "*.json" \) | sort | while read -r f; do
            sha256sum "$f"
          done) > "$WORKDIR/output/checksums.sha256"
          echo "$(wc -l < "$WORKDIR/output/checksums.sha256") file checksums generated"

          # Upload manifest + checksums (index files + patches already uploaded above)
          $S5 cp "$WORKDIR/output/manifest.json" "s3://$S3_BUCKET/$S3_PREFIX/builds/$NEW_DATE/manifest.json"
          $S5 cp "$WORKDIR/output/checksums.sha256" "s3://$S3_BUCKET/$S3_PREFIX/builds/$NEW_DATE/checksums.sha256"
          $CACHE cp "$WORKDIR/output/manifest.json" "s3://$CACHE_BUCKET/geocoder-cache/builds/$NEW_DATE/manifest.json" 2>/dev/null || true

          # Verify upload completeness — walk local files and re-upload any that
          # failed to land on Tigris. Use serial single-file uploads for the retry
          # so a concurrency race doesn't re-trigger the multipart issue.
          LOCAL_COUNT=$(find "$WORKDIR/output" -type f | wc -l)
          REMOTE_COUNT=$($S5 ls "s3://$S3_BUCKET/$S3_PREFIX/builds/$NEW_DATE/*" 2>/dev/null | wc -l)
          echo "Tigris: $REMOTE_COUNT/$LOCAL_COUNT files"

          # Build list of remote objects (as relative paths under NEW_DATE/)
          $S5 ls "s3://$S3_BUCKET/$S3_PREFIX/builds/$NEW_DATE/*" 2>/dev/null \
            | awk '{print $NF}' \
            | sed "s|^s3://$S3_BUCKET/$S3_PREFIX/builds/$NEW_DATE/||" \
            | sort > /tmp/remote.txt

          # List local files, strip the workdir prefix
          (cd "$WORKDIR/output" && find . -type f \( -name "*.bin.zst" -o -name "*.gcpatch" -o -name "*.json" -o -name "*.sha256" \)) \
            | sed 's|^\./||' | sort > /tmp/local.txt

          missing=$(comm -23 /tmp/local.txt /tmp/remote.txt)
          if [ -n "$missing" ]; then
            echo "::warning::Missing files — uploading individually:"
            echo "$missing"
            fail_count=0
            echo "$missing" | while IFS= read -r rel; do
              [ -z "$rel" ] && continue
              for attempt in 1 2 3 4 5; do
                if $S5 cp "$WORKDIR/output/$rel" "s3://$S3_BUCKET/$S3_PREFIX/builds/$NEW_DATE/$rel" 2>&1; then
                  break
                fi
                echo "  retry $attempt for $rel"
                sleep 5
              done
            done

            REMOTE_COUNT=$($S5 ls "s3://$S3_BUCKET/$S3_PREFIX/builds/$NEW_DATE/*" 2>/dev/null | wc -l)
            echo "Tigris after retry: $REMOTE_COUNT/$LOCAL_COUNT files"
            if [ "$REMOTE_COUNT" -lt "$LOCAL_COUNT" ]; then
              echo "::error::Tigris upload still incomplete: $REMOTE_COUNT/$LOCAL_COUNT"
              # Print which files are still missing so next run can diagnose
              $S5 ls "s3://$S3_BUCKET/$S3_PREFIX/builds/$NEW_DATE/*" 2>/dev/null \
                | awk '{print $NF}' \
                | sed "s|^s3://$S3_BUCKET/$S3_PREFIX/builds/$NEW_DATE/||" \
                | sort > /tmp/remote2.txt
              echo "Still missing:"
              comm -23 /tmp/local.txt /tmp/remote2.txt
              exit 1
            fi
          fi

          # Cache sentinel
          CACHE_COUNT=$($CACHE ls "s3://$CACHE_BUCKET/geocoder-cache/builds/$NEW_DATE/*" 2>/dev/null | wc -l)
          if [ "$CACHE_COUNT" -ge "$LOCAL_COUNT" ]; then
            echo "{\"date\":\"$NEW_DATE\",\"files\":$LOCAL_COUNT,\"cached_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
              | $CACHE pipe "s3://$CACHE_BUCKET/geocoder-cache/builds/$NEW_DATE/.cache-complete"
            echo "Cache sentinel written"
          else
            echo "::warning::Cache incomplete ($CACHE_COUNT/$LOCAL_COUNT) — no sentinel"
          fi

          # ── Update latest.json ──
          PREV_VAL="$( [ "$HAS_PREVIOUS" = "true" ] && echo "$OLD_DATE" || echo "null" )"
          jq -n \
            --argjson build_version 8 \
            --argjson patch_version 4 \
            --arg latest "$NEW_DATE" \
            --arg previous "$PREV_VAL" \
            --arg updated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{build_version: $build_version, patch_version: $patch_version, latest: $latest, previous: (if $previous == "null" then null else $previous end), updated_at: $updated_at}' \
            | $S5 pipe "s3://$S3_BUCKET/$S3_PREFIX/builds/latest.json"

          echo "Upload complete."

      - name: Upload build log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ${{ steps.setup.outputs.workdir }}/build.log
          if-no-files-found: ignore
          retention-days: 7
