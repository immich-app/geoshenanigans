name: Build Geocoder Index

concurrency:
  group: geocoder-build-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  schedule:
    - cron: '0 6 * * *'
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - 'geocoder/**'
      - '.github/workflows/geocoder-build.yml'
  workflow_dispatch:
    inputs:
      build_date:
        description: 'Build a specific date (YYYY-MM-DD). Leave empty for today.'
        required: false
        type: string
      runner:
        description: 'Runner label'
        required: false
        type: string
        default: 'pokedex-giant'

env:
  S3_BUCKET: geoshenanigans-reverse-geocoding
  S3_PREFIX: geocoder
  S3_ENDPOINT: https://t3.storage.dev
  REGIONS: "planet africa asia europe north-america south-america oceania central-america antarctica"

permissions:
  contents: read

jobs:
  # --- PR validation: build tools + small test build ---
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake g++ libz-dev libzstd-dev \
            libbz2-dev libexpat1-dev libs2-dev libosmium2-dev

      - name: Build tools
        run: |
          cd geocoder/builder && mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc) build-index geocoder-diff geocoder-patch

      - name: Download Monaco PBF
        run: |
          curl -sL -o /tmp/monaco.osm.pbf \
            "https://download.geofabrik.de/europe/monaco-latest.osm.pbf"

      - name: Test determinism + diff + patch
        run: |
          cd geocoder/builder/build
          RUNS=5

          # Build N times from same PBF
          for i in $(seq 1 $RUNS); do
            echo "=== Build $i/$RUNS ==="
            ./build-index "/tmp/build-$i/" /tmp/monaco.osm.pbf --simplify-epsilon --epsilon-scale 1 2>&1 | tail -1
          done

          # Cross-compare all builds against build 1
          echo ""
          echo "=== Determinism check ($RUNS builds) ==="
          FAIL=0
          for i in $(seq 2 $RUNS); do
            for f in /tmp/build-1/*.bin; do
              b=$(basename "$f")
              if ! cmp -s "/tmp/build-1/$b" "/tmp/build-$i/$b"; then
                echo "::error::Build $i differs from build 1: $b"
                FAIL=1
              fi
            done
          done
          [ $FAIL -eq 0 ] && echo "Determinism: PASS ($RUNS identical builds)" || exit 1

          # Test diff + patch round-trip (build 1 → build 1, should be identity)
          echo ""
          echo "=== Diff + Patch round-trip ==="
          ./geocoder-diff /tmp/build-1/ /tmp/build-1/ -o /tmp/test.gcpatch 2>&1 | tail -1
          ./geocoder-patch /tmp/build-1/ /tmp/test.gcpatch -o /tmp/patched/ 2>&1 | tail -1

          for f in /tmp/build-1/*.bin; do
            b=$(basename "$f")
            if ! cmp -s "/tmp/patched/$b" "/tmp/build-1/$b"; then
              echo "::error::Patch round-trip MISMATCH: $b"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] && echo "Patch round-trip: PASS" || exit 1

  # --- Full planet build + patch verification ---
  build:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'planet-test')
    runs-on: ${{ inputs.runner || 'pokedex-giant' }}
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake g++ libz-dev libzstd-dev \
            libbz2-dev libexpat1-dev libs2-dev libosmium2-dev aria2 jq osmium-tool
          curl -sL "https://github.com/peak/s5cmd/releases/download/v2.3.0/s5cmd_2.3.0_Linux-64bit.tar.gz" \
            -o /tmp/s5cmd.tar.gz
          sudo tar xzf /tmp/s5cmd.tar.gz -C /usr/local/bin s5cmd

      - name: Configure Tigris credentials
        run: |
          # Mask and save container's cache credentials
          echo "::add-mask::$AWS_ACCESS_KEY_ID"
          echo "::add-mask::$AWS_SECRET_ACCESS_KEY"
          echo "CACHE_AWS_KEY=$AWS_ACCESS_KEY_ID" >> "$GITHUB_ENV"
          echo "CACHE_AWS_SECRET=$AWS_SECRET_ACCESS_KEY" >> "$GITHUB_ENV"
          # Set Tigris credentials as default for s5cmd
          echo "AWS_ACCESS_KEY_ID=$KEY" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$SECRET" >> "$GITHUB_ENV"
        env:
          KEY: ${{ secrets.TIGRIS_WRITE_KEY_ID }}
          SECRET: ${{ secrets.TIGRIS_WRITE_ACCESS_KEY }}

      - name: Build tools
        run: |
          cd geocoder/builder && mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc) build-index geocoder-diff geocoder-patch
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Setup workdir
        id: setup
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          WORKDIR="$RUNNER_TEMP/geocoder-test"
          mkdir -p "$WORKDIR"
          echo "workdir=$WORKDIR" >> "$GITHUB_OUTPUT"
          echo "cache_endpoint=http://${BUCKET_HOST}:${BUCKET_PORT}" >> "$GITHUB_OUTPUT"
          echo "cache_bucket=$BUCKET_NAME" >> "$GITHUB_OUTPUT"

      - name: Determine dates and sequences
        id: dates
        run: |
          SERVER="https://planet.openstreetmap.org/replication/day"
          CURRENT_SEQ=$(curl -sL "$SERVER/state.txt" | grep sequenceNumber | cut -d= -f2)
          CURRENT_DATE=$(curl -sL "$SERVER/state.txt" | grep timestamp | cut -d= -f2 | tr '\\' ' ' | cut -dT -f1 | tr -d ' ')
          YESTERDAY=$(date -u -d "yesterday" +%Y-%m-%d)

          echo "today=$CURRENT_DATE" >> "$GITHUB_OUTPUT"
          echo "yesterday=$YESTERDAY" >> "$GITHUB_OUTPUT"
          echo "today_seq=$CURRENT_SEQ" >> "$GITHUB_OUTPUT"
          echo "yesterday_seq=$((CURRENT_SEQ - 1))" >> "$GITHUB_OUTPUT"
          echo "Server: date=$CURRENT_DATE seq=$CURRENT_SEQ"

      - name: Check for yesterday's build on Tigris
        id: prev
        env:
          YESTERDAY: ${{ steps.dates.outputs.yesterday }}
        run: |
          if s5cmd --endpoint-url $S3_ENDPOINT ls "s3://$S3_BUCKET/$S3_PREFIX/builds/$YESTERDAY/" 2>/dev/null | head -1 | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Yesterday's build ($YESTERDAY) exists on Tigris"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No build for $YESTERDAY on Tigris — will build from scratch"
          fi

      # --- Fast path: yesterday's build exists on Tigris ---
      - name: "Fast: download indexes from Tigris + PBF from cache in parallel"
        if: steps.prev.outputs.found == 'true'
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          CACHE_ENDPOINT: ${{ steps.setup.outputs.cache_endpoint }}
          CACHE_BUCKET: ${{ steps.setup.outputs.cache_bucket }}
          YESTERDAY: ${{ steps.dates.outputs.yesterday }}
          TODAY: ${{ steps.dates.outputs.today }}
          TODAY_SEQ: ${{ steps.dates.outputs.today_seq }}
        run: |
          CACHE="env AWS_ACCESS_KEY_ID=$CACHE_AWS_KEY AWS_SECRET_ACCESS_KEY=$CACHE_AWS_SECRET s5cmd --endpoint-url $CACHE_ENDPOINT"

          # Download yesterday's indexes from Tigris and today's PBF from cache in parallel
          echo "Starting parallel downloads..."

          # Background: download yesterday's indexes via public HTTP (faster than S3 API)
          (
            echo "[Tigris] Downloading yesterday's indexes ($YESTERDAY) via HTTP..."
            START=$(date +%s)
            # List files via S3 API, download via aria2 from public HTTP
            $S5 ls "s3://$S3_BUCKET/$S3_PREFIX/builds/$YESTERDAY/**" 2>/dev/null \
              | awk '{print $NF}' | grep -v '/$' \
              | while IFS= read -r KEY; do
                  REL="${KEY#*/builds/$YESTERDAY/}"
                  DIR="$WORKDIR/old-output/$(dirname "$REL")"
                  mkdir -p "$DIR"
                  echo "$S3_PUBLIC_URL/$S3_PREFIX/builds/$YESTERDAY/$REL"
                  echo "  dir=$DIR"
                done > /tmp/aria2-indexes.txt
            aria2c -x 16 -j 30 --max-tries=3 --auto-file-renaming=false \
              -i /tmp/aria2-indexes.txt 2>/dev/null
            END=$(date +%s)
            echo "[Tigris] Downloaded in $((END-START))s — $(find "$WORKDIR/old-output" -type f | wc -l) files"
          ) &
          TIGRIS_PID=$!

          # Foreground: obtain today's PBF
          if $CACHE ls "s3://$CACHE_BUCKET/geocoder-cache/planet-${TODAY}.osm.pbf" 2>/dev/null | grep -q "planet-"; then
            echo "[Cache] HIT: today's PBF ($TODAY)"
            START=$(date +%s)
            $CACHE cp "s3://$CACHE_BUCKET/geocoder-cache/planet-${TODAY}.osm.pbf" "$WORKDIR/planet.osm.pbf"
            END=$(date +%s)
            SIZE=$(stat -c%s "$WORKDIR/planet.osm.pbf")
            echo "[Cache] Downloaded: $((SIZE/1024/1024)) MiB in $((END-START))s ($((SIZE/1024/1024/(END-START+1))) MB/s)"
          else
            echo "[Cache] MISS for today — getting yesterday's PBF + 1 diff"
            START=$(date +%s)
            $CACHE cp "s3://$CACHE_BUCKET/geocoder-cache/planet-${YESTERDAY}.osm.pbf" "$WORKDIR/planet.osm.pbf"
            END=$(date +%s)
            SIZE=$(stat -c%s "$WORKDIR/planet.osm.pbf")
            echo "[Cache] Downloaded yesterday's PBF: $((SIZE/1024/1024)) MiB in $((END-START))s ($((SIZE/1024/1024/(END-START+1))) MB/s)"

            DIR1=$(printf "%03d" $((TODAY_SEQ / 1000000)))
            DIR2=$(printf "%03d" $(((TODAY_SEQ / 1000) % 1000)))
            FILE=$(printf "%03d" $((TODAY_SEQ % 1000)))
            curl -sL -o "$WORKDIR/diff-today.osc.gz" \
              "https://planet.openstreetmap.org/replication/day/$DIR1/$DIR2/${FILE}.osc.gz"
            echo "Applying today's diff (seq $TODAY_SEQ)..."
            time osmium apply-changes "$WORKDIR/planet.osm.pbf" "$WORKDIR/diff-today.osc.gz" \
              -o "$WORKDIR/planet-tmp.osm.pbf" --overwrite
            mv "$WORKDIR/planet-tmp.osm.pbf" "$WORKDIR/planet.osm.pbf"
            rm -f "$WORKDIR/diff-today.osc.gz"

            echo "[Cache] Caching today's PBF as planet-${TODAY}.osm.pbf..."
            START=$(date +%s)
            $CACHE cp "$WORKDIR/planet.osm.pbf" "s3://$CACHE_BUCKET/geocoder-cache/planet-${TODAY}.osm.pbf"
            END=$(date +%s)
            SIZE=$(stat -c%s "$WORKDIR/planet.osm.pbf")
            echo "[Cache] Cached: $((SIZE/1024/1024)) MiB in $((END-START))s ($((SIZE/1024/1024/(END-START+1))) MB/s)"
          fi

          # Wait for Tigris download to complete
          echo "Waiting for Tigris download..."
          wait $TIGRIS_PID
          echo "All downloads complete"

      - name: "Fast: build today's index"
        if: steps.prev.outputs.found == 'true'
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          TODAY: ${{ steps.dates.outputs.today }}
        run: |
          echo "Building today's index ($TODAY)..."
          time build-index "$WORKDIR/output/" "$WORKDIR/planet.osm.pbf" \
            --continents --multi-output --multi-quality 2>&1 | tail -10
          rm -f "$WORKDIR/planet.osm.pbf"
          echo "$(find "$WORKDIR/output" -name "*.bin" | wc -l) bin files produced"

      # --- No previous build: just build today, no patching ---
      - name: "No previous: obtain today's PBF and build"
        if: steps.prev.outputs.found != 'true'
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          CACHE_ENDPOINT: ${{ steps.setup.outputs.cache_endpoint }}
          CACHE_BUCKET: ${{ steps.setup.outputs.cache_bucket }}
          TODAY: ${{ steps.dates.outputs.today }}
          TODAY_SEQ: ${{ steps.dates.outputs.today_seq }}
        run: |
          CACHE="env AWS_ACCESS_KEY_ID=$CACHE_AWS_KEY AWS_SECRET_ACCESS_KEY=$CACHE_AWS_SECRET s5cmd --endpoint-url $CACHE_ENDPOINT"

          # Check cache for today's PBF
          if $CACHE ls "s3://$CACHE_BUCKET/geocoder-cache/planet-${TODAY}.osm.pbf" 2>/dev/null | grep -q "planet-"; then
            echo "Cache HIT: today's PBF ($TODAY)"
            START=$(date +%s)
            $CACHE cp "s3://$CACHE_BUCKET/geocoder-cache/planet-${TODAY}.osm.pbf" "$WORKDIR/planet.osm.pbf"
            END=$(date +%s)
            SIZE=$(stat -c%s "$WORKDIR/planet.osm.pbf")
            echo "Downloaded from cache: $((SIZE/1024/1024)) MiB in $((END-START))s ($((SIZE/1024/1024/(END-START+1))) MB/s)"
          else
            echo "Cache MISS — downloading from mirrors + applying diffs"
            aria2c -x 16 -s 16 -j 16 --max-tries=3 \
              -d "$WORKDIR" -o planet.osm.pbf \
              "https://planet.openstreetmap.org/pbf/planet-latest.osm.pbf" \
              "https://ftpmirror.your.org/pub/openstreetmap/pbf/planet-latest.osm.pbf" \
              "https://ftp.osuosl.org/pub/openstreetmap/pbf/planet-latest.osm.pbf" \
              "https://ftp5.gwdg.de/pub/misc/openstreetmap/planet.openstreetmap.org/pbf/planet-latest.osm.pbf"

            SERVER="https://planet.openstreetmap.org/replication/day"
            PBF_DATE=$(osmium fileinfo -g header.option.osmosis_replication_timestamp "$WORKDIR/planet.osm.pbf" 2>/dev/null | cut -dT -f1)
            DAYS_NEEDED=$(( ($(date -u -d "$TODAY" +%s) - $(date -u -d "$PBF_DATE" +%s)) / 86400 ))
            PBF_SEQ=$((TODAY_SEQ - DAYS_NEEDED))
            echo "PBF: date=$PBF_DATE seq=$PBF_SEQ, need $DAYS_NEEDED diffs"

            if [ $DAYS_NEEDED -gt 0 ]; then
              DIFFS=""
              for S in $(seq $((PBF_SEQ + 1)) $TODAY_SEQ); do
                DIR1=$(printf "%03d" $((S / 1000000)))
                DIR2=$(printf "%03d" $(((S / 1000) % 1000)))
                FILE=$(printf "%03d" $((S % 1000)))
                curl -sL -o "$WORKDIR/diff-${S}.osc.gz" "$SERVER/$DIR1/$DIR2/${FILE}.osc.gz"
                echo "  Downloaded seq $S"
                DIFFS="$DIFFS $WORKDIR/diff-${S}.osc.gz"
              done
              echo "Applying $DAYS_NEEDED diffs in one pass..."
              time osmium apply-changes "$WORKDIR/planet.osm.pbf" $DIFFS \
                -o "$WORKDIR/planet-tmp.osm.pbf" --overwrite
              mv "$WORKDIR/planet-tmp.osm.pbf" "$WORKDIR/planet.osm.pbf"
              rm -f $DIFFS
            fi

            echo "Caching PBF as planet-${TODAY}.osm.pbf..."
            START=$(date +%s)
            $CACHE cp "$WORKDIR/planet.osm.pbf" "s3://$CACHE_BUCKET/geocoder-cache/planet-${TODAY}.osm.pbf"
            END=$(date +%s)
            SIZE=$(stat -c%s "$WORKDIR/planet.osm.pbf")
            echo "Cached: $((SIZE/1024/1024)) MiB in $((END-START))s ($((SIZE/1024/1024/(END-START+1))) MB/s)"
          fi

          echo "Building today's index ($TODAY)..."
          time build-index "$WORKDIR/output/" "$WORKDIR/planet.osm.pbf" \
            --continents --multi-output --multi-quality 2>&1 | tail -10
          rm -f "$WORKDIR/planet.osm.pbf"
          echo "$(find "$WORKDIR/output" -name "*.bin" | wc -l) bin files produced"

      - name: Generate patches, verify, and upload
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          OLD_DATE: ${{ steps.dates.outputs.yesterday }}
          NEW_DATE: ${{ steps.dates.outputs.today }}
          IS_PRODUCTION: ${{ github.event_name != 'pull_request' }}
        run: |
          S5="s5cmd --endpoint-url $S3_ENDPOINT"
          UPLOAD_LOG="$WORKDIR/upload.log"
          touch "$UPLOAD_LOG"

          if [ "$IS_PRODUCTION" = "true" ]; then
            # Start uploading today's indexes in background (read-only during patching)
            echo "Starting background upload of today's indexes ($NEW_DATE)..."
            $S5 --numworkers 30 cp --concurrency 4 \
              "$WORKDIR/output/*" "s3://$S3_BUCKET/$S3_PREFIX/builds/$NEW_DATE/" \
              > "$UPLOAD_LOG" 2>&1 &
            UPLOAD_IDX_PID=$!
          fi

          echo "## Planet Test Results ($OLD_DATE → $NEW_DATE)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Variant | Files | Patch Size | Verified |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|-----------|----------|" >> "$GITHUB_STEP_SUMMARY"

          RESULTS_DIR="$WORKDIR/results"
          PATCHES_DIR="$WORKDIR/patches-out"
          mkdir -p "$RESULTS_DIR" "$PATCHES_DIR"
          VARIANTS=$(cd "$WORKDIR/output" && find . -name "*.bin" -exec dirname {} \; | sort -u | sed 's|^\./||')

          # Generate patches, start uploading each, then verify — all in parallel
          JOBS=0
          MAX_JOBS=$(nproc)
          for variant in $VARIANTS; do
            (
              NEW_DIR="$WORKDIR/output/$variant"
              OLD_DIR="$WORKDIR/old-output/$variant"
              N_NEW=$(ls "$NEW_DIR"/*.bin 2>/dev/null | wc -l)
              N_OLD=$(ls "$OLD_DIR"/*.bin 2>/dev/null | wc -l)
              SAFE_NAME=$(echo "$variant" | tr '/' '_')

              if [ "$N_NEW" -lt 2 ]; then exit 0; fi
              if [ "$N_OLD" -ne "$N_NEW" ]; then
                echo "SKIP" > "$RESULTS_DIR/$SAFE_NAME"
                exit 0
              fi

              # Generate patch
              PATCH_FILE="$PATCHES_DIR/$SAFE_NAME.gcpatch"
              geocoder-diff "$OLD_DIR" "$NEW_DIR" -o "$PATCH_FILE" 2>/dev/null
              PATCH_SIZE=$(stat -c%s "$PATCH_FILE" 2>/dev/null || echo 0)
              PATCH_KB=$((PATCH_SIZE / 1024))

              # Upload patch in background while we verify (production only)
              PATCH_UPLOAD_PID=""
              if [ "$IS_PRODUCTION" = "true" ]; then
                $S5 cp "$PATCH_FILE" \
                  "s3://$S3_BUCKET/$S3_PREFIX/patches/$variant/${OLD_DATE}-to-${NEW_DATE}.gcpatch" \
                  >> "$UPLOAD_LOG" 2>&1 &
                PATCH_UPLOAD_PID=$!
              fi

              # Verify patch
              VERIFY_DIR="$WORKDIR/verify-$SAFE_NAME"
              mkdir -p "$VERIFY_DIR"
              geocoder-patch "$OLD_DIR" "$PATCH_FILE" -o "$VERIFY_DIR/" 2>/dev/null

              MATCH=0
              for f in "$NEW_DIR"/*.bin; do
                b=$(basename "$f")
                h1=$(md5sum "$VERIFY_DIR/$b" 2>/dev/null | awk '{print $1}')
                h2=$(md5sum "$NEW_DIR/$b" | awk '{print $1}')
                [ "$h1" = "$h2" ] && MATCH=$((MATCH + 1))
              done

              # Wait for this patch's upload before reporting
              [ -n "$PATCH_UPLOAD_PID" ] && wait $PATCH_UPLOAD_PID

              if [ $MATCH -eq $N_NEW ]; then
                echo "PASS $N_NEW $PATCH_KB" > "$RESULTS_DIR/$SAFE_NAME"
              else
                echo "FAIL $MATCH $N_NEW $PATCH_KB" > "$RESULTS_DIR/$SAFE_NAME"
              fi
              rm -rf "$VERIFY_DIR"
            ) &

            JOBS=$((JOBS + 1))
            if [ $JOBS -ge $MAX_JOBS ]; then
              wait -n 2>/dev/null || true
              JOBS=$((JOBS - 1))
            fi
          done
          wait

          rm -rf "$WORKDIR/old-output"

          # Collect results
          PASS=0; FAIL=0; SKIP=0
          for variant in $VARIANTS; do
            SAFE_NAME=$(echo "$variant" | tr '/' '_')
            RESULT_FILE="$RESULTS_DIR/$SAFE_NAME"
            [ ! -f "$RESULT_FILE" ] && continue
            RESULT=$(cat "$RESULT_FILE")

            if [ "$RESULT" = "SKIP" ]; then
              SKIP=$((SKIP + 1))
            elif echo "$RESULT" | grep -q "^PASS"; then
              N_NEW=$(echo "$RESULT" | awk '{print $2}')
              PATCH_KB=$(echo "$RESULT" | awk '{print $3}')
              echo "  $variant: PASS ($N_NEW/$N_NEW, ${PATCH_KB} KiB)"
              echo "| $variant | $N_NEW | ${PATCH_KB} KiB | PASS |" >> "$GITHUB_STEP_SUMMARY"
              PASS=$((PASS + 1))
            else
              MATCH=$(echo "$RESULT" | awk '{print $2}')
              N_NEW=$(echo "$RESULT" | awk '{print $3}')
              PATCH_KB=$(echo "$RESULT" | awk '{print $4}')
              echo "::error::$variant: FAIL ($MATCH/$N_NEW match)"
              echo "| $variant | $N_NEW | ${PATCH_KB} KiB | **FAIL** |" >> "$GITHUB_STEP_SUMMARY"
              FAIL=$((FAIL + 1))
            fi
          done
          rm -rf "$RESULTS_DIR" "$PATCHES_DIR"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total: $PASS pass, $FAIL fail, $SKIP skip**" >> "$GITHUB_STEP_SUMMARY"
          echo "Results: $PASS pass, $FAIL fail, $SKIP skip"

          [ $FAIL -gt 0 ] && exit 1 || true

          rm -rf "$PATCHES_DIR" "$WORKDIR/old-output"

          if [ "$IS_PRODUCTION" = "true" ]; then
            # Wait for index upload
            echo "Waiting for index upload..."
            wait $UPLOAD_IDX_PID || true

            # Check upload log for errors
            if grep -qi "error" "$UPLOAD_LOG" 2>/dev/null; then
              echo "::warning::Upload log contains errors:"
              grep -i "error" "$UPLOAD_LOG"
            fi

            # Verify file counts on Tigris
            LOCAL_NEW=$(find "$WORKDIR/output" -type f | wc -l)
            REMOTE_NEW=$($S5 ls "s3://$S3_BUCKET/$S3_PREFIX/builds/$NEW_DATE/*" 2>/dev/null | wc -l)
            echo "Today: local=$LOCAL_NEW remote=$REMOTE_NEW"
            if [ "$REMOTE_NEW" -lt "$LOCAL_NEW" ]; then
              echo "::error::Upload incomplete: $REMOTE_NEW/$LOCAL_NEW files on Tigris"
              cat "$UPLOAD_LOG"
              exit 1
            fi
            echo "Upload verification: PASS"

            # Write manifests
            jq -n \
              --arg date "$NEW_DATE" \
              --arg prev "$OLD_DATE" \
              --argjson pass "$PASS" \
              --argjson fail "$FAIL" \
              --argjson skip "$SKIP" \
              --arg validated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{date: $date, previous: $prev, patches: {pass: $pass, fail: $fail, skip: $skip}, validated_at: $validated_at}' \
              | $S5 pipe "s3://$S3_BUCKET/$S3_PREFIX/builds/$NEW_DATE/validated.json"
            echo "Validation file uploaded for $NEW_DATE"

            jq -n \
              --arg latest "$NEW_DATE" \
              --arg previous "$OLD_DATE" \
              --arg updated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{latest_build: $latest, previous_build: $previous, updated_at: $updated_at}' \
              | $S5 pipe "s3://$S3_BUCKET/$S3_PREFIX/latest.json"
            echo "Manifest updated"
          else
            echo "PR run — skipping S3 uploads"
          fi

      - name: Upload indexes (no previous build, production only)
        if: steps.prev.outputs.found != 'true' && github.event_name != 'pull_request'
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          BUILD_DATE: ${{ steps.dates.outputs.today }}
        run: |
          S5="s5cmd --endpoint-url $S3_ENDPOINT"
          echo "No previous build — uploading indexes only..."
          $S5 --numworkers 30 cp --concurrency 4 \
            "$WORKDIR/output/*" "s3://$S3_BUCKET/$S3_PREFIX/builds/$BUILD_DATE/"

          LOCAL=$(find "$WORKDIR/output" -type f | wc -l)
          REMOTE=$($S5 ls "s3://$S3_BUCKET/$S3_PREFIX/builds/$BUILD_DATE/*" 2>/dev/null | wc -l)
          echo "Upload: local=$LOCAL remote=$REMOTE"
          if [ "$REMOTE" -lt "$LOCAL" ]; then
            echo "::error::Upload incomplete: $REMOTE/$LOCAL"
            exit 1
          fi

          jq -n \
            --arg latest "$BUILD_DATE" \
            --arg updated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{latest_build: $latest, updated_at: $updated_at}' \
            | $S5 pipe "s3://$S3_BUCKET/$S3_PREFIX/latest.json"
          echo "Manifest updated"

