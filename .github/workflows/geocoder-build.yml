name: Build Geocoder Index

concurrency:
  group: geocoder-build-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: '0 6 * * *'
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - 'geocoder/**'
      - '.github/workflows/geocoder-build.yml'
  workflow_dispatch:
    inputs:
      pbf_url:
        description: 'Override PBF URL (leave empty to use replication diffs)'
        required: false
        type: string
      force_fresh_download:
        description: 'Force fresh planet PBF download (skip replication diffs)'
        required: false
        type: boolean
        default: false
      skip_patch:
        description: 'Skip patch generation'
        required: false
        type: boolean
        default: false
      runner:
        description: 'Runner label'
        required: false
        type: string
        default: 'self-hosted'

env:
  S3_BUCKET: geoshenanigans-reverse-geocoding
  S3_PREFIX: geocoder
  REGIONS: "planet africa asia europe north-america south-america oceania central-america antarctica"

permissions:
  contents: read

jobs:
  # --- PR validation: build tools + small test build ---
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake g++ libz-dev libzstd-dev \
            libbz2-dev libexpat1-dev libs2-dev libosmium2-dev

      - name: Build tools
        run: |
          cd geocoder/builder && mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc) build-index geocoder-diff geocoder-patch

      - name: Download Monaco PBF
        run: |
          curl -sL -o /tmp/monaco.osm.pbf \
            "https://download.geofabrik.de/europe/monaco-latest.osm.pbf"

      - name: Test determinism + diff + patch
        run: |
          cd geocoder/builder/build
          RUNS=5

          # Build N times from same PBF
          for i in $(seq 1 $RUNS); do
            echo "=== Build $i/$RUNS ==="
            ./build-index "/tmp/build-$i/" /tmp/monaco.osm.pbf --simplify-epsilon --epsilon-scale 1 2>&1 | tail -1
          done

          # Cross-compare all builds against build 1
          echo ""
          echo "=== Determinism check ($RUNS builds) ==="
          FAIL=0
          for i in $(seq 2 $RUNS); do
            for f in /tmp/build-1/*.bin; do
              b=$(basename "$f")
              if ! cmp -s "/tmp/build-1/$b" "/tmp/build-$i/$b"; then
                echo "::error::Build $i differs from build 1: $b"
                FAIL=1
              fi
            done
          done
          [ $FAIL -eq 0 ] && echo "Determinism: PASS ($RUNS identical builds)" || exit 1

          # Test diff + patch round-trip (build 1 → build 1, should be identity)
          echo ""
          echo "=== Diff + Patch round-trip ==="
          ./geocoder-diff /tmp/build-1/ /tmp/build-1/ -o /tmp/test.gcpatch 2>&1 | tail -1
          ./geocoder-patch /tmp/build-1/ /tmp/test.gcpatch -o /tmp/patched/ 2>&1 | tail -1

          for f in /tmp/build-1/*.bin; do
            b=$(basename "$f")
            if ! cmp -s "/tmp/patched/$b" "/tmp/build-1/$b"; then
              echo "::error::Patch round-trip MISMATCH: $b"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] && echo "Patch round-trip: PASS" || exit 1

  # --- PR planet test: full build + validation without S3 (triggered by label) ---
  planet-test:
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'planet-test')
    runs-on: pokedex-giant
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake g++ libz-dev libzstd-dev \
            libbz2-dev libexpat1-dev libs2-dev libosmium2-dev aria2 jq python3-pip osmium-tool
          pip install --break-system-packages osmium 2>/dev/null \
            || pip install --user osmium 2>/dev/null \
            || python3 -m pip install --user --break-system-packages osmium
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure S3 credentials
        run: |
          echo "AWS_ACCESS_KEY_ID=$S3_ACCESS_KEY_ID" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$S3_SECRET_ACCESS_KEY" >> "$GITHUB_ENV"
        env:
          S3_ACCESS_KEY_ID: ${{ secrets.TIGRIS_WRITE_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.TIGRIS_WRITE_ACCESS_KEY }}

      - name: Setup rclone
        uses: AnimMouse/setup-rclone@26ef2133e09fd383329a1d4c1fbe6a71db1976c9 # v1.12.0
        with:
          disable_base64: true
          rclone_config: |
            [tigris]
            type = s3
            provider = Other
            region = auto
            endpoint = https://fly.storage.tigris.dev
            env_auth = true

      - name: Build tools
        run: |
          cd geocoder/builder && mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc) build-index geocoder-diff geocoder-patch
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Setup workdir
        id: setup
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          WORKDIR="$RUNNER_TEMP/geocoder-test"
          mkdir -p "$WORKDIR"
          echo "workdir=$WORKDIR" >> "$GITHUB_OUTPUT"

      - name: Check for yesterday's build
        id: prev
        run: |
          YESTERDAY=$(date -u -d "yesterday" +%Y-%m-%d)
          echo "yesterday=$YESTERDAY" >> "$GITHUB_OUTPUT"
          if rclone ls "tigris:$S3_BUCKET/$S3_PREFIX/builds/$YESTERDAY/planet/" 2>/dev/null | grep -q '.bin'; then
            echo "date=$YESTERDAY" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Yesterday's build ($YESTERDAY) exists in Tigris"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No build for $YESTERDAY — will bootstrap"
          fi

      - name: Obtain PBF
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          YESTERDAY: ${{ steps.prev.outputs.yesterday }}
        run: |
          # Try yesterday's PBF from Tigris, otherwise download from mirrors
          if rclone ls "tigris:$S3_BUCKET/$S3_PREFIX/pbf/" 2>/dev/null | grep -q "planet-${YESTERDAY}"; then
            echo "Downloading yesterday's PBF ($YESTERDAY) from Tigris..."
            rclone copyto "tigris:$S3_BUCKET/$S3_PREFIX/pbf/planet-${YESTERDAY}.osm.pbf" \
              "$WORKDIR/planet.osm.pbf" --progress --retries 5 --low-level-retries 10 --multi-thread-streams 16
          else
            echo "No PBF for $YESTERDAY in Tigris — downloading from mirrors..."
            aria2c -x 16 -s 16 -j 16 --max-tries=3 \
              -d "$WORKDIR" -o planet.osm.pbf \
              "https://planet.openstreetmap.org/pbf/planet-latest.osm.pbf" \
              "https://ftpmirror.your.org/pub/openstreetmap/pbf/planet-latest.osm.pbf" \
              "https://ftp.osuosl.org/pub/openstreetmap/pbf/planet-latest.osm.pbf" \
              "https://ftp5.gwdg.de/pub/misc/openstreetmap/planet.openstreetmap.org/pbf/planet-latest.osm.pbf"
          fi
          ls -lh "$WORKDIR/planet.osm.pbf"

      # --- Bootstrap: build + upload "yesterday's" index from current PBF ---
      - name: "Bootstrap: build + upload index from current PBF"
        if: steps.prev.outputs.found != 'true'
        id: bootstrap
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
        run: |
          BOOT_DATE=$(osmium fileinfo -g header.option.osmosis_replication_timestamp "$WORKDIR/planet.osm.pbf" | cut -dT -f1)
          echo "date=$BOOT_DATE" >> "$GITHUB_OUTPUT"
          echo "No previous build — building index ($BOOT_DATE) from current PBF..."
          time build-index "$WORKDIR/bootstrap-output/" "$WORKDIR/planet.osm.pbf" \
            --continents --multi-output --multi-quality 2>&1 | tail -10
          echo "$(find "$WORKDIR/bootstrap-output" -name "*.bin" | wc -l) bin files produced"

          echo "Uploading bootstrap build as $BOOT_DATE..."
          rclone sync "$WORKDIR/bootstrap-output/" \
            "tigris:$S3_BUCKET/$S3_PREFIX/builds/$BOOT_DATE/" \
            --progress --transfers 32 --retries 5 --low-level-retries 10 \
            --s3-upload-concurrency 32 --s3-chunk-size 256M --s3-no-check-bucket --checkers 32
          rm -rf "$WORKDIR/bootstrap-output"

          echo "Uploading PBF as planet-${BOOT_DATE}.osm.pbf..."
          rclone copyto "$WORKDIR/planet.osm.pbf" \
            "tigris:$S3_BUCKET/$S3_PREFIX/pbf/planet-${BOOT_DATE}.osm.pbf" \
            --progress --retries 5 --low-level-retries 10 --multi-thread-streams 16 \
            --s3-upload-concurrency 32 --s3-chunk-size 256M --s3-no-check-bucket

          echo "$BOOT_DATE" | rclone rcat "tigris:$S3_BUCKET/$S3_PREFIX/builds/latest.txt"
          echo "Bootstrap complete — Tigris seeded with build + PBF"

      - name: Apply replication diffs
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
        run: |
          PBF_DATE=$(osmium fileinfo -g header.option.osmosis_replication_timestamp "$WORKDIR/planet.osm.pbf" | cut -dT -f1)
          echo "PBF starting date: $PBF_DATE"
          echo "Applying replication diffs to bring PBF up to date..."
          ITER=0
          while true; do
            ITER=$((ITER + 1))
            echo "--- Diff batch $ITER (PBF at $PBF_DATE) ---"
            RC=0
            pyosmium-up-to-date -v \
              --server https://planet.openstreetmap.org/replication/day \
              -s 2000 "$WORKDIR/planet.osm.pbf" 2>&1 || RC=$?
            PBF_DATE=$(osmium fileinfo -g header.option.osmosis_replication_timestamp "$WORKDIR/planet.osm.pbf" | cut -dT -f1)
            echo "After batch $ITER: RC=$RC, PBF at $PBF_DATE"
            if [ $RC -eq 0 ]; then
              echo "PBF is up to date"
              break
            elif [ $RC -eq 1 ]; then
              echo "More diffs to apply..."
            else
              echo "pyosmium-up-to-date failed with exit code $RC"
              exit $RC
            fi
          done

          # Upload PBF to S3 immediately so next run can use it even if build fails
          echo "Uploading PBF as planet-${PBF_DATE}.osm.pbf..."
          rclone copyto "$WORKDIR/planet.osm.pbf" \
            "tigris:$S3_BUCKET/$S3_PREFIX/pbf/planet-${PBF_DATE}.osm.pbf" \
            --progress --retries 5 --low-level-retries 10 --multi-thread-streams 16 \
            --s3-upload-concurrency 32 --s3-chunk-size 256M --s3-no-check-bucket

          TODAY=$(date -u +%Y-%m-%d)
          echo "PBF replication date: $PBF_DATE (expected: $TODAY)"
          if [ "$PBF_DATE" != "$TODAY" ]; then
            YESTERDAY=$(date -u -d "yesterday" +%Y-%m-%d)
            if [ "$PBF_DATE" = "$YESTERDAY" ]; then
              echo "::warning::PBF is from yesterday ($PBF_DATE), today's diff not yet available"
            else
              echo "::error::PBF replication date $PBF_DATE is too old (expected $TODAY or $YESTERDAY)"
              exit 1
            fi
          fi

      - name: Build index
        id: new_build
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
        run: |
          NEW_DATE=$(osmium fileinfo -g header.option.osmosis_replication_timestamp "$WORKDIR/planet.osm.pbf" | cut -dT -f1)
          echo "date=$NEW_DATE" >> "$GITHUB_OUTPUT"
          echo "Building index ($NEW_DATE)..."
          time build-index "$WORKDIR/output/" "$WORKDIR/planet.osm.pbf" \
            --continents --multi-output --multi-quality 2>&1 | tail -10
          find "$WORKDIR/output" -name "*.bin" | wc -l
          echo "bin files produced"

      - name: Download previous build from S3
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          PREV_DATE: ${{ steps.prev.outputs.date || steps.bootstrap.outputs.date }}
        run: |
          echo "Downloading previous build ($PREV_DATE) from S3..."
          rclone sync "tigris:$S3_BUCKET/$S3_PREFIX/builds/$PREV_DATE/" \
            "$WORKDIR/prev-build/" \
            --progress --transfers 16 --retries 5 --low-level-retries 10

      - name: Generate and verify patches for all variants
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          PREV_DATE: ${{ steps.prev.outputs.date || steps.bootstrap.outputs.date }}
          NEW_DATE: ${{ steps.new_build.outputs.date }}
        run: |
          echo "## Planet Test Results ($PREV_DATE → $NEW_DATE)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Variant | Files | Patch Size | Verified |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|-----------|----------|" >> "$GITHUB_STEP_SUMMARY"

          RESULTS_DIR="$WORKDIR/results"
          mkdir -p "$RESULTS_DIR"
          VARIANTS=$(cd "$WORKDIR/output" && find . -name "*.bin" -exec dirname {} \; | sort -u | sed 's|^\./||')

          # Process variants in parallel (up to nproc jobs)
          JOBS=0
          MAX_JOBS=$(nproc)
          for variant in $VARIANTS; do
            (
              NEW_DIR="$WORKDIR/output/$variant"
              OLD_DIR="$WORKDIR/prev-build/$variant"
              N_NEW=$(ls "$NEW_DIR"/*.bin 2>/dev/null | wc -l)
              N_OLD=$(ls "$OLD_DIR"/*.bin 2>/dev/null | wc -l)
              SAFE_NAME=$(echo "$variant" | tr '/' '_')

              if [ "$N_NEW" -lt 2 ]; then exit 0; fi
              if [ "$N_OLD" -ne "$N_NEW" ]; then
                echo "SKIP" > "$RESULTS_DIR/$SAFE_NAME"
                exit 0
              fi

              PATCH_FILE="$WORKDIR/patch-$SAFE_NAME.gcpatch"
              geocoder-diff "$OLD_DIR" "$NEW_DIR" -o "$PATCH_FILE" 2>/dev/null
              PATCH_SIZE=$(stat -c%s "$PATCH_FILE" 2>/dev/null || echo 0)
              PATCH_KB=$((PATCH_SIZE / 1024))

              VERIFY_DIR="$WORKDIR/verify-$SAFE_NAME"
              mkdir -p "$VERIFY_DIR"
              geocoder-patch "$OLD_DIR" "$PATCH_FILE" -o "$VERIFY_DIR/" 2>/dev/null

              MATCH=0
              for f in "$NEW_DIR"/*.bin; do
                b=$(basename "$f")
                h1=$(md5sum "$VERIFY_DIR/$b" 2>/dev/null | awk '{print $1}')
                h2=$(md5sum "$NEW_DIR/$b" | awk '{print $1}')
                [ "$h1" = "$h2" ] && MATCH=$((MATCH + 1))
              done

              if [ $MATCH -eq $N_NEW ]; then
                echo "PASS $N_NEW $PATCH_KB" > "$RESULTS_DIR/$SAFE_NAME"
              else
                echo "FAIL $MATCH $N_NEW $PATCH_KB" > "$RESULTS_DIR/$SAFE_NAME"
              fi
              rm -f "$PATCH_FILE"
              rm -rf "$VERIFY_DIR"
            ) &

            JOBS=$((JOBS + 1))
            if [ $JOBS -ge $MAX_JOBS ]; then
              wait -n 2>/dev/null || true
              JOBS=$((JOBS - 1))
            fi
          done
          wait

          rm -rf "$WORKDIR/prev-build"

          # Collect results
          PASS=0; FAIL=0; SKIP=0
          for variant in $VARIANTS; do
            SAFE_NAME=$(echo "$variant" | tr '/' '_')
            RESULT_FILE="$RESULTS_DIR/$SAFE_NAME"
            [ ! -f "$RESULT_FILE" ] && continue
            RESULT=$(cat "$RESULT_FILE")

            if [ "$RESULT" = "SKIP" ]; then
              SKIP=$((SKIP + 1))
            elif echo "$RESULT" | grep -q "^PASS"; then
              N_NEW=$(echo "$RESULT" | awk '{print $2}')
              PATCH_KB=$(echo "$RESULT" | awk '{print $3}')
              echo "  $variant: PASS ($N_NEW/$N_NEW, ${PATCH_KB} KiB)"
              echo "| $variant | $N_NEW | ${PATCH_KB} KiB | PASS |" >> "$GITHUB_STEP_SUMMARY"
              PASS=$((PASS + 1))
            else
              MATCH=$(echo "$RESULT" | awk '{print $2}')
              N_NEW=$(echo "$RESULT" | awk '{print $3}')
              PATCH_KB=$(echo "$RESULT" | awk '{print $4}')
              echo "::error::$variant: FAIL ($MATCH/$N_NEW match)"
              echo "| $variant | $N_NEW | ${PATCH_KB} KiB | **FAIL** |" >> "$GITHUB_STEP_SUMMARY"
              FAIL=$((FAIL + 1))
            fi
          done
          rm -rf "$RESULTS_DIR"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total: $PASS pass, $FAIL fail, $SKIP skip**" >> "$GITHUB_STEP_SUMMARY"

          echo "Results: $PASS pass, $FAIL fail, $SKIP skip"
          [ $FAIL -gt 0 ] && exit 1 || true

      - name: Upload new build to S3
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          NEW_DATE: ${{ steps.new_build.outputs.date }}
        run: |
          echo "Uploading new build as $NEW_DATE..."
          rclone sync "$WORKDIR/output/" \
            "tigris:$S3_BUCKET/$S3_PREFIX/builds/$NEW_DATE/" \
            --progress --transfers 32 --retries 5 --low-level-retries 10 \
            --s3-upload-concurrency 32 --s3-chunk-size 256M --s3-no-check-bucket --checkers 32
          echo "$NEW_DATE" | rclone rcat "tigris:$S3_BUCKET/$S3_PREFIX/builds/latest.txt"
          echo "Build upload complete"

  # --- Production build: full planet + S3 upload ---
  build:
    if: github.event_name != 'pull_request'
    runs-on: ${{ inputs.runner || 'pokedex-giant' }}
    timeout-minutes: 240
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake g++ libz-dev libzstd-dev \
            libbz2-dev libexpat1-dev libs2-dev libosmium2-dev aria2 jq python3-pip osmium-tool
          pip install --break-system-packages osmium 2>/dev/null \
            || pip install --user osmium 2>/dev/null \
            || python3 -m pip install --user --break-system-packages osmium
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure S3 credentials
        run: |
          echo "AWS_ACCESS_KEY_ID=$S3_ACCESS_KEY_ID" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$S3_SECRET_ACCESS_KEY" >> "$GITHUB_ENV"
        env:
          S3_ACCESS_KEY_ID: ${{ secrets.TIGRIS_WRITE_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.TIGRIS_WRITE_ACCESS_KEY }}

      - name: Setup rclone
        uses: AnimMouse/setup-rclone@26ef2133e09fd383329a1d4c1fbe6a71db1976c9 # v1.12.0
        with:
          disable_base64: true
          rclone_config: |
            [tigris]
            type = s3
            provider = Other
            region = auto
            endpoint = https://fly.storage.tigris.dev
            env_auth = true

      - name: Build tools
        run: |
          cd geocoder/builder && mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc) build-index geocoder-diff geocoder-patch
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Determine build date
        id: meta
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%d)
          echo "date=$BUILD_DATE" >> "$GITHUB_OUTPUT"

          EXISTS=$(rclone ls "tigris:$S3_BUCKET/$S3_PREFIX/builds/$BUILD_DATE/planet/" 2>/dev/null | wc -l)
          if [ "$EXISTS" -gt 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Build for $BUILD_DATE already exists"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Obtain PBF
        if: steps.meta.outputs.skip != 'true'
        id: pbf
        env:
          INPUT_PBF_URL: ${{ inputs.pbf_url }}
          INPUT_FORCE_FRESH: ${{ inputs.force_fresh_download }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          WORKDIR="$RUNNER_TEMP/geocoder-build"
          mkdir -p "$WORKDIR"
          echo "workdir=$WORKDIR" >> "$GITHUB_OUTPUT"

          if [ -n "$INPUT_PBF_URL" ]; then
            echo "Downloading from override URL..."
            aria2c -x 8 -s 8 --max-tries=3 -d "$WORKDIR" -o planet.osm.pbf "$INPUT_PBF_URL"
            echo "method=download" >> "$GITHUB_OUTPUT"

          elif [ "$INPUT_FORCE_FRESH" = "true" ]; then
            PBF_FILE=$(curl -sI "https://planet.openstreetmap.org/pbf/planet-latest.osm.pbf" \
              | grep -i '^location:' | awk '{print $2}' | tr -d '\r' | xargs basename)
            echo "Downloading $PBF_FILE from multiple mirrors..."
            aria2c -x 16 -s 16 -j 16 --max-tries=3 \
              -d "$WORKDIR" -o planet.osm.pbf \
              "https://planet.openstreetmap.org/pbf/$PBF_FILE" \
              "https://ftpmirror.your.org/pub/openstreetmap/pbf/$PBF_FILE" \
              "https://ftp.osuosl.org/pub/openstreetmap/pbf/$PBF_FILE" \
              "https://ftp5.gwdg.de/pub/misc/openstreetmap/planet.openstreetmap.org/pbf/$PBF_FILE"
            echo "method=download" >> "$GITHUB_OUTPUT"

          else
            # Find the most recent PBF in Tigris
            LATEST_PBF=$(rclone ls "tigris:$S3_BUCKET/$S3_PREFIX/pbf/" 2>/dev/null \
              | grep -oP 'planet-\d{4}-\d{2}-\d{2}\.osm\.pbf' | sort | tail -1)
            if [ -n "$LATEST_PBF" ]; then
              echo "Downloading $LATEST_PBF from Tigris and applying replication diffs..."
              rclone copyto "tigris:$S3_BUCKET/$S3_PREFIX/pbf/$LATEST_PBF" \
                "$WORKDIR/planet.osm.pbf" --progress --retries 5 --low-level-retries 10 --multi-thread-streams 16
              while true; do
                RC=0
                pyosmium-up-to-date -v \
                  --server https://planet.openstreetmap.org/replication/day \
                  -s 2000 "$WORKDIR/planet.osm.pbf" 2>&1 || RC=$?
                if [ $RC -eq 0 ]; then break
                elif [ $RC -eq 1 ]; then echo "More diffs to apply..."
                else exit $RC
                fi
              done
              echo "method=diff" >> "$GITHUB_OUTPUT"
            else
              echo "No stored PBF — downloading fresh planet from multiple mirrors..."
              PBF_FILE=$(curl -sI "https://planet.openstreetmap.org/pbf/planet-latest.osm.pbf" \
                | grep -i '^location:' | awk '{print $2}' | tr -d '\r' | xargs basename)
              echo "Latest PBF: $PBF_FILE"
              aria2c -x 16 -s 16 -j 16 --max-tries=3 \
                -d "$WORKDIR" -o planet.osm.pbf \
                "https://planet.openstreetmap.org/pbf/$PBF_FILE" \
                "https://ftpmirror.your.org/pub/openstreetmap/pbf/$PBF_FILE" \
                "https://ftp.osuosl.org/pub/openstreetmap/pbf/$PBF_FILE" \
                "https://ftp5.gwdg.de/pub/misc/openstreetmap/planet.openstreetmap.org/pbf/$PBF_FILE"
              echo "method=download" >> "$GITHUB_OUTPUT"
            fi
          fi

          ls -lh "$WORKDIR/planet.osm.pbf"

      - name: Verify PBF date
        if: steps.meta.outputs.skip != 'true'
        id: pbf_date
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          PBF_DATE=$(osmium fileinfo -g header.option.osmosis_replication_timestamp "$WORKDIR/planet.osm.pbf" | cut -dT -f1)
          echo "date=$PBF_DATE" >> "$GITHUB_OUTPUT"
          echo "PBF replication date: $PBF_DATE (expected: $TODAY)"
          if [ "$PBF_DATE" != "$TODAY" ]; then
            YESTERDAY=$(date -u -d "yesterday" +%Y-%m-%d)
            if [ "$PBF_DATE" = "$YESTERDAY" ]; then
              echo "::warning::PBF is from yesterday ($PBF_DATE), today's diff not yet available"
            else
              echo "::error::PBF replication date $PBF_DATE is too old (expected $TODAY or $YESTERDAY)"
              exit 1
            fi
          fi

      - name: Build index with all variants
        if: steps.meta.outputs.skip != 'true'
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
        run: |
          echo "Building geocoder index (continents + modes + quality variants)..."
          time build-index "$WORKDIR/output/" "$WORKDIR/planet.osm.pbf" \
            --continents --multi-output --multi-quality 2>&1 | tail -10
          echo ""
          find "$WORKDIR/output" -name "*.bin" | wc -l
          echo "bin files across all variants"

      - name: Upload PBF to S3
        if: steps.meta.outputs.skip != 'true'
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          BUILD_DATE: ${{ steps.pbf_date.outputs.date || steps.meta.outputs.date }}
        run: |
          echo "Uploading PBF as planet-${BUILD_DATE}.osm.pbf..."
          rclone copyto "$WORKDIR/planet.osm.pbf" \
            "tigris:$S3_BUCKET/$S3_PREFIX/pbf/planet-${BUILD_DATE}.osm.pbf" \
            --progress --retries 5 --low-level-retries 10 --multi-thread-streams 16 \
            --s3-upload-concurrency 32 --s3-chunk-size 256M --s3-no-check-bucket
          rm -f "$WORKDIR/planet.osm.pbf"

      - name: Upload builds to S3
        if: steps.meta.outputs.skip != 'true'
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          BUILD_DATE: ${{ steps.pbf_date.outputs.date || steps.meta.outputs.date }}
        run: |
          rclone sync "$WORKDIR/output/" \
            "tigris:$S3_BUCKET/$S3_PREFIX/builds/$BUILD_DATE/" \
            --progress --transfers 32 --retries 5 --low-level-retries 10 \
            --s3-upload-concurrency 32 --s3-chunk-size 256M --s3-no-check-bucket --checkers 32

          echo "$BUILD_DATE" | rclone rcat "tigris:$S3_BUCKET/$S3_PREFIX/builds/latest.txt"

      - name: Find previous build
        if: steps.meta.outputs.skip != 'true' && inputs.skip_patch != true
        id: prev
        env:
          CURRENT: ${{ steps.pbf_date.outputs.date || steps.meta.outputs.date }}
        run: |
          PREV=$(rclone lsd "tigris:$S3_BUCKET/$S3_PREFIX/builds/" 2>/dev/null \
            | awk '{print $NF}' \
            | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' \
            | sort | grep -B1 "^$CURRENT$" | head -1)

          if [ -n "$PREV" ] && [ "$PREV" != "$CURRENT" ]; then
            echo "date=$PREV" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Previous build: $PREV"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No previous build found — will verify via second build"
          fi

      - name: Bootstrap validation (no previous build)
        if: steps.prev.outputs.found != 'true' && steps.meta.outputs.skip != 'true' && inputs.skip_patch != true
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
        run: |
          echo "No previous build — building again to validate determinism + patch pipeline"
          echo "Downloading today's PBF again..."

          # Re-download the PBF we already uploaded
          BUILD_DATE="${{ steps.pbf_date.outputs.date || steps.meta.outputs.date }}"
          rclone copyto "tigris:$S3_BUCKET/$S3_PREFIX/pbf/planet-${BUILD_DATE}.osm.pbf" \
            "$WORKDIR/planet-verify.osm.pbf" --progress --retries 5 --low-level-retries 10 --multi-thread-streams 16

          time build-index "$WORKDIR/output2/" "$WORKDIR/planet-verify.osm.pbf" \
            --continents --multi-output --multi-quality 2>&1 | tail -5
          rm -f "$WORKDIR/planet-verify.osm.pbf"

          echo ""
          echo "=== Comparing builds ==="
          FAIL=0
          while IFS= read -r f; do
            rel="${f#$WORKDIR/output/}"
            if ! cmp -s "$f" "$WORKDIR/output2/$rel"; then
              echo "::error::Bootstrap MISMATCH: $rel"
              FAIL=1
            fi
          done < <(find "$WORKDIR/output" -name "*.bin")
          rm -rf "$WORKDIR/output2"

          if [ $FAIL -ne 0 ]; then
            echo "::error::Bootstrap determinism check FAILED"
            exit 1
          fi
          echo "Bootstrap determinism: PASS (two identical builds)"

          # Also verify identity patch round-trip on planet variant
          echo ""
          echo "=== Verifying patch pipeline (identity) ==="
          DIR="$WORKDIR/output/planet"
          if [ -d "$DIR" ]; then
            geocoder-diff "$DIR" "$DIR" -o "$WORKDIR/test.gcpatch" 2>/dev/null
            mkdir -p "$WORKDIR/verify"
            geocoder-patch "$DIR" "$WORKDIR/test.gcpatch" -o "$WORKDIR/verify/" 2>/dev/null
            for f in "$DIR"/*.bin; do
              b=$(basename "$f")
              if ! cmp -s "$WORKDIR/verify/$b" "$DIR/$b"; then
                echo "::error::Identity patch MISMATCH: $b"
                FAIL=1
              fi
            done
            rm -rf "$WORKDIR/verify" "$WORKDIR/test.gcpatch"
            [ $FAIL -eq 0 ] && echo "Identity patch: PASS" || exit 1
          fi

      - name: Download previous build from S3
        if: steps.prev.outputs.found == 'true'
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          PREV: ${{ steps.prev.outputs.date }}
        run: |
          echo "Downloading previous build ($PREV) from S3..."
          rclone sync "tigris:$S3_BUCKET/$S3_PREFIX/builds/$PREV/" \
            "$WORKDIR/prev-build/" \
            --progress --transfers 16 --retries 5 --low-level-retries 10

      - name: Generate and verify patches for all variants
        if: steps.prev.outputs.found == 'true'
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          PREV: ${{ steps.prev.outputs.date }}
          CURRENT: ${{ steps.pbf_date.outputs.date || steps.meta.outputs.date }}
        run: |
          echo "## Patch Generation ($PREV → $CURRENT)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Variant | Files | Patch Size | Verified |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|-----------|----------|" >> "$GITHUB_STEP_SUMMARY"

          RESULTS_DIR="$WORKDIR/results"
          PATCHES_DIR="$WORKDIR/patches-out"
          mkdir -p "$RESULTS_DIR" "$PATCHES_DIR"
          VARIANTS=$(cd "$WORKDIR/output" && find . -name "*.bin" -exec dirname {} \; | sort -u | sed 's|^\./||')

          # Process variants in parallel
          JOBS=0
          MAX_JOBS=$(nproc)
          for variant in $VARIANTS; do
            (
              NEW_DIR="$WORKDIR/output/$variant"
              PREV_DIR="$WORKDIR/prev-build/$variant"
              N_NEW=$(ls "$NEW_DIR"/*.bin 2>/dev/null | wc -l)
              N_PREV=$(ls "$PREV_DIR"/*.bin 2>/dev/null | wc -l)
              SAFE_NAME=$(echo "$variant" | tr '/' '_')

              if [ "$N_NEW" -lt 2 ]; then exit 0; fi
              if [ "$N_PREV" -ne "$N_NEW" ]; then
                echo "SKIP" > "$RESULTS_DIR/$SAFE_NAME"
                exit 0
              fi

              PATCH_FILE="$PATCHES_DIR/$SAFE_NAME.gcpatch"
              geocoder-diff "$PREV_DIR" "$NEW_DIR" -o "$PATCH_FILE" 2>/dev/null
              PATCH_SIZE=$(stat -c%s "$PATCH_FILE" 2>/dev/null || echo 0)
              PATCH_KB=$((PATCH_SIZE / 1024))

              VERIFY_DIR="$WORKDIR/verify-$SAFE_NAME"
              mkdir -p "$VERIFY_DIR"
              geocoder-patch "$PREV_DIR" "$PATCH_FILE" -o "$VERIFY_DIR/" 2>/dev/null

              MATCH=0
              for f in "$NEW_DIR"/*.bin; do
                b=$(basename "$f")
                h1=$(md5sum "$VERIFY_DIR/$b" 2>/dev/null | awk '{print $1}')
                h2=$(md5sum "$NEW_DIR/$b" | awk '{print $1}')
                [ "$h1" = "$h2" ] && MATCH=$((MATCH + 1))
              done

              if [ $MATCH -eq $N_NEW ]; then
                echo "PASS $N_NEW $PATCH_KB $variant" > "$RESULTS_DIR/$SAFE_NAME"
              else
                echo "FAIL $MATCH $N_NEW $PATCH_KB $variant" > "$RESULTS_DIR/$SAFE_NAME"
              fi
              rm -rf "$VERIFY_DIR"
            ) &

            JOBS=$((JOBS + 1))
            if [ $JOBS -ge $MAX_JOBS ]; then
              wait -n 2>/dev/null || true
              JOBS=$((JOBS - 1))
            fi
          done
          wait

          rm -rf "$WORKDIR/prev-build"

          # Collect results and upload verified patches
          PASS=0; FAIL=0; SKIP=0
          for variant in $VARIANTS; do
            SAFE_NAME=$(echo "$variant" | tr '/' '_')
            RESULT_FILE="$RESULTS_DIR/$SAFE_NAME"
            [ ! -f "$RESULT_FILE" ] && continue
            RESULT=$(cat "$RESULT_FILE")

            if [ "$RESULT" = "SKIP" ]; then
              SKIP=$((SKIP + 1))
            elif echo "$RESULT" | grep -q "^PASS"; then
              N_NEW=$(echo "$RESULT" | awk '{print $2}')
              PATCH_KB=$(echo "$RESULT" | awk '{print $3}')
              echo "  $variant: PASS ($N_NEW/$N_NEW, ${PATCH_KB} KiB)"
              echo "| $variant | $N_NEW | ${PATCH_KB} KiB | PASS |" >> "$GITHUB_STEP_SUMMARY"
              PASS=$((PASS + 1))

              rclone copyto "$PATCHES_DIR/$SAFE_NAME.gcpatch" \
                "tigris:$S3_BUCKET/$S3_PREFIX/patches/$variant/${PREV}-to-${CURRENT}.gcpatch" \
                --retries 5 --low-level-retries 10 &
            else
              MATCH=$(echo "$RESULT" | awk '{print $2}')
              N_NEW=$(echo "$RESULT" | awk '{print $3}')
              PATCH_KB=$(echo "$RESULT" | awk '{print $4}')
              echo "::error::$variant: FAIL ($MATCH/$N_NEW match)"
              echo "| $variant | $N_NEW | ${PATCH_KB} KiB | **FAIL** |" >> "$GITHUB_STEP_SUMMARY"
              FAIL=$((FAIL + 1))
            fi
          done
          wait
          rm -rf "$RESULTS_DIR" "$PATCHES_DIR"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total: $PASS pass, $FAIL fail, $SKIP skip**" >> "$GITHUB_STEP_SUMMARY"

          echo "Results: $PASS pass, $FAIL fail, $SKIP skip"
          [ $FAIL -gt 0 ] && exit 1 || true

          echo ""
          echo "Results: $PASS pass, $FAIL fail, $SKIP skip"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total: $PASS pass, $FAIL fail, $SKIP skip**" >> "$GITHUB_STEP_SUMMARY"

          [ $FAIL -gt 0 ] && exit 1 || true

      - name: Clean up old builds (keep last 2)
        if: steps.meta.outputs.skip != 'true'
        run: |
          BUILDS=$(rclone lsd "tigris:$S3_BUCKET/$S3_PREFIX/builds/" 2>/dev/null \
            | awk '{print $NF}' \
            | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' \
            | sort -r)

          COUNT=0
          while IFS= read -r build; do
            [ -z "$build" ] && continue
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt 2 ]; then
              echo "Deleting old build: $build"
              rclone purge "tigris:$S3_BUCKET/$S3_PREFIX/builds/$build/" \
                --retries 3
            fi
          done <<< "$BUILDS"

      - name: Update index.json
        if: steps.meta.outputs.skip != 'true'
        env:
          BUILD_DATE: ${{ steps.pbf_date.outputs.date || steps.meta.outputs.date }}
        run: |
          BUILDS_JSON=$(rclone lsd "tigris:$S3_BUCKET/$S3_PREFIX/builds/" 2>/dev/null \
            | awk '{print $NF}' \
            | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' \
            | sort -r \
            | while read -r b; do
                REGIONS_LIST=$(rclone lsd "tigris:$S3_BUCKET/$S3_PREFIX/builds/$b/" 2>/dev/null \
                  | awk '{print $NF}' \
                  | jq -R . | jq -s .)
                echo "{\"date\":\"$b\",\"regions\":$REGIONS_LIST}"
              done | jq -s .)

          PATCHES_JSON=$(for region in $REGIONS; do
            REGION_PATCHES=$(rclone ls "tigris:$S3_BUCKET/$S3_PREFIX/patches/$region/" 2>/dev/null \
              | grep '\.gcpatch$' \
              | while read -r SIZE NAME; do
                  p=$(basename "$NAME")
                  FROM=$(echo "$p" | sed 's/\(.*\)-to-.*/\1/')
                  TO=$(echo "$p" | sed 's/.*-to-\(.*\)\.gcpatch/\1/')
                  echo "{\"from\":\"$FROM\",\"to\":\"$TO\",\"file\":\"patches/$region/$p\",\"bytes\":${SIZE:-0}}"
                done | jq -s .)
            [ -z "$REGION_PATCHES" ] && REGION_PATCHES="[]"
            [ "$REGION_PATCHES" = "null" ] && REGION_PATCHES="[]"
            echo "{\"region\":\"$region\",\"patches\":$REGION_PATCHES}"
          done | jq -s .)

          jq -n \
            --arg updated "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg latest "$BUILD_DATE" \
            --argjson builds "$BUILDS_JSON" \
            --argjson patches "$PATCHES_JSON" \
            '{
              updated: $updated,
              latest_build: $latest,
              builds: $builds,
              patches: $patches
            }' > /tmp/index.json

          rclone copyto /tmp/index.json \
            "tigris:$S3_BUCKET/$S3_PREFIX/index.json" \
            --retries 5

      - name: Summary
        if: always()
        env:
          BUILD_DATE: ${{ steps.pbf_date.outputs.date || steps.meta.outputs.date }}
          PBF_METHOD: ${{ steps.pbf.outputs.method || 'skipped' }}
          WAS_SKIPPED: ${{ steps.meta.outputs.skip }}
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Build Info" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Date** | $BUILD_DATE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **PBF method** | $PBF_METHOD |" >> "$GITHUB_STEP_SUMMARY"
          if [ "$WAS_SKIPPED" = "true" ]; then
            echo "| **Status** | Skipped (already exists) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| **Status** | Built and uploaded |" >> "$GITHUB_STEP_SUMMARY"
          fi
