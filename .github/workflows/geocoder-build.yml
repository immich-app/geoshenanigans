name: Build Geocoder Index

concurrency:
  group: geocoder-build-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: '0 6 * * *'
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - 'geocoder/**'
      - '.github/workflows/geocoder-build.yml'
  workflow_dispatch:
    inputs:
      pbf_url:
        description: 'Override PBF URL (leave empty to use replication diffs)'
        required: false
        type: string
      skip_patch:
        description: 'Skip patch generation'
        required: false
        type: boolean
        default: false
      runner:
        description: 'Runner label'
        required: false
        type: string
        default: 'self-hosted'

env:
  S3_BUCKET: geoshenanigans-reverse-geocoding
  S3_PREFIX: geocoder
  REGIONS: "planet africa asia europe north-america south-america oceania central-america antarctica"

permissions:
  contents: read

jobs:
  # --- PR validation: build tools + small test build ---
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake g++ libz-dev libzstd-dev \
            libbz2-dev libexpat1-dev libs2-dev libosmium2-dev

      - name: Build tools
        run: |
          cd geocoder/builder && mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc) build-index geocoder-diff geocoder-patch

      - name: Download Monaco PBF
        run: |
          curl -sL -o /tmp/monaco.osm.pbf \
            "https://download.geofabrik.de/europe/monaco-latest.osm.pbf"

      - name: Test determinism + diff + patch
        run: |
          cd geocoder/builder/build
          RUNS=5

          # Build N times from same PBF
          for i in $(seq 1 $RUNS); do
            echo "=== Build $i/$RUNS ==="
            ./build-index "/tmp/build-$i/" /tmp/monaco.osm.pbf --simplify-epsilon --epsilon-scale 1 2>&1 | tail -1
          done

          # Cross-compare all builds against build 1
          echo ""
          echo "=== Determinism check ($RUNS builds) ==="
          FAIL=0
          for i in $(seq 2 $RUNS); do
            for f in /tmp/build-1/*.bin; do
              b=$(basename "$f")
              if ! cmp -s "/tmp/build-1/$b" "/tmp/build-$i/$b"; then
                echo "::error::Build $i differs from build 1: $b"
                FAIL=1
              fi
            done
          done
          [ $FAIL -eq 0 ] && echo "Determinism: PASS ($RUNS identical builds)" || exit 1

          # Test diff + patch round-trip (build 1 → build 1, should be identity)
          echo ""
          echo "=== Diff + Patch round-trip ==="
          ./geocoder-diff /tmp/build-1/ /tmp/build-1/ -o /tmp/test.gcpatch 2>&1 | tail -1
          ./geocoder-patch /tmp/build-1/ /tmp/test.gcpatch -o /tmp/patched/ 2>&1 | tail -1

          for f in /tmp/build-1/*.bin; do
            b=$(basename "$f")
            if ! cmp -s "/tmp/patched/$b" "/tmp/build-1/$b"; then
              echo "::error::Patch round-trip MISMATCH: $b"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] && echo "Patch round-trip: PASS" || exit 1

  # --- PR planet test: full build + validation without S3 (triggered by label) ---
  planet-test:
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'planet-test')
    runs-on: pokedex-giant
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake g++ libz-dev libzstd-dev \
            libbz2-dev libexpat1-dev libs2-dev libosmium2-dev aria2 jq osmium-tool
          curl -sL "https://github.com/peak/s5cmd/releases/download/v2.3.0/s5cmd_2.3.0_Linux-64bit.tar.gz" \
            -o /tmp/s5cmd.tar.gz
          sudo tar xzf /tmp/s5cmd.tar.gz -C /usr/local/bin s5cmd

      - name: Configure Tigris credentials
        run: |
          echo "TIGRIS_ACCESS_KEY_ID=$S3_ACCESS_KEY_ID" >> "$GITHUB_ENV"
          echo "TIGRIS_SECRET_ACCESS_KEY=$S3_SECRET_ACCESS_KEY" >> "$GITHUB_ENV"
        env:
          S3_ACCESS_KEY_ID: ${{ secrets.TIGRIS_WRITE_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.TIGRIS_WRITE_ACCESS_KEY }}

      - name: Setup rclone
        uses: AnimMouse/setup-rclone@26ef2133e09fd383329a1d4c1fbe6a71db1976c9 # v1.12.0
        with:
          disable_base64: true
          rclone_config: |
            [tigris]
            type = s3
            provider = Other
            region = auto
            endpoint = https://fly.storage.tigris.dev
            env_auth = false
            access_key_id = ${{ secrets.TIGRIS_WRITE_KEY_ID }}
            secret_access_key = ${{ secrets.TIGRIS_WRITE_ACCESS_KEY }}

      - name: Build tools
        run: |
          cd geocoder/builder && mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc) build-index geocoder-diff geocoder-patch
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Setup workdir
        id: setup
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          WORKDIR="$RUNNER_TEMP/geocoder-test"
          mkdir -p "$WORKDIR"
          echo "workdir=$WORKDIR" >> "$GITHUB_OUTPUT"
          echo "cache_endpoint=http://${BUCKET_HOST}:${BUCKET_PORT}" >> "$GITHUB_OUTPUT"
          echo "cache_bucket=$BUCKET_NAME" >> "$GITHUB_OUTPUT"

      - name: Determine dates and sequences
        id: dates
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
        run: |
          SERVER="https://planet.openstreetmap.org/replication/day"
          CURRENT_SEQ=$(curl -sL "$SERVER/state.txt" | grep sequenceNumber | cut -d= -f2)
          CURRENT_DATE=$(curl -sL "$SERVER/state.txt" | grep timestamp | cut -d= -f2 | tr '\\' ' ' | cut -dT -f1 | tr -d ' ')
          YESTERDAY=$(date -u -d "yesterday" +%Y-%m-%d)

          echo "today=$CURRENT_DATE" >> "$GITHUB_OUTPUT"
          echo "yesterday=$YESTERDAY" >> "$GITHUB_OUTPUT"
          echo "today_seq=$CURRENT_SEQ" >> "$GITHUB_OUTPUT"
          echo "yesterday_seq=$((CURRENT_SEQ - 1))" >> "$GITHUB_OUTPUT"
          echo "Server: date=$CURRENT_DATE seq=$CURRENT_SEQ"

      - name: Obtain yesterday's PBF
        id: yesterday_pbf
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          CACHE_ENDPOINT: ${{ steps.setup.outputs.cache_endpoint }}
          CACHE_BUCKET: ${{ steps.setup.outputs.cache_bucket }}
          YESTERDAY: ${{ steps.dates.outputs.yesterday }}
          YESTERDAY_SEQ: ${{ steps.dates.outputs.yesterday_seq }}
          TODAY_SEQ: ${{ steps.dates.outputs.today_seq }}
        run: |
          CACHE="s5cmd --endpoint-url $CACHE_ENDPOINT"
          CACHE_PBF="s3://$CACHE_BUCKET/geocoder-cache/planet-${YESTERDAY}.osm.pbf"

          # Check cache for yesterday's PBF
          if timeout 10 $CACHE ls "$CACHE_PBF" 2>/dev/null | grep -q "planet-"; then
            echo "Cache HIT: yesterday's PBF ($YESTERDAY)"
            START=$(date +%s)
            $CACHE cp "$CACHE_PBF" "$WORKDIR/planet.osm.pbf"
            END=$(date +%s)
            SIZE=$(stat -c%s "$WORKDIR/planet.osm.pbf")
            echo "Downloaded from cache: $((SIZE/1024/1024)) MiB in $((END-START))s ($((SIZE/1024/1024/(END-START+1))) MB/s)"
            echo "cache_hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "Cache MISS: no PBF for $YESTERDAY"
            echo "cache_hit=false" >> "$GITHUB_OUTPUT"

            # Download from mirrors
            echo "Downloading planet PBF from mirrors..."
            aria2c -x 16 -s 16 -j 16 --max-tries=3 \
              -d "$WORKDIR" -o planet.osm.pbf \
              "https://planet.openstreetmap.org/pbf/planet-latest.osm.pbf" \
              "https://ftpmirror.your.org/pub/openstreetmap/pbf/planet-latest.osm.pbf" \
              "https://ftp.osuosl.org/pub/openstreetmap/pbf/planet-latest.osm.pbf" \
              "https://ftp5.gwdg.de/pub/misc/openstreetmap/planet.openstreetmap.org/pbf/planet-latest.osm.pbf"

            # Determine PBF's sequence and apply diffs to yesterday
            PBF_DATE=$(osmium fileinfo -g header.option.osmosis_replication_timestamp "$WORKDIR/planet.osm.pbf" | cut -dT -f1)
            DAYS_TO_YESTERDAY=$(( ($(date -u -d "$YESTERDAY" +%s) - $(date -u -d "$PBF_DATE" +%s)) / 86400 ))
            PBF_SEQ=$((YESTERDAY_SEQ - DAYS_TO_YESTERDAY))
            echo "PBF: date=$PBF_DATE seq=$PBF_SEQ, need $DAYS_TO_YESTERDAY diffs to reach $YESTERDAY"

            if [ $DAYS_TO_YESTERDAY -gt 0 ]; then
              echo "Downloading $DAYS_TO_YESTERDAY diffs..."
              DIFFS=""
              for S in $(seq $((PBF_SEQ + 1)) $YESTERDAY_SEQ); do
                DIR1=$(printf "%03d" $((S / 1000000)))
                DIR2=$(printf "%03d" $(((S / 1000) % 1000)))
                FILE=$(printf "%03d" $((S % 1000)))
                curl -sL -o "$WORKDIR/diff-${S}.osc.gz" \
                  "https://planet.openstreetmap.org/replication/day/$DIR1/$DIR2/${FILE}.osc.gz"
                echo "  Downloaded seq $S"
                DIFFS="$DIFFS $WORKDIR/diff-${S}.osc.gz"
              done

              echo "Applying $DAYS_TO_YESTERDAY diffs in batches of 3..."
              BATCH=""
              COUNT=0
              for D in $DIFFS; do
                BATCH="$BATCH $D"
                COUNT=$((COUNT + 1))
                if [ $COUNT -ge 3 ]; then
                  echo "  Applying batch ($COUNT diffs)..."
                  osmium apply-changes "$WORKDIR/planet.osm.pbf" $BATCH \
                    -o "$WORKDIR/planet-tmp.osm.pbf" --overwrite
                  mv "$WORKDIR/planet-tmp.osm.pbf" "$WORKDIR/planet.osm.pbf"
                  rm -f $BATCH
                  BATCH=""
                  COUNT=0
                fi
              done
              if [ -n "$BATCH" ]; then
                echo "  Applying final batch ($COUNT diffs)..."
                osmium apply-changes "$WORKDIR/planet.osm.pbf" $BATCH \
                  -o "$WORKDIR/planet-tmp.osm.pbf" --overwrite
                mv "$WORKDIR/planet-tmp.osm.pbf" "$WORKDIR/planet.osm.pbf"
                rm -f $BATCH
              fi
            fi

            # Cache yesterday's PBF
            PBF_DATE=$(osmium fileinfo -g header.option.osmosis_replication_timestamp "$WORKDIR/planet.osm.pbf" | cut -dT -f1)
            echo "PBF now at: $PBF_DATE — caching..."
            START=$(date +%s)
            $CACHE cp "$WORKDIR/planet.osm.pbf" "s3://$CACHE_BUCKET/geocoder-cache/planet-${PBF_DATE}.osm.pbf"
            END=$(date +%s)
            SIZE=$(stat -c%s "$WORKDIR/planet.osm.pbf")
            echo "Cached: $((SIZE/1024/1024)) MiB in $((END-START))s ($((SIZE/1024/1024/(END-START+1))) MB/s)"
          fi
          ls -lh "$WORKDIR/planet.osm.pbf"

      - name: Build yesterday's index
        id: old_build
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
        run: |
          OLD_DATE=$(osmium fileinfo -g header.option.osmosis_replication_timestamp "$WORKDIR/planet.osm.pbf" | cut -dT -f1)
          echo "date=$OLD_DATE" >> "$GITHUB_OUTPUT"
          echo "Building yesterday's index ($OLD_DATE)..."
          time build-index "$WORKDIR/old-output/" "$WORKDIR/planet.osm.pbf" \
            --continents --multi-output --multi-quality 2>&1 | tail -10
          echo "$(find "$WORKDIR/old-output" -name "*.bin" | wc -l) bin files produced"

      - name: Obtain today's PBF
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          CACHE_ENDPOINT: ${{ steps.setup.outputs.cache_endpoint }}
          CACHE_BUCKET: ${{ steps.setup.outputs.cache_bucket }}
          TODAY: ${{ steps.dates.outputs.today }}
          TODAY_SEQ: ${{ steps.dates.outputs.today_seq }}
          YESTERDAY_SEQ: ${{ steps.dates.outputs.yesterday_seq }}
        run: |
          CACHE="s5cmd --endpoint-url $CACHE_ENDPOINT"
          CACHE_PBF="s3://$CACHE_BUCKET/geocoder-cache/planet-${TODAY}.osm.pbf"

          if timeout 10 $CACHE ls "$CACHE_PBF" 2>/dev/null | grep -q "planet-"; then
            echo "Cache HIT: today's PBF ($TODAY)"
            START=$(date +%s)
            $CACHE cp "$CACHE_PBF" "$WORKDIR/planet.osm.pbf"
            END=$(date +%s)
            SIZE=$(stat -c%s "$WORKDIR/planet.osm.pbf")
            echo "Downloaded from cache: $((SIZE/1024/1024)) MiB in $((END-START))s ($((SIZE/1024/1024/(END-START+1))) MB/s)"
          else
            echo "Cache MISS: applying today's diff (seq $TODAY_SEQ)..."
            DIR1=$(printf "%03d" $((TODAY_SEQ / 1000000)))
            DIR2=$(printf "%03d" $(((TODAY_SEQ / 1000) % 1000)))
            FILE=$(printf "%03d" $((TODAY_SEQ % 1000)))
            curl -sL -o "$WORKDIR/diff-today.osc.gz" \
              "https://planet.openstreetmap.org/replication/day/$DIR1/$DIR2/${FILE}.osc.gz"

            time osmium apply-changes "$WORKDIR/planet.osm.pbf" "$WORKDIR/diff-today.osc.gz" \
              -o "$WORKDIR/planet-tmp.osm.pbf" --overwrite
            mv "$WORKDIR/planet-tmp.osm.pbf" "$WORKDIR/planet.osm.pbf"
            rm -f "$WORKDIR/diff-today.osc.gz"

            PBF_DATE=$(osmium fileinfo -g header.option.osmosis_replication_timestamp "$WORKDIR/planet.osm.pbf" | cut -dT -f1)
            echo "PBF now at: $PBF_DATE — caching..."
            START=$(date +%s)
            $CACHE cp "$WORKDIR/planet.osm.pbf" "s3://$CACHE_BUCKET/geocoder-cache/planet-${PBF_DATE}.osm.pbf"
            END=$(date +%s)
            SIZE=$(stat -c%s "$WORKDIR/planet.osm.pbf")
            echo "Cached: $((SIZE/1024/1024)) MiB in $((END-START))s ($((SIZE/1024/1024/(END-START+1))) MB/s)"
          fi

      - name: Build today's index
        id: new_build
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
        run: |
          NEW_DATE=$(osmium fileinfo -g header.option.osmosis_replication_timestamp "$WORKDIR/planet.osm.pbf" | cut -dT -f1)
          echo "date=$NEW_DATE" >> "$GITHUB_OUTPUT"
          echo "Building today's index ($NEW_DATE)..."
          time build-index "$WORKDIR/output/" "$WORKDIR/planet.osm.pbf" \
            --continents --multi-output --multi-quality 2>&1 | tail -10
          rm -f "$WORKDIR/planet.osm.pbf"
          echo "$(find "$WORKDIR/output" -name "*.bin" | wc -l) bin files produced"

      - name: Generate and verify patches
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          OLD_DATE: ${{ steps.old_build.outputs.date }}
          NEW_DATE: ${{ steps.new_build.outputs.date }}
        run: |
          echo "## Planet Test Results ($OLD_DATE → $NEW_DATE)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Variant | Files | Patch Size | Verified |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|-----------|----------|" >> "$GITHUB_STEP_SUMMARY"

          RESULTS_DIR="$WORKDIR/results"
          mkdir -p "$RESULTS_DIR"
          VARIANTS=$(cd "$WORKDIR/output" && find . -name "*.bin" -exec dirname {} \; | sort -u | sed 's|^\./||')

          JOBS=0
          MAX_JOBS=$(nproc)
          for variant in $VARIANTS; do
            (
              NEW_DIR="$WORKDIR/output/$variant"
              OLD_DIR="$WORKDIR/old-output/$variant"
              N_NEW=$(ls "$NEW_DIR"/*.bin 2>/dev/null | wc -l)
              N_OLD=$(ls "$OLD_DIR"/*.bin 2>/dev/null | wc -l)
              SAFE_NAME=$(echo "$variant" | tr '/' '_')

              if [ "$N_NEW" -lt 2 ]; then exit 0; fi
              if [ "$N_OLD" -ne "$N_NEW" ]; then
                echo "SKIP" > "$RESULTS_DIR/$SAFE_NAME"
                exit 0
              fi

              PATCH_FILE="$WORKDIR/patch-$SAFE_NAME.gcpatch"
              geocoder-diff "$OLD_DIR" "$NEW_DIR" -o "$PATCH_FILE" 2>/dev/null
              PATCH_SIZE=$(stat -c%s "$PATCH_FILE" 2>/dev/null || echo 0)
              PATCH_KB=$((PATCH_SIZE / 1024))

              VERIFY_DIR="$WORKDIR/verify-$SAFE_NAME"
              mkdir -p "$VERIFY_DIR"
              geocoder-patch "$OLD_DIR" "$PATCH_FILE" -o "$VERIFY_DIR/" 2>/dev/null

              MATCH=0
              for f in "$NEW_DIR"/*.bin; do
                b=$(basename "$f")
                h1=$(md5sum "$VERIFY_DIR/$b" 2>/dev/null | awk '{print $1}')
                h2=$(md5sum "$NEW_DIR/$b" | awk '{print $1}')
                [ "$h1" = "$h2" ] && MATCH=$((MATCH + 1))
              done

              if [ $MATCH -eq $N_NEW ]; then
                echo "PASS $N_NEW $PATCH_KB" > "$RESULTS_DIR/$SAFE_NAME"
              else
                echo "FAIL $MATCH $N_NEW $PATCH_KB" > "$RESULTS_DIR/$SAFE_NAME"
              fi
              rm -f "$PATCH_FILE"
              rm -rf "$VERIFY_DIR"
            ) &

            JOBS=$((JOBS + 1))
            if [ $JOBS -ge $MAX_JOBS ]; then
              wait -n 2>/dev/null || true
              JOBS=$((JOBS - 1))
            fi
          done
          wait

          rm -rf "$WORKDIR/old-output"

          PASS=0; FAIL=0; SKIP=0
          for variant in $VARIANTS; do
            SAFE_NAME=$(echo "$variant" | tr '/' '_')
            RESULT_FILE="$RESULTS_DIR/$SAFE_NAME"
            [ ! -f "$RESULT_FILE" ] && continue
            RESULT=$(cat "$RESULT_FILE")

            if [ "$RESULT" = "SKIP" ]; then
              SKIP=$((SKIP + 1))
            elif echo "$RESULT" | grep -q "^PASS"; then
              N_NEW=$(echo "$RESULT" | awk '{print $2}')
              PATCH_KB=$(echo "$RESULT" | awk '{print $3}')
              echo "  $variant: PASS ($N_NEW/$N_NEW, ${PATCH_KB} KiB)"
              echo "| $variant | $N_NEW | ${PATCH_KB} KiB | PASS |" >> "$GITHUB_STEP_SUMMARY"
              PASS=$((PASS + 1))
            else
              MATCH=$(echo "$RESULT" | awk '{print $2}')
              N_NEW=$(echo "$RESULT" | awk '{print $3}')
              PATCH_KB=$(echo "$RESULT" | awk '{print $4}')
              echo "::error::$variant: FAIL ($MATCH/$N_NEW match)"
              echo "| $variant | $N_NEW | ${PATCH_KB} KiB | **FAIL** |" >> "$GITHUB_STEP_SUMMARY"
              FAIL=$((FAIL + 1))
            fi
          done
          rm -rf "$RESULTS_DIR"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total: $PASS pass, $FAIL fail, $SKIP skip**" >> "$GITHUB_STEP_SUMMARY"
          echo "Results: $PASS pass, $FAIL fail, $SKIP skip"
          [ $FAIL -gt 0 ] && exit 1 || true

      - name: Upload builds to S3
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          OLD_DATE: ${{ steps.old_build.outputs.date }}
          NEW_DATE: ${{ steps.new_build.outputs.date }}
        run: |
          echo "Uploading yesterday's build ($OLD_DATE)..."
          rclone sync "$WORKDIR/old-output/" \
            "tigris:$S3_BUCKET/$S3_PREFIX/builds/$OLD_DATE/" \
            --progress --transfers 32 --retries 5 --low-level-retries 10 \
            --s3-upload-concurrency 8 --s3-chunk-size 64M --s3-no-check-bucket --checkers 32

          echo "Uploading today's build ($NEW_DATE)..."
          rclone sync "$WORKDIR/output/" \
            "tigris:$S3_BUCKET/$S3_PREFIX/builds/$NEW_DATE/" \
            --progress --transfers 32 --retries 5 --low-level-retries 10 \
            --s3-upload-concurrency 8 --s3-chunk-size 64M --s3-no-check-bucket --checkers 32

          echo "$NEW_DATE" | rclone rcat "tigris:$S3_BUCKET/$S3_PREFIX/builds/latest.txt"
          echo "Upload complete"

  # --- Production build: full planet + S3 upload ---
  build:
    if: github.event_name != 'pull_request'
    runs-on: ${{ inputs.runner || 'pokedex-giant' }}
    timeout-minutes: 240
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake g++ libz-dev libzstd-dev \
            libbz2-dev libexpat1-dev libs2-dev libosmium2-dev aria2 jq

      - name: Configure S3 credentials
        run: |
          echo "AWS_ACCESS_KEY_ID=$S3_ACCESS_KEY_ID" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$S3_SECRET_ACCESS_KEY" >> "$GITHUB_ENV"
        env:
          S3_ACCESS_KEY_ID: ${{ secrets.TIGRIS_WRITE_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.TIGRIS_WRITE_ACCESS_KEY }}

      - name: Setup rclone
        uses: AnimMouse/setup-rclone@26ef2133e09fd383329a1d4c1fbe6a71db1976c9 # v1.12.0
        with:
          disable_base64: true
          rclone_config: |
            [tigris]
            type = s3
            provider = Other
            region = auto
            endpoint = https://fly.storage.tigris.dev
            env_auth = true

      - name: Build tools
        run: |
          cd geocoder/builder && mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc) build-index geocoder-diff geocoder-patch
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Determine build date
        id: meta
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%d)
          echo "date=$BUILD_DATE" >> "$GITHUB_OUTPUT"

          EXISTS=$(rclone ls "tigris:$S3_BUCKET/$S3_PREFIX/builds/$BUILD_DATE/planet/" 2>/dev/null | wc -l)
          if [ "$EXISTS" -gt 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Build for $BUILD_DATE already exists"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Obtain PBF
        if: steps.meta.outputs.skip != 'true'
        id: pbf
        env:
          INPUT_PBF_URL: ${{ inputs.pbf_url }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          WORKDIR="$RUNNER_TEMP/geocoder-build"
          mkdir -p "$WORKDIR"
          echo "workdir=$WORKDIR" >> "$GITHUB_OUTPUT"

          if [ -n "$INPUT_PBF_URL" ]; then
            echo "Downloading from override URL..."
            aria2c -x 8 -s 8 --max-tries=3 -d "$WORKDIR" -o planet.osm.pbf "$INPUT_PBF_URL"
          else
            echo "Downloading planet PBF from mirrors..."
            aria2c -x 16 -s 16 -j 16 --max-tries=3 \
              -d "$WORKDIR" -o planet.osm.pbf \
              "https://planet.openstreetmap.org/pbf/planet-latest.osm.pbf" \
              "https://ftpmirror.your.org/pub/openstreetmap/pbf/planet-latest.osm.pbf" \
              "https://ftp.osuosl.org/pub/openstreetmap/pbf/planet-latest.osm.pbf" \
              "https://ftp5.gwdg.de/pub/misc/openstreetmap/planet.openstreetmap.org/pbf/planet-latest.osm.pbf"
          fi

          ls -lh "$WORKDIR/planet.osm.pbf"

      - name: Build index with all variants
        if: steps.meta.outputs.skip != 'true'
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
        run: |
          echo "Building geocoder index (continents + modes + quality variants)..."
          time build-index "$WORKDIR/output/" "$WORKDIR/planet.osm.pbf" \
            --continents --multi-output --multi-quality 2>&1 | tail -10
          echo ""
          find "$WORKDIR/output" -name "*.bin" | wc -l
          echo "bin files across all variants"

      - name: Upload builds to S3
        if: steps.meta.outputs.skip != 'true'
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          BUILD_DATE: ${{ steps.meta.outputs.date }}
        run: |
          rclone sync "$WORKDIR/output/" \
            "tigris:$S3_BUCKET/$S3_PREFIX/builds/$BUILD_DATE/" \
            --progress --transfers 32 --retries 5 --low-level-retries 10 \
            --s3-upload-concurrency 8 --s3-chunk-size 64M --s3-no-check-bucket --checkers 32

          echo "$BUILD_DATE" | rclone rcat "tigris:$S3_BUCKET/$S3_PREFIX/builds/latest.txt"

      - name: Find previous build
        if: steps.meta.outputs.skip != 'true' && inputs.skip_patch != true
        id: prev
        env:
          CURRENT: ${{ steps.meta.outputs.date }}
        run: |
          PREV=$(rclone lsd "tigris:$S3_BUCKET/$S3_PREFIX/builds/" 2>/dev/null \
            | awk '{print $NF}' \
            | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' \
            | sort | grep -B1 "^$CURRENT$" | head -1)

          if [ -n "$PREV" ] && [ "$PREV" != "$CURRENT" ]; then
            echo "date=$PREV" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Previous build: $PREV"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No previous build found — will verify via second build"
          fi

      - name: Download previous build from S3
        if: steps.prev.outputs.found == 'true'
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          PREV: ${{ steps.prev.outputs.date }}
        run: |
          echo "Downloading previous build ($PREV) from S3..."
          rclone sync "tigris:$S3_BUCKET/$S3_PREFIX/builds/$PREV/" \
            "$WORKDIR/prev-build/" \
            --progress --transfers 16 --retries 5 --low-level-retries 10

      - name: Generate and verify patches for all variants
        if: steps.prev.outputs.found == 'true'
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          PREV: ${{ steps.prev.outputs.date }}
          CURRENT: ${{ steps.meta.outputs.date }}
        run: |
          echo "## Patch Generation ($PREV → $CURRENT)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Variant | Files | Patch Size | Verified |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|-----------|----------|" >> "$GITHUB_STEP_SUMMARY"

          RESULTS_DIR="$WORKDIR/results"
          PATCHES_DIR="$WORKDIR/patches-out"
          mkdir -p "$RESULTS_DIR" "$PATCHES_DIR"
          VARIANTS=$(cd "$WORKDIR/output" && find . -name "*.bin" -exec dirname {} \; | sort -u | sed 's|^\./||')

          # Process variants in parallel
          JOBS=0
          MAX_JOBS=$(nproc)
          for variant in $VARIANTS; do
            (
              NEW_DIR="$WORKDIR/output/$variant"
              PREV_DIR="$WORKDIR/prev-build/$variant"
              N_NEW=$(ls "$NEW_DIR"/*.bin 2>/dev/null | wc -l)
              N_PREV=$(ls "$PREV_DIR"/*.bin 2>/dev/null | wc -l)
              SAFE_NAME=$(echo "$variant" | tr '/' '_')

              if [ "$N_NEW" -lt 2 ]; then exit 0; fi
              if [ "$N_PREV" -ne "$N_NEW" ]; then
                echo "SKIP" > "$RESULTS_DIR/$SAFE_NAME"
                exit 0
              fi

              PATCH_FILE="$PATCHES_DIR/$SAFE_NAME.gcpatch"
              geocoder-diff "$PREV_DIR" "$NEW_DIR" -o "$PATCH_FILE" 2>/dev/null
              PATCH_SIZE=$(stat -c%s "$PATCH_FILE" 2>/dev/null || echo 0)
              PATCH_KB=$((PATCH_SIZE / 1024))

              VERIFY_DIR="$WORKDIR/verify-$SAFE_NAME"
              mkdir -p "$VERIFY_DIR"
              geocoder-patch "$PREV_DIR" "$PATCH_FILE" -o "$VERIFY_DIR/" 2>/dev/null

              MATCH=0
              for f in "$NEW_DIR"/*.bin; do
                b=$(basename "$f")
                h1=$(md5sum "$VERIFY_DIR/$b" 2>/dev/null | awk '{print $1}')
                h2=$(md5sum "$NEW_DIR/$b" | awk '{print $1}')
                [ "$h1" = "$h2" ] && MATCH=$((MATCH + 1))
              done

              if [ $MATCH -eq $N_NEW ]; then
                echo "PASS $N_NEW $PATCH_KB $variant" > "$RESULTS_DIR/$SAFE_NAME"
              else
                echo "FAIL $MATCH $N_NEW $PATCH_KB $variant" > "$RESULTS_DIR/$SAFE_NAME"
              fi
              rm -rf "$VERIFY_DIR"
            ) &

            JOBS=$((JOBS + 1))
            if [ $JOBS -ge $MAX_JOBS ]; then
              wait -n 2>/dev/null || true
              JOBS=$((JOBS - 1))
            fi
          done
          wait

          rm -rf "$WORKDIR/prev-build"

          # Collect results and upload verified patches
          PASS=0; FAIL=0; SKIP=0
          for variant in $VARIANTS; do
            SAFE_NAME=$(echo "$variant" | tr '/' '_')
            RESULT_FILE="$RESULTS_DIR/$SAFE_NAME"
            [ ! -f "$RESULT_FILE" ] && continue
            RESULT=$(cat "$RESULT_FILE")

            if [ "$RESULT" = "SKIP" ]; then
              SKIP=$((SKIP + 1))
            elif echo "$RESULT" | grep -q "^PASS"; then
              N_NEW=$(echo "$RESULT" | awk '{print $2}')
              PATCH_KB=$(echo "$RESULT" | awk '{print $3}')
              echo "  $variant: PASS ($N_NEW/$N_NEW, ${PATCH_KB} KiB)"
              echo "| $variant | $N_NEW | ${PATCH_KB} KiB | PASS |" >> "$GITHUB_STEP_SUMMARY"
              PASS=$((PASS + 1))

              rclone copyto "$PATCHES_DIR/$SAFE_NAME.gcpatch" \
                "tigris:$S3_BUCKET/$S3_PREFIX/patches/$variant/${PREV}-to-${CURRENT}.gcpatch" \
                --retries 5 --low-level-retries 10 &
            else
              MATCH=$(echo "$RESULT" | awk '{print $2}')
              N_NEW=$(echo "$RESULT" | awk '{print $3}')
              PATCH_KB=$(echo "$RESULT" | awk '{print $4}')
              echo "::error::$variant: FAIL ($MATCH/$N_NEW match)"
              echo "| $variant | $N_NEW | ${PATCH_KB} KiB | **FAIL** |" >> "$GITHUB_STEP_SUMMARY"
              FAIL=$((FAIL + 1))
            fi
          done
          wait
          rm -rf "$RESULTS_DIR" "$PATCHES_DIR"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total: $PASS pass, $FAIL fail, $SKIP skip**" >> "$GITHUB_STEP_SUMMARY"

          echo "Results: $PASS pass, $FAIL fail, $SKIP skip"
          [ $FAIL -gt 0 ] && exit 1 || true

          echo ""
          echo "Results: $PASS pass, $FAIL fail, $SKIP skip"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total: $PASS pass, $FAIL fail, $SKIP skip**" >> "$GITHUB_STEP_SUMMARY"

          [ $FAIL -gt 0 ] && exit 1 || true

      - name: Clean up old builds (keep last 2)
        if: steps.meta.outputs.skip != 'true'
        run: |
          BUILDS=$(rclone lsd "tigris:$S3_BUCKET/$S3_PREFIX/builds/" 2>/dev/null \
            | awk '{print $NF}' \
            | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' \
            | sort -r)

          COUNT=0
          while IFS= read -r build; do
            [ -z "$build" ] && continue
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt 2 ]; then
              echo "Deleting old build: $build"
              rclone purge "tigris:$S3_BUCKET/$S3_PREFIX/builds/$build/" \
                --retries 3
            fi
          done <<< "$BUILDS"

      - name: Update index.json
        if: steps.meta.outputs.skip != 'true'
        env:
          BUILD_DATE: ${{ steps.meta.outputs.date }}
        run: |
          BUILDS_JSON=$(rclone lsd "tigris:$S3_BUCKET/$S3_PREFIX/builds/" 2>/dev/null \
            | awk '{print $NF}' \
            | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' \
            | sort -r \
            | while read -r b; do
                REGIONS_LIST=$(rclone lsd "tigris:$S3_BUCKET/$S3_PREFIX/builds/$b/" 2>/dev/null \
                  | awk '{print $NF}' \
                  | jq -R . | jq -s .)
                echo "{\"date\":\"$b\",\"regions\":$REGIONS_LIST}"
              done | jq -s .)

          PATCHES_JSON=$(for region in $REGIONS; do
            REGION_PATCHES=$(rclone ls "tigris:$S3_BUCKET/$S3_PREFIX/patches/$region/" 2>/dev/null \
              | grep '\.gcpatch$' \
              | while read -r SIZE NAME; do
                  p=$(basename "$NAME")
                  FROM=$(echo "$p" | sed 's/\(.*\)-to-.*/\1/')
                  TO=$(echo "$p" | sed 's/.*-to-\(.*\)\.gcpatch/\1/')
                  echo "{\"from\":\"$FROM\",\"to\":\"$TO\",\"file\":\"patches/$region/$p\",\"bytes\":${SIZE:-0}}"
                done | jq -s .)
            [ -z "$REGION_PATCHES" ] && REGION_PATCHES="[]"
            [ "$REGION_PATCHES" = "null" ] && REGION_PATCHES="[]"
            echo "{\"region\":\"$region\",\"patches\":$REGION_PATCHES}"
          done | jq -s .)

          jq -n \
            --arg updated "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg latest "$BUILD_DATE" \
            --argjson builds "$BUILDS_JSON" \
            --argjson patches "$PATCHES_JSON" \
            '{
              updated: $updated,
              latest_build: $latest,
              builds: $builds,
              patches: $patches
            }' > /tmp/index.json

          rclone copyto /tmp/index.json \
            "tigris:$S3_BUCKET/$S3_PREFIX/index.json" \
            --retries 5

      - name: Summary
        if: always()
        env:
          BUILD_DATE: ${{ steps.meta.outputs.date }}
          PBF_METHOD: ${{ steps.pbf.outputs.method || 'skipped' }}
          WAS_SKIPPED: ${{ steps.meta.outputs.skip }}
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Build Info" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Date** | $BUILD_DATE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **PBF method** | $PBF_METHOD |" >> "$GITHUB_STEP_SUMMARY"
          if [ "$WAS_SKIPPED" = "true" ]; then
            echo "| **Status** | Skipped (already exists) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| **Status** | Built and uploaded |" >> "$GITHUB_STEP_SUMMARY"
          fi
