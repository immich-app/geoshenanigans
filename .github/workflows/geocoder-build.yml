name: Build Geocoder Index

concurrency:
  group: geocoder-build
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      build_date:
        description: 'Build a specific date (YYYY-MM-DD). Leave empty for today.'
        required: false
        type: string
      runner:
        description: 'Runner label'
        required: false
        type: string
        default: 'pokedex-giant'

env:
  S3_BUCKET: geoshenanigans-reverse-geocoding
  S3_PREFIX: geocoder
  S3_ENDPOINT: https://t3.storage.dev
  S3_PUBLIC_URL: https://geoshenanigans-reverse-geocoding.t3.tigrisfiles.io

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ inputs.runner || 'pokedex-giant' }}
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # ── Setup ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake g++ libz-dev libzstd-dev \
            libbz2-dev libexpat1-dev libs2-dev libosmium2-dev aria2 jq osmium-tool
          curl -sL "https://github.com/peak/s5cmd/releases/download/v2.3.0/s5cmd_2.3.0_Linux-64bit.tar.gz" \
            -o /tmp/s5cmd.tar.gz
          sudo tar xzf /tmp/s5cmd.tar.gz -C /usr/local/bin s5cmd

      - name: Configure credentials
        run: |
          echo "::add-mask::$AWS_ACCESS_KEY_ID"
          echo "::add-mask::$AWS_SECRET_ACCESS_KEY"
          echo "CACHE_AWS_KEY=$AWS_ACCESS_KEY_ID" >> "$GITHUB_ENV"
          echo "CACHE_AWS_SECRET=$AWS_SECRET_ACCESS_KEY" >> "$GITHUB_ENV"
          echo "AWS_ACCESS_KEY_ID=$KEY" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$SECRET" >> "$GITHUB_ENV"
        env:
          KEY: ${{ secrets.TIGRIS_WRITE_KEY_ID }}
          SECRET: ${{ secrets.TIGRIS_WRITE_ACCESS_KEY }}

      - name: Build tools
        run: |
          cd geocoder/builder && mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc) build-index geocoder-diff geocoder-patch
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Setup
        id: setup
        env:
          BUILD_DATE: ${{ inputs.build_date }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          # Workdir + cache config
          WORKDIR="$RUNNER_TEMP/geocoder"
          mkdir -p "$WORKDIR"
          echo "workdir=$WORKDIR" >> "$GITHUB_OUTPUT"
          echo "cache_endpoint=http://${BUCKET_HOST}:${BUCKET_PORT}" >> "$GITHUB_OUTPUT"
          echo "cache_bucket=$BUCKET_NAME" >> "$GITHUB_OUTPUT"

          # Determine target date + sequence
          SERVER="https://planet.openstreetmap.org/replication/day"
          CURRENT_SEQ=$(curl -sL "$SERVER/state.txt" | grep sequenceNumber | cut -d= -f2)
          CURRENT_DATE=$(curl -sL "$SERVER/state.txt" | grep timestamp | cut -d= -f2 | tr '\\' ' ' | cut -dT -f1 | tr -d ' ')

          TARGET_DATE="${BUILD_DATE:-$CURRENT_DATE}"
          PREV_DATE=$(date -u -d "$TARGET_DATE - 1 day" +%Y-%m-%d)
          DAYS_OFFSET=$(( ($(date -u -d "$CURRENT_DATE" +%s) - $(date -u -d "$TARGET_DATE" +%s)) / 86400 ))
          TARGET_SEQ=$((CURRENT_SEQ - DAYS_OFFSET))

          echo "today=$TARGET_DATE" >> "$GITHUB_OUTPUT"
          echo "yesterday=$PREV_DATE" >> "$GITHUB_OUTPUT"
          echo "today_seq=$TARGET_SEQ" >> "$GITHUB_OUTPUT"

          echo "Build date: $TARGET_DATE (seq $TARGET_SEQ)"
          echo "Previous:   $PREV_DATE"
          echo "Server:     $CURRENT_DATE (seq $CURRENT_SEQ, offset: -${DAYS_OFFSET}d)"

          # Check if previous build exists on Tigris with compatible build_version
          EXPECTED_BUILD_VERSION=2
          PREV_BUILD="s3://$S3_BUCKET/$S3_PREFIX/builds/$PREV_DATE"
          if s5cmd --endpoint-url $S3_ENDPOINT ls "$PREV_BUILD/" 2>/dev/null | head -1 | grep -q .; then
            # Check build_version in previous manifest
            PREV_VERSION=$(s5cmd --endpoint-url $S3_ENDPOINT cat "$PREV_BUILD/manifest.json" 2>/dev/null \
              | jq -r '.build_version // 0' 2>/dev/null || echo 0)
            if [ "$PREV_VERSION" = "$EXPECTED_BUILD_VERSION" ]; then
              echo "has_previous=true" >> "$GITHUB_OUTPUT"
              echo "Previous build ($PREV_DATE) found, build_version=$PREV_VERSION — compatible"
            else
              echo "has_previous=false" >> "$GITHUB_OUTPUT"
              echo "Previous build ($PREV_DATE) found but build_version=$PREV_VERSION (expected $EXPECTED_BUILD_VERSION) — incompatible, building fresh"
            fi
          else
            echo "has_previous=false" >> "$GITHUB_OUTPUT"
            echo "No previous build ($PREV_DATE) — building fresh"
          fi

      # ── Obtain PBF + previous indexes (parallel) ──────────────────
      - name: Download previous indexes + obtain PBF
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          CACHE_ENDPOINT: ${{ steps.setup.outputs.cache_endpoint }}
          CACHE_BUCKET: ${{ steps.setup.outputs.cache_bucket }}
          YESTERDAY: ${{ steps.setup.outputs.yesterday }}
          TODAY: ${{ steps.setup.outputs.today }}
          TODAY_SEQ: ${{ steps.setup.outputs.today_seq }}
          HAS_PREVIOUS: ${{ steps.setup.outputs.has_previous }}
        run: |
          CACHE="env AWS_ACCESS_KEY_ID=$CACHE_AWS_KEY AWS_SECRET_ACCESS_KEY=$CACHE_AWS_SECRET s5cmd --endpoint-url $CACHE_ENDPOINT --retry-count 5 --numworkers 15 --concurrency 16"
          S5="s5cmd --endpoint-url $S3_ENDPOINT --numworkers 32 --concurrency 8"
          STEP_START=$(date +%s)

          # ── Background: download previous indexes ──
          if [ "$HAS_PREVIOUS" = "true" ]; then
            (
              START=$(date +%s)
              CACHE_BUILD="s3://$CACHE_BUCKET/geocoder-cache/builds/$YESTERDAY"

              if $CACHE ls "$CACHE_BUILD/.cache-complete" 2>/dev/null | grep -q ".cache-complete"; then
                echo "[indexes] Downloading $YESTERDAY from local cache..."
                $CACHE cp "$CACHE_BUILD/*" "$WORKDIR/old-output/"
              else
                echo "[indexes] Cache miss — downloading $YESTERDAY via Tigris HTTP..."
                BASE_URL="$S3_PUBLIC_URL/$S3_PREFIX/builds/$YESTERDAY"
                $S5 ls "s3://$S3_BUCKET/$S3_PREFIX/builds/$YESTERDAY/*" \
                  | awk '{print $NF}' | grep '\.bin$\|\.json$' \
                  | while IFS= read -r REL; do
                      DIR="$WORKDIR/old-output/$(dirname "$REL")"
                      mkdir -p "$DIR"
                      echo "$BASE_URL/$REL"
                      echo "  dir=$DIR"
                    done > /tmp/aria2-indexes.txt
                URLS=$(grep -c '^http' /tmp/aria2-indexes.txt || echo 0)
                echo "[indexes] Downloading $URLS files..."
                [ "$URLS" -eq 0 ] && { echo "::error::No index files found for $YESTERDAY"; exit 1; }
                aria2c -x 16 -j 30 --max-tries=3 --auto-file-renaming=false \
                  -i /tmp/aria2-indexes.txt 2>/dev/null

                echo "[indexes] Backfilling local cache..."
                $CACHE cp "$WORKDIR/old-output/*" "$CACHE_BUILD/" 2>/dev/null || true
              fi

              COUNT=$(find "$WORKDIR/old-output" -type f | wc -l)
              SIZE=$(du -sb "$WORKDIR/old-output" | cut -f1)
              ELAPSED=$(($(date +%s) - START))
              echo "[indexes] Done: $COUNT files ($((SIZE/1024/1024)) MiB) in ${ELAPSED}s ($((SIZE/1024/1024/(ELAPSED+1))) MB/s)"
              [ "$COUNT" -eq 0 ] && { echo "::error::Download produced 0 files"; exit 1; }
            ) &
            IDX_PID=$!
          fi

          # ── Foreground: obtain today's PBF ──
          if $CACHE ls "s3://$CACHE_BUCKET/geocoder-cache/planet-${TODAY}.osm.pbf" 2>/dev/null | grep -q "planet-"; then
            echo "[pbf] Cache HIT — downloading today's PBF ($TODAY)..."
            START=$(date +%s)
            $CACHE cp "s3://$CACHE_BUCKET/geocoder-cache/planet-${TODAY}.osm.pbf" "$WORKDIR/planet.osm.pbf"
            SIZE=$(stat -c%s "$WORKDIR/planet.osm.pbf")
            ELAPSED=$(($(date +%s) - START))
            echo "[pbf] Done: $((SIZE/1024/1024)) MiB in ${ELAPSED}s ($((SIZE/1024/1024/(ELAPSED+1))) MB/s)"
          elif $CACHE ls "s3://$CACHE_BUCKET/geocoder-cache/planet-${YESTERDAY}.osm.pbf" 2>/dev/null | grep -q "planet-"; then
            echo "[pbf] Cache MISS for today — downloading yesterday's PBF + applying 1 diff"

            echo "[pbf] Downloading yesterday's PBF ($YESTERDAY) from cache..."
            START=$(date +%s)
            $CACHE cp "s3://$CACHE_BUCKET/geocoder-cache/planet-${YESTERDAY}.osm.pbf" "$WORKDIR/planet.osm.pbf"
            SIZE=$(stat -c%s "$WORKDIR/planet.osm.pbf")
            ELAPSED=$(($(date +%s) - START))
            echo "[pbf] Downloaded: $((SIZE/1024/1024)) MiB in ${ELAPSED}s ($((SIZE/1024/1024/(ELAPSED+1))) MB/s)"

            DIR1=$(printf "%03d" $((TODAY_SEQ / 1000000)))
            DIR2=$(printf "%03d" $(((TODAY_SEQ / 1000) % 1000)))
            FILE=$(printf "%03d" $((TODAY_SEQ % 1000)))
            echo "[pbf] Downloading replication diff (seq $TODAY_SEQ)..."
            curl -sL -o "$WORKDIR/diff-today.osc.gz" \
              "https://planet.openstreetmap.org/replication/day/$DIR1/$DIR2/${FILE}.osc.gz"
            DIFF_SIZE=$(stat -c%s "$WORKDIR/diff-today.osc.gz")
            echo "[pbf] Diff: $((DIFF_SIZE/1024/1024)) MiB"

            echo "[pbf] Applying diff with osmium apply-changes..."
            START=$(date +%s)
            osmium apply-changes "$WORKDIR/planet.osm.pbf" "$WORKDIR/diff-today.osc.gz" \
              -o "$WORKDIR/planet-tmp.osm.pbf" --overwrite
            echo "[pbf] Applied in $(($(date +%s) - START))s"
            mv "$WORKDIR/planet-tmp.osm.pbf" "$WORKDIR/planet.osm.pbf"
            rm -f "$WORKDIR/diff-today.osc.gz"

            echo "[pbf] Caching today's PBF in background..."
            $CACHE cp "$WORKDIR/planet.osm.pbf" "s3://$CACHE_BUCKET/geocoder-cache/planet-${TODAY}.osm.pbf" &
          else
            echo "[pbf] No cached PBF — downloading from mirrors + applying diffs"
            aria2c -x 16 -s 16 -j 16 --max-tries=3 \
              -d "$WORKDIR" -o planet.osm.pbf \
              "https://planet.openstreetmap.org/pbf/planet-latest.osm.pbf" \
              "https://ftpmirror.your.org/pub/openstreetmap/pbf/planet-latest.osm.pbf" \
              "https://ftp.osuosl.org/pub/openstreetmap/pbf/planet-latest.osm.pbf" \
              "https://ftp5.gwdg.de/pub/misc/openstreetmap/planet.openstreetmap.org/pbf/planet-latest.osm.pbf"

            SERVER="https://planet.openstreetmap.org/replication/day"
            PBF_DATE=$(osmium fileinfo -g header.option.osmosis_replication_timestamp "$WORKDIR/planet.osm.pbf" 2>/dev/null | cut -dT -f1)
            DAYS_NEEDED=$(( ($(date -u -d "$TODAY" +%s) - $(date -u -d "$PBF_DATE" +%s)) / 86400 ))
            PBF_SEQ=$((TODAY_SEQ - DAYS_NEEDED))
            echo "[pbf] PBF: date=$PBF_DATE seq=$PBF_SEQ, need $DAYS_NEEDED diffs"

            if [ $DAYS_NEEDED -gt 0 ]; then
              DIFFS=""
              for S in $(seq $((PBF_SEQ + 1)) $TODAY_SEQ); do
                DIR1=$(printf "%03d" $((S / 1000000)))
                DIR2=$(printf "%03d" $(((S / 1000) % 1000)))
                FILE=$(printf "%03d" $((S % 1000)))
                curl -sL -o "$WORKDIR/diff-${S}.osc.gz" "$SERVER/$DIR1/$DIR2/${FILE}.osc.gz"
                DIFFS="$DIFFS $WORKDIR/diff-${S}.osc.gz"
              done
              echo "[pbf] Applying $DAYS_NEEDED diffs..."
              osmium apply-changes "$WORKDIR/planet.osm.pbf" $DIFFS \
                -o "$WORKDIR/planet-tmp.osm.pbf" --overwrite
              mv "$WORKDIR/planet-tmp.osm.pbf" "$WORKDIR/planet.osm.pbf"
              rm -f $DIFFS
            fi

            echo "[pbf] Caching PBF in background..."
            $CACHE cp "$WORKDIR/planet.osm.pbf" "s3://$CACHE_BUCKET/geocoder-cache/planet-${TODAY}.osm.pbf" &
          fi

          # Wait for index download
          if [ "$HAS_PREVIOUS" = "true" ]; then
            echo "Waiting for index download..."
            wait $IDX_PID
          fi
          echo "All downloads complete in $(($(date +%s) - STEP_START))s"

      # ── Build index ────────────────────────────────────────────────
      - name: Build geocoder index
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          TODAY: ${{ steps.setup.outputs.today }}
        run: |
          echo "Building geocoder index for $TODAY..."
          START=$(date +%s)
          build-index "$WORKDIR/output/" "$WORKDIR/planet.osm.pbf" \
            --continents --multi-output --multi-quality 2>&1 | tail -10
          echo "Build completed in $(($(date +%s) - START))s"
          echo "$(find "$WORKDIR/output" -name "*.bin" | wc -l) bin files produced"

          # Wait for background PBF cache upload, then free disk
          wait
          rm -f "$WORKDIR/planet.osm.pbf"

      # ── Generate patches + verify ─────────────────────────────────
      - name: Generate patches and verify
        if: steps.setup.outputs.has_previous == 'true'
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          OLD_DATE: ${{ steps.setup.outputs.yesterday }}
          NEW_DATE: ${{ steps.setup.outputs.today }}
        run: |
          echo "Generating patches ($OLD_DATE → $NEW_DATE)..."
          START=$(date +%s)

          echo "## Patch Results ($OLD_DATE → $NEW_DATE)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Variant | Files | Patch Size | Verified |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|-----------|----------|" >> "$GITHUB_STEP_SUMMARY"

          RESULTS_DIR="$WORKDIR/results"
          mkdir -p "$RESULTS_DIR"
          VARIANTS=$(cd "$WORKDIR/output" && find . -name "*.bin" -exec dirname {} \; | sort -u | sed 's|^\./||')

          # Generate patch, verify, and place patch.gcpatch alongside the .bin files
          JOBS=0
          MAX_JOBS=$(nproc)
          for variant in $VARIANTS; do
            (
              NEW_DIR="$WORKDIR/output/$variant"
              OLD_DIR="$WORKDIR/old-output/$variant"
              N_NEW=$(ls "$NEW_DIR"/*.bin 2>/dev/null | wc -l)
              N_OLD=$(ls "$OLD_DIR"/*.bin 2>/dev/null | wc -l)
              SAFE=$(echo "$variant" | tr '/' '_')

              [ "$N_NEW" -lt 2 ] && exit 0
              if [ "$N_OLD" -ne "$N_NEW" ]; then
                echo "SKIP" > "$RESULTS_DIR/$SAFE"
                exit 0
              fi

              # Generate patch into the output directory (colocated with .bin files)
              PATCH_FILE="$NEW_DIR/patch.gcpatch"
              geocoder-diff "$OLD_DIR" "$NEW_DIR" -o "$PATCH_FILE" 2>/dev/null
              PATCH_KB=$(( $(stat -c%s "$PATCH_FILE" 2>/dev/null || echo 0) / 1024 ))

              # Verify
              VERIFY_DIR="$WORKDIR/verify-$SAFE"
              mkdir -p "$VERIFY_DIR"
              geocoder-patch "$OLD_DIR" "$PATCH_FILE" -o "$VERIFY_DIR/" 2>/dev/null

              MATCH=0
              for f in "$NEW_DIR"/*.bin; do
                b=$(basename "$f")
                cmp -s "$VERIFY_DIR/$b" "$NEW_DIR/$b" && MATCH=$((MATCH + 1))
              done
              rm -rf "$VERIFY_DIR"

              if [ $MATCH -eq $N_NEW ]; then
                echo "PASS $N_NEW $PATCH_KB" > "$RESULTS_DIR/$SAFE"
              else
                echo "FAIL $MATCH $N_NEW $PATCH_KB" > "$RESULTS_DIR/$SAFE"
              fi
            ) &

            JOBS=$((JOBS + 1))
            if [ $JOBS -ge $MAX_JOBS ]; then
              wait -n 2>/dev/null || true
              JOBS=$((JOBS - 1))
            fi
          done
          wait
          echo "Patch generation + verification completed in $(($(date +%s) - START))s"

          # Collect results
          PASS=0; FAIL=0; SKIP=0
          for variant in $VARIANTS; do
            SAFE=$(echo "$variant" | tr '/' '_')
            [ ! -f "$RESULTS_DIR/$SAFE" ] && continue
            RESULT=$(cat "$RESULTS_DIR/$SAFE")

            if [ "$RESULT" = "SKIP" ]; then
              SKIP=$((SKIP + 1))
            elif echo "$RESULT" | grep -q "^PASS"; then
              N=$(echo "$RESULT" | awk '{print $2}')
              KB=$(echo "$RESULT" | awk '{print $3}')
              echo "  $variant: PASS ($N/$N, ${KB} KiB)"
              echo "| $variant | $N | ${KB} KiB | PASS |" >> "$GITHUB_STEP_SUMMARY"
              PASS=$((PASS + 1))
            else
              M=$(echo "$RESULT" | awk '{print $2}')
              N=$(echo "$RESULT" | awk '{print $3}')
              KB=$(echo "$RESULT" | awk '{print $4}')
              echo "::error::$variant: FAIL ($M/$N)"
              echo "| $variant | $N | ${KB} KiB | **FAIL** |" >> "$GITHUB_STEP_SUMMARY"
              FAIL=$((FAIL + 1))
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total: $PASS pass, $FAIL fail, $SKIP skip**" >> "$GITHUB_STEP_SUMMARY"
          echo "Results: $PASS pass, $FAIL fail, $SKIP skip"
          [ $FAIL -gt 0 ] && exit 1 || true

      # ── Write manifest + upload ────────────────────────────────────
      - name: Upload to Tigris and cache
        env:
          WORKDIR: ${{ steps.setup.outputs.workdir }}
          CACHE_ENDPOINT: ${{ steps.setup.outputs.cache_endpoint }}
          CACHE_BUCKET: ${{ steps.setup.outputs.cache_bucket }}
          NEW_DATE: ${{ steps.setup.outputs.today }}
          OLD_DATE: ${{ steps.setup.outputs.yesterday }}
          HAS_PREVIOUS: ${{ steps.setup.outputs.has_previous }}
        run: |
          S5="s5cmd --endpoint-url $S3_ENDPOINT --numworkers 32 --concurrency 8"
          CACHE="env AWS_ACCESS_KEY_ID=$CACHE_AWS_KEY AWS_SECRET_ACCESS_KEY=$CACHE_AWS_SECRET s5cmd --endpoint-url $CACHE_ENDPOINT --retry-count 5 --numworkers 15 --concurrency 16"

          # ── Augment build tool's manifest.json with date/previous info ──
          PREV_VAL="$( [ "$HAS_PREVIOUS" = "true" ] && echo "$OLD_DATE" || echo "null" )"
          jq --arg date "$NEW_DATE" \
             --arg previous "$PREV_VAL" \
             --arg built_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
             '. + {date: $date, previous: (if $previous == "null" then null else $previous end), built_at: $built_at}' \
             "$WORKDIR/output/manifest.json" > "$WORKDIR/output/manifest.tmp" \
             && mv "$WORKDIR/output/manifest.tmp" "$WORKDIR/output/manifest.json"
          echo "Manifest: $(cat "$WORKDIR/output/manifest.json")"

          # ── Upload everything to Tigris + cache in parallel ──
          # output/ now contains: *.bin + patch.gcpatch + manifest.json per variant
          echo "Uploading to Tigris..."
          START=$(date +%s)
          UPLOAD_LOG="$WORKDIR/upload.log"
          S5_UPLOAD="s5cmd --endpoint-url $S3_ENDPOINT --numworkers 8 --concurrency 16"
          $S5_UPLOAD cp \
            "$WORKDIR/output/*" "s3://$S3_BUCKET/$S3_PREFIX/builds/$NEW_DATE/" \
            > "$UPLOAD_LOG" 2>&1 &
          TIGRIS_PID=$!

          echo "Caching to local S3..."
          $CACHE cp "$WORKDIR/output/*" "s3://$CACHE_BUCKET/geocoder-cache/builds/$NEW_DATE/" &
          CACHE_PID=$!

          # ── Wait for Tigris ──
          echo "Waiting for Tigris upload..."
          wait $TIGRIS_PID
          if grep -qi "error" "$UPLOAD_LOG" 2>/dev/null; then
            echo "::warning::Tigris upload had errors:"
            grep -i "error" "$UPLOAD_LOG"
          fi

          LOCAL_COUNT=$(find "$WORKDIR/output" -type f | wc -l)
          REMOTE_COUNT=$($S5 ls "s3://$S3_BUCKET/$S3_PREFIX/builds/$NEW_DATE/*" 2>/dev/null | wc -l)
          echo "Tigris: $REMOTE_COUNT/$LOCAL_COUNT files in $(($(date +%s) - START))s"
          if [ "$REMOTE_COUNT" -lt "$LOCAL_COUNT" ]; then
            echo "::error::Tigris upload incomplete: $REMOTE_COUNT/$LOCAL_COUNT"
            exit 1
          fi

          # ── Wait for cache + verify ──
          echo "Waiting for cache upload..."
          wait $CACHE_PID 2>/dev/null || true

          CACHE_COUNT=$($CACHE ls "s3://$CACHE_BUCKET/geocoder-cache/builds/$NEW_DATE/*" 2>/dev/null | wc -l)
          echo "Cache: $CACHE_COUNT/$LOCAL_COUNT files"
          if [ "$CACHE_COUNT" -lt "$LOCAL_COUNT" ]; then
            echo "Cache incomplete — retrying..."
            $CACHE cp "$WORKDIR/output/*" "s3://$CACHE_BUCKET/geocoder-cache/builds/$NEW_DATE/" 2>&1 || true
            CACHE_COUNT=$($CACHE ls "s3://$CACHE_BUCKET/geocoder-cache/builds/$NEW_DATE/*" 2>/dev/null | wc -l)
          fi
          if [ "$CACHE_COUNT" -ge "$LOCAL_COUNT" ]; then
            echo "{\"date\":\"$NEW_DATE\",\"files\":$LOCAL_COUNT,\"cached_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
              | $CACHE pipe "s3://$CACHE_BUCKET/geocoder-cache/builds/$NEW_DATE/.cache-complete"
            echo "Cache sentinel written"
          else
            echo "::warning::Cache incomplete ($CACHE_COUNT/$LOCAL_COUNT) — no sentinel"
          fi

          # ── Update latest.json ──
          PREV_VAL="$( [ "$HAS_PREVIOUS" = "true" ] && echo "$OLD_DATE" || echo "null" )"
          jq -n \
            --argjson build_version 2 \
            --argjson patch_version 1 \
            --arg latest "$NEW_DATE" \
            --arg previous "$PREV_VAL" \
            --arg updated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{build_version: $build_version, patch_version: $patch_version, latest: $latest, previous: (if $previous == "null" then null else $previous end), updated_at: $updated_at}' \
            | $S5 pipe "s3://$S3_BUCKET/$S3_PREFIX/builds/latest.json"

          echo "Upload complete."
