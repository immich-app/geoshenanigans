name: S3 Benchmark

concurrency:
  group: s3-bench
  cancel-in-progress: true

on:
  push:
    paths:
      - '.github/workflows/geocoder-s3-bench.yml'
  workflow_dispatch:

env:
  S3_BUCKET: geoshenanigans-reverse-geocoding

permissions:
  contents: read

jobs:
  bench:
    runs-on: pokedex-giant
    timeout-minutes: 30
    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq bc aria2
          curl -sL "https://github.com/peak/s5cmd/releases/download/v2.3.0/s5cmd_2.3.0_Linux-64bit.tar.gz" \
            -o /tmp/s5cmd.tar.gz
          sudo tar xzf /tmp/s5cmd.tar.gz -C /usr/local/bin s5cmd

      - name: Setup credentials
        run: |
          echo "TIGRIS_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"
          echo "TIGRIS_SECRET=$SECRET" >> "$GITHUB_ENV"
        env:
          KEY_ID: ${{ secrets.TIGRIS_WRITE_KEY_ID }}
          SECRET: ${{ secrets.TIGRIS_WRITE_ACCESS_KEY }}

      - name: Generate + upload test files
        run: |
          export AWS_ACCESS_KEY_ID="$TIGRIS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$TIGRIS_SECRET"
          PREFIX="s3://$S3_BUCKET/bench-test"

          mkdir -p /tmp/bench-data
          echo "Generating 30 x 100MB files..."
          for i in $(seq -w 1 30); do
            dd if=/dev/urandom of="/tmp/bench-data/file-${i}.bin" bs=1M count=100 2>/dev/null
          done

          echo "Uploading to Tigris (t3)..."
          START=$(date +%s)
          s5cmd --endpoint-url "https://t3.storage.dev" --numworkers 30 \
            cp --concurrency 4 '/tmp/bench-data/*.bin' "$PREFIX/"
          END=$(date +%s)
          echo "Uploaded 3GB in $((END-START))s"

      - name: Benchmark downloads
        run: |
          export AWS_ACCESS_KEY_ID="$TIGRIS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$TIGRIS_SECRET"
          TOTAL_MB=3000
          PREFIX="s3://$S3_BUCKET/bench-test"
          HTTP_BASE="https://geoshenanigans-reverse-geocoding.t3.tigrisfiles.io/bench-test"
          RUNS=5

          echo "## Download Benchmark ($RUNS runs, 30 x 100MB = 3GB)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Method | Avg MB/s | R1 | R2 | R3 | R4 | R5 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|----------|----|----|----|----|-----|" >> "$GITHUB_STEP_SUMMARY"

          run_dl_test() {
            local LABEL=$1 CMD=$2
            local TIMES=""
            for RUN in $(seq 1 $RUNS); do
              rm -rf /tmp/bench-dl && mkdir -p /tmp/bench-dl
              START=$(date +%s)
              eval "$CMD"
              END=$(date +%s)
              TIMES="$TIMES $((END - START))"
              rm -rf /tmp/bench-dl
            done
            local AVG=$(echo $TIMES | tr ' ' '\n' | awk '{s+=$1} END {printf "%.0f", s/NR}')
            echo "$LABEL: avg $(echo "scale=1; $TOTAL_MB/$AVG" | bc) MB/s — runs:$TIMES"
            echo "| $LABEL | **$(echo "scale=1; $TOTAL_MB/$AVG" | bc)** |$(for T in $TIMES; do printf " %s |" "$(echo "scale=1; $TOTAL_MB/$T" | bc)"; done)" >> "$GITHUB_STEP_SUMMARY"
          }

          # s5cmd via fly (best S3 download from Phase 1)
          run_dl_test "s5cmd fly (w15 c8)" \
            "s5cmd --endpoint-url https://fly.storage.tigris.dev --numworkers 15 cp --concurrency 8 '${PREFIX}/*' /tmp/bench-dl/"

          # s5cmd via t3
          run_dl_test "s5cmd t3 (w15 c8)" \
            "s5cmd --endpoint-url https://t3.storage.dev --numworkers 15 cp --concurrency 8 '${PREFIX}/*' /tmp/bench-dl/"

          # aria2 via public HTTP — sequential files
          run_dl_test "aria2 HTTP (x16 per file, j30)" \
            "cd /tmp/bench-dl && for i in \$(seq -w 1 30); do echo \"$HTTP_BASE/file-\${i}.bin\"; done | aria2c -x 16 -s 16 -j 30 --max-tries=1 -d /tmp/bench-dl -i - 2>/dev/null"

          # aria2 via public HTTP — fewer parallel, more connections per file
          run_dl_test "aria2 HTTP (x16 per file, j10)" \
            "cd /tmp/bench-dl && for i in \$(seq -w 1 30); do echo \"$HTTP_BASE/file-\${i}.bin\"; done | aria2c -x 16 -s 16 -j 10 --max-tries=1 -d /tmp/bench-dl -i - 2>/dev/null"

          # aria2 via public HTTP — max connections
          run_dl_test "aria2 HTTP (x1 per file, j30)" \
            "cd /tmp/bench-dl && for i in \$(seq -w 1 30); do echo \"$HTTP_BASE/file-\${i}.bin\"; done | aria2c -x 1 -s 1 -j 30 --max-tries=1 -d /tmp/bench-dl -i - 2>/dev/null"

          # wget parallel for baseline
          run_dl_test "wget parallel (30 jobs)" \
            "for i in \$(seq -w 1 30); do wget -q -P /tmp/bench-dl \"$HTTP_BASE/file-\${i}.bin\" & done; wait"

      - name: Cleanup
        if: always()
        run: |
          export AWS_ACCESS_KEY_ID="$TIGRIS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$TIGRIS_SECRET"
          s5cmd --endpoint-url "https://fly.storage.tigris.dev" rm "s3://$S3_BUCKET/bench-test/*" 2>/dev/null || true
