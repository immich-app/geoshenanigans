name: S3 Benchmark

concurrency:
  group: s3-bench
  cancel-in-progress: true

on:
  push:
    paths:
      - '.github/workflows/geocoder-s3-bench.yml'
  workflow_dispatch:

env:
  S3_BUCKET: geoshenanigans-reverse-geocoding

permissions:
  contents: read

jobs:
  bench:
    runs-on: pokedex-giant
    timeout-minutes: 30
    steps:
      - name: Install bc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq bc

      - name: Setup rclone
        uses: AnimMouse/setup-rclone@26ef2133e09fd383329a1d4c1fbe6a71db1976c9 # v1.12.0
        with:
          disable_base64: true
          rclone_config: |
            [tigris-fly]
            type = s3
            provider = Other
            region = auto
            endpoint = https://fly.storage.tigris.dev
            env_auth = false
            access_key_id = ${{ secrets.TIGRIS_WRITE_KEY_ID }}
            secret_access_key = ${{ secrets.TIGRIS_WRITE_ACCESS_KEY }}
            [tigris-t3]
            type = s3
            provider = Other
            region = auto
            endpoint = https://t3.storage.dev
            env_auth = false
            access_key_id = ${{ secrets.TIGRIS_WRITE_KEY_ID }}
            secret_access_key = ${{ secrets.TIGRIS_WRITE_ACCESS_KEY }}

      - name: Generate test files
        run: |
          mkdir -p /tmp/bench-data
          echo "Generating 30 x 100MB files..."
          for i in $(seq -w 1 30); do
            dd if=/dev/urandom of="/tmp/bench-data/file-${i}.bin" bs=1M count=100 2>/dev/null
          done
          echo "Total: $(du -sh /tmp/bench-data | awk '{print $1}')"

      - name: Benchmark
        run: |
          RUNS=5
          TOTAL_MB=3000

          echo "## S3 Benchmark Results (${RUNS} runs, 30 x 100MB files)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Endpoint | Direction | Run 1 | Run 2 | Run 3 | Run 4 | Run 5 | Avg MB/s |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-----------|-------|-------|-------|-------|-------|----------|" >> "$GITHUB_STEP_SUMMARY"

          for ENDPOINT in fly t3; do
            if [ "$ENDPOINT" = "fly" ]; then
              REMOTE="tigris-fly:$S3_BUCKET/bench-test"
              LABEL="fly.storage.tigris.dev"
            else
              REMOTE="tigris-t3:$S3_BUCKET/bench-test"
              LABEL="t3.storage.dev"
            fi

            echo ""
            echo "=============================="
            echo "=== $LABEL ==="
            echo "=============================="

            UP_TIMES=""
            DL_TIMES=""

            for RUN in $(seq 1 $RUNS); do
              echo ""
              echo "--- Run $RUN/$RUNS ---"

              # Upload
              START=$(date +%s)
              rclone sync /tmp/bench-data/ "$REMOTE/" \
                --transfers 30 --checkers 30 \
                --s3-upload-concurrency 8 --s3-chunk-size 64M --s3-no-check-bucket
              END=$(date +%s)
              UP_T=$((END - START))
              UP_SPEED=$(echo "scale=1; $TOTAL_MB/$UP_T" | bc)
              echo "Upload: ${UP_T}s (${UP_SPEED} MB/s)"
              UP_TIMES="$UP_TIMES $UP_T"

              # Download
              rm -rf /tmp/bench-dl
              START=$(date +%s)
              rclone sync "$REMOTE/" /tmp/bench-dl/ \
                --transfers 30 --checkers 30
              END=$(date +%s)
              DL_T=$((END - START))
              DL_SPEED=$(echo "scale=1; $TOTAL_MB/$DL_T" | bc)
              echo "Download: ${DL_T}s (${DL_SPEED} MB/s)"
              DL_TIMES="$DL_TIMES $DL_T"

              rm -rf /tmp/bench-dl

              # Delete remote files for clean next run
              rclone purge "$REMOTE/" 2>/dev/null || true
            done

            # Calculate averages
            UP_AVG=$(echo "$UP_TIMES" | tr ' ' '\n' | grep -v '^$' | awk '{s+=$1} END {printf "%.0f", s/NR}')
            DL_AVG=$(echo "$DL_TIMES" | tr ' ' '\n' | grep -v '^$' | awk '{s+=$1} END {printf "%.0f", s/NR}')
            UP_AVG_SPEED=$(echo "scale=1; $TOTAL_MB/$UP_AVG" | bc)
            DL_AVG_SPEED=$(echo "scale=1; $TOTAL_MB/$DL_AVG" | bc)

            UP_SPEEDS=""
            for T in $UP_TIMES; do
              UP_SPEEDS="$UP_SPEEDS $(echo "scale=1; $TOTAL_MB/$T" | bc)"
            done
            DL_SPEEDS=""
            for T in $DL_TIMES; do
              DL_SPEEDS="$DL_SPEEDS $(echo "scale=1; $TOTAL_MB/$T" | bc)"
            done

            UP_S_ARR=($UP_SPEEDS)
            DL_S_ARR=($DL_SPEEDS)

            echo ""
            echo "=== $LABEL Results ==="
            echo "Upload avg:   ${UP_AVG}s (${UP_AVG_SPEED} MB/s)"
            echo "Download avg: ${DL_AVG}s (${DL_AVG_SPEED} MB/s)"

            echo "| $LABEL | Upload | ${UP_S_ARR[0]} | ${UP_S_ARR[1]} | ${UP_S_ARR[2]} | ${UP_S_ARR[3]} | ${UP_S_ARR[4]} | **${UP_AVG_SPEED}** |" >> "$GITHUB_STEP_SUMMARY"
            echo "| $LABEL | Download | ${DL_S_ARR[0]} | ${DL_S_ARR[1]} | ${DL_S_ARR[2]} | ${DL_S_ARR[3]} | ${DL_S_ARR[4]} | **${DL_AVG_SPEED}** |" >> "$GITHUB_STEP_SUMMARY"
          done

          rm -rf /tmp/bench-data
