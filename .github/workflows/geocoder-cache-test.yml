name: Test Local S3 Cache

on:
  push:
    paths:
      - '.github/workflows/geocoder-cache-test.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-cache:
    runs-on: pokedex-giant
    timeout-minutes: 5
    steps:
      - name: Setup rclone
        uses: AnimMouse/setup-rclone@26ef2133e09fd383329a1d4c1fbe6a71db1976c9 # v1.12.0
        with:
          disable_base64: true
          rclone_config: |
            [cache]
            type = s3
            provider = Other
            region = auto
            endpoint = http://${{ env.BUCKET_HOST }}:80
            access_key_id = ${{ env.AWS_ACCESS_KEY_ID }}
            secret_access_key = ${{ env.AWS_SECRET_KEY_ID }}

      - name: Debug env
        run: |
          echo "BUCKET_HOST=${BUCKET_HOST:-NOT SET}"
          echo "BUCKET_NAME=${BUCKET_NAME:-NOT SET}"
          echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:+SET (hidden)}"
          echo "AWS_SECRET_KEY_ID=${AWS_SECRET_KEY_ID:+SET (hidden)}"

      - name: Test cache operations
        run: |
          echo "test-$(date -u +%Y%m%d%H%M%S)" > /tmp/test.txt

          echo "=== List bucket ==="
          rclone lsd "cache:$BUCKET_NAME/" || echo "List failed (bucket may be empty)"

          echo "=== Upload ==="
          rclone copyto /tmp/test.txt "cache:$BUCKET_NAME/geocoder-cache/test.txt" \
            --retries 3
          echo "Upload OK"

          echo "=== List ==="
          rclone ls "cache:$BUCKET_NAME/geocoder-cache/"
          echo "List OK"

          echo "=== Download ==="
          rclone copyto "cache:$BUCKET_NAME/geocoder-cache/test.txt" /tmp/test-dl.txt \
            --retries 3
          diff /tmp/test.txt /tmp/test-dl.txt
          echo "Download + verify OK"

          echo "=== Cleanup ==="
          rclone delete "cache:$BUCKET_NAME/geocoder-cache/test.txt"
          echo "Done"
