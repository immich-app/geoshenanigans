name: Test Local S3 Cache

concurrency:
  group: geocoder-cache-test
  cancel-in-progress: true

on:
  push:
    paths:
      - '.github/workflows/geocoder-cache-test.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-cache:
    runs-on: pokedex-giant
    timeout-minutes: 5
    steps:
      - name: Install s5cmd
        run: |
          curl -sL "https://github.com/peak/s5cmd/releases/download/v2.3.0/s5cmd_2.3.0_Linux-64bit.tar.gz" \
            -o /tmp/s5cmd.tar.gz
          sudo tar xzf /tmp/s5cmd.tar.gz -C /usr/local/bin s5cmd
          s5cmd version

      - name: Debug env
        run: |
          echo "BUCKET_HOST=${BUCKET_HOST:-NOT SET}"
          echo "BUCKET_PORT=${BUCKET_PORT:-NOT SET}"
          echo "BUCKET_NAME=${BUCKET_NAME:-NOT SET}"
          echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:+SET}"
          echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:+SET}"
          echo "Testing connectivity..."
          curl -sv --max-time 5 "http://${BUCKET_HOST}:${BUCKET_PORT}/" 2>&1 | head -20 || echo "curl failed"

      - name: Test cache operations
        run: |
          ENDPOINT="http://${BUCKET_HOST}:${BUCKET_PORT}"
          echo "Endpoint: $ENDPOINT"
          echo "Bucket: $BUCKET_NAME"

          echo "test-$(date -u +%Y%m%d%H%M%S)" > /tmp/test.txt

          echo "=== List bucket ==="
          s5cmd --endpoint-url "$ENDPOINT" ls "s3://$BUCKET_NAME/" || echo "Bucket empty or list failed"

          echo "=== Upload ==="
          s5cmd --endpoint-url "$ENDPOINT" cp /tmp/test.txt "s3://$BUCKET_NAME/geocoder-cache/test.txt"
          echo "Upload OK"

          echo "=== List ==="
          s5cmd --endpoint-url "$ENDPOINT" ls "s3://$BUCKET_NAME/geocoder-cache/"
          echo "List OK"

          echo "=== Download ==="
          s5cmd --endpoint-url "$ENDPOINT" cp "s3://$BUCKET_NAME/geocoder-cache/test.txt" /tmp/test-dl.txt
          diff /tmp/test.txt /tmp/test-dl.txt
          echo "Download + verify OK"

          echo "=== Cleanup ==="
          s5cmd --endpoint-url "$ENDPOINT" rm "s3://$BUCKET_NAME/geocoder-cache/test.txt"
          echo "Done"
