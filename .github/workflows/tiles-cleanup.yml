name: 'Tiles Cleanup'
on:
  workflow_dispatch:
  schedule:
    # Every day at midnight
    - cron: '0 0 * * *'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  cleanup_tiles:
    name: Cleanup Tiles & Styles
    defaults:
      run:
        working-directory: 'deployment'
    runs-on: ubuntu-latest
    outputs:
      KEY: ${{ steps.latest_build.outputs.KEY }}
    env:
      RCLONE_CONFIG: ${{ github.workspace }}/rclone.conf
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - id: token
        uses: immich-app/devtools/actions/create-workflow-token@9db058b2e6eec20e07760b0e17a0505c78ec3191 # create-workflow-token-action-v2.0.1
        with:
          client-id: ${{ secrets.PUSH_O_MATIC_APP_CLIENT_ID }}
          private-key: ${{ secrets.PUSH_O_MATIC_APP_KEY }}

      - name: Setup Mise
        uses: immich-app/devtools/actions/use-mise@3bca63ca3c15020293b36b51737a3ee2c773340b # use-mise-action-v3.1.0
        with:
          github_token: ${{ steps.token.outputs.token }}

      - name: Configure Rclone
        env:
          ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_TILES_R2_KV_TOKEN_ID }}
          SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_TILES_R2_KV_TOKEN_HASHED_VALUE }}
        run: |
          cat > "$RCLONE_CONFIG" <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          region = auto
          endpoint = https://601adaaa1eab190cdfe2945f9a6c89d0.r2.cloudflarestorage.com
          access_key_id = $ACCESS_KEY_ID
          secret_access_key = $SECRET_ACCESS_KEY
          EOF

      - name: Cleanup all non-latest tiles
        run: ./scripts/r2-cleanup.sh
