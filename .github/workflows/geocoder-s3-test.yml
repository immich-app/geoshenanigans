name: Test S3/Tigris Upload

on:
  push:
  workflow_dispatch:

env:
  S3_BUCKET: geoshenanigans-reverse-geocoding
  S3_ENDPOINT: https://fly.storage.tigris.dev
  S3_PREFIX: geocoder

permissions:
  contents: read

jobs:
  test-s3:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup Rclone
        uses: AnimMouse/setup-rclone@26ef2133e09fd383329a1d4c1fbe6a71db1976c9 # v1.12.0
        with:
          disable_base64: true
          rclone_config: |
            [tigris]
            type = s3
            provider = Other
            region = auto
            endpoint = ${{ env.S3_ENDPOINT }}
            access_key_id = ${{ secrets.TIGRIS_WRITE_KEY_ID }}
            secret_access_key = ${{ secrets.TIGRIS_WRITE_ACCESS_KEY }}

      - name: Test upload + download + list
        run: |
          echo "test-$(date -u +%Y%m%d%H%M%S)" > /tmp/test.txt

          echo "=== Upload ==="
          rclone copyto /tmp/test.txt "tigris:$S3_BUCKET/$S3_PREFIX/test.txt"
          echo "Upload: OK"

          echo "=== List ==="
          rclone ls "tigris:$S3_BUCKET/$S3_PREFIX/"
          echo "List: OK"

          echo "=== Download ==="
          rclone copyto "tigris:$S3_BUCKET/$S3_PREFIX/test.txt" /tmp/test-download.txt
          diff /tmp/test.txt /tmp/test-download.txt
          echo "Download + verify: OK"

          echo "=== Cleanup ==="
          rclone delete "tigris:$S3_BUCKET/$S3_PREFIX/test.txt"
          echo "Cleanup: OK"
