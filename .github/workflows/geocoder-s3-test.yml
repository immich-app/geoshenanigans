name: Test S3 Upload Speed

on:
  push:
    paths:
      - '.github/workflows/geocoder-s3-test.yml'
  workflow_dispatch:

env:
  S3_BUCKET: geoshenanigans-reverse-geocoding
  S3_ENDPOINT: https://fly.storage.tigris.dev

permissions:
  contents: read

jobs:
  test-s3:
    runs-on: pokedex-giant
    timeout-minutes: 5
    steps:
      - name: Install s5cmd
        run: |
          curl -sL "https://github.com/peak/s5cmd/releases/download/v2.3.0/s5cmd_2.3.0_Linux-64bit.tar.gz" \
            -o /tmp/s5cmd.tar.gz
          sudo tar xzf /tmp/s5cmd.tar.gz -C /usr/local/bin s5cmd
          s5cmd version

      - name: Test s5cmd upload + download
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TIGRIS_WRITE_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TIGRIS_WRITE_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          S3_ENDPOINT_URL: ${{ env.S3_ENDPOINT }}
        run: |
          # Generate a 5GB test file
          dd if=/dev/urandom of=/tmp/test-5g.bin bs=1M count=5120 2>/dev/null
          ls -lh /tmp/test-5g.bin

          echo "=== s5cmd upload (5GB, concurrency 32, part-size 256MB) ==="
          START=$(date +%s)
          s5cmd --endpoint-url "$S3_ENDPOINT_URL" --stat \
            cp --concurrency 32 --part-size 256 \
            /tmp/test-5g.bin "s3://$S3_BUCKET/geocoder/test/test-5g.bin"
          END=$(date +%s)
          ELAPSED=$((END - START))
          echo "Upload: ${ELAPSED}s ($(echo "scale=1; 5120/$ELAPSED" | bc) MB/s)"

          echo "=== s5cmd download (5GB) ==="
          START=$(date +%s)
          s5cmd --endpoint-url "$S3_ENDPOINT_URL" --stat \
            cp "s3://$S3_BUCKET/geocoder/test/test-5g.bin" /tmp/test-download.bin
          END=$(date +%s)
          ELAPSED=$((END - START))
          echo "Download: ${ELAPSED}s ($(echo "scale=1; 5120/$ELAPSED" | bc) MB/s)"

          echo "=== Verify ==="
          md5sum /tmp/test-5g.bin /tmp/test-download.bin

          echo "=== Cleanup ==="
          s5cmd --endpoint-url "$S3_ENDPOINT_URL" \
            rm "s3://$S3_BUCKET/geocoder/test/test-5g.bin"
          echo "Done"
