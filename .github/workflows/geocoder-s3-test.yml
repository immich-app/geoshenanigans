name: Test S3 Upload Speed

on:
  push:
    paths:
      - '.github/workflows/geocoder-s3-test.yml'
  workflow_dispatch:

env:
  S3_BUCKET: geoshenanigans-reverse-geocoding
  S3_ENDPOINT: https://fly.storage.tigris.dev

permissions:
  contents: read

jobs:
  test-s3:
    runs-on: pokedex-giant
    timeout-minutes: 30
    steps:
      - name: Install s5cmd
        run: |
          curl -sL "https://github.com/peak/s5cmd/releases/download/v2.3.0/s5cmd_2.3.0_Linux-64bit.tar.gz" \
            -o /tmp/s5cmd.tar.gz
          sudo tar xzf /tmp/s5cmd.tar.gz -C /usr/local/bin s5cmd
          s5cmd version

      - name: Test upload concurrency levels
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TIGRIS_WRITE_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TIGRIS_WRITE_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          S3_ENDPOINT_URL: ${{ env.S3_ENDPOINT }}
        run: |
          # Generate a 5GB test file
          dd if=/dev/urandom of=/tmp/test-5g.bin bs=1M count=5120 2>/dev/null
          echo "Test file: 5 GiB"

          for CONC in 1 2 4 8 16 32; do
            echo ""
            echo "=== s5cmd concurrency=$CONC part-size=64MB ==="
            START=$(date +%s)
            s5cmd --endpoint-url "$S3_ENDPOINT_URL" --stat \
              cp --concurrency $CONC --part-size 64 \
              /tmp/test-5g.bin "s3://$S3_BUCKET/geocoder/test/conc-test.bin"
            END=$(date +%s)
            ELAPSED=$((END - START))
            MBPS=$(echo "scale=1; 5120/$ELAPSED" | bc)
            echo "  Upload: ${ELAPSED}s (${MBPS} MB/s)"

            s5cmd --endpoint-url "$S3_ENDPOINT_URL" \
              rm "s3://$S3_BUCKET/geocoder/test/conc-test.bin"
          done

          echo ""
          echo "=== Part size sweep (concurrency=4) ==="
          for PART in 16 64 128 256; do
            echo ""
            echo "=== s5cmd concurrency=4 part-size=${PART}MB ==="
            START=$(date +%s)
            s5cmd --endpoint-url "$S3_ENDPOINT_URL" --stat \
              cp --concurrency 4 --part-size $PART \
              /tmp/test-5g.bin "s3://$S3_BUCKET/geocoder/test/conc-test.bin"
            END=$(date +%s)
            ELAPSED=$((END - START))
            MBPS=$(echo "scale=1; 5120/$ELAPSED" | bc)
            echo "  Upload: ${ELAPSED}s (${MBPS} MB/s)"

            s5cmd --endpoint-url "$S3_ENDPOINT_URL" \
              rm "s3://$S3_BUCKET/geocoder/test/conc-test.bin"
          done

          rm -f /tmp/test-5g.bin
          echo ""
          echo "=== DONE ==="
