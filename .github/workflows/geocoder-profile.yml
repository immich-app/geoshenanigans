name: Profile Patch Pipeline  # v4: merge-walk corrections

concurrency:
  group: geocoder-profile
  cancel-in-progress: true

on:
  push:
    paths:
      - '.github/workflows/geocoder-profile.yml'
  workflow_dispatch:

env:
  S3_BUCKET: geoshenanigans-reverse-geocoding
  S3_ENDPOINT: https://t3.storage.dev

permissions:
  contents: read

jobs:
  profile:
    runs-on: pokedex-giant
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake g++ libz-dev libzstd-dev \
            libbz2-dev libexpat1-dev libosmium2-dev jq time
          curl -sL "https://github.com/peak/s5cmd/releases/download/v2.3.0/s5cmd_2.3.0_Linux-64bit.tar.gz" \
            -o /tmp/s5cmd.tar.gz
          sudo tar xzf /tmp/s5cmd.tar.gz -C /usr/local/bin s5cmd

      - name: Setup workdir
        id: setup
        run: |
          echo "cache_endpoint=http://${BUCKET_HOST}:${BUCKET_PORT}" >> "$GITHUB_OUTPUT"
          echo "cache_bucket=$BUCKET_NAME" >> "$GITHUB_OUTPUT"

      - name: Configure credentials
        run: |
          echo "::add-mask::$AWS_ACCESS_KEY_ID"
          echo "::add-mask::$AWS_SECRET_ACCESS_KEY"
          echo "CACHE_AWS_KEY=$AWS_ACCESS_KEY_ID" >> "$GITHUB_ENV"
          echo "CACHE_AWS_SECRET=$AWS_SECRET_ACCESS_KEY" >> "$GITHUB_ENV"
          echo "AWS_ACCESS_KEY_ID=$KEY" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$SECRET" >> "$GITHUB_ENV"
        env:
          KEY: ${{ secrets.TIGRIS_WRITE_KEY_ID }}
          SECRET: ${{ secrets.TIGRIS_WRITE_ACCESS_KEY }}

      - name: Build tools
        run: |
          cd geocoder/builder && mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc) geocoder-diff geocoder-patch
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Download builds (selected variants only)
        env:
          CACHE_ENDPOINT: ${{ steps.setup.outputs.cache_endpoint }}
          CACHE_BUCKET: ${{ steps.setup.outputs.cache_bucket }}
        run: |
          CACHE="env AWS_ACCESS_KEY_ID=$CACHE_AWS_KEY AWS_SECRET_ACCESS_KEY=$CACHE_AWS_SECRET s5cmd --endpoint-url $CACHE_ENDPOINT"
          S5="s5cmd --endpoint-url $S3_ENDPOINT"

          # Only download variants we'll profile (full + no-addresses + europe/full for mid-size test)
          # This avoids filling tmpfs with 60-80GB of data for all variants
          VARIANTS_TO_DOWNLOAD="full no-addresses europe/full"

          download_variant() {
            local DATE=$1 DEST=$2 VARIANT=$3
            local CACHE_PATH="s3://$CACHE_BUCKET/geocoder-cache/builds/$DATE/$VARIANT"
            mkdir -p "$DEST/$VARIANT"
            if $CACHE ls "$CACHE_PATH/" 2>/dev/null | head -1 | grep -q .; then
              $CACHE cp "$CACHE_PATH/*" "$DEST/$VARIANT/"
            else
              $S5 cp "s3://$S3_BUCKET/geocoder/builds/$DATE/$VARIANT/*" "$DEST/$VARIANT/"
            fi
          }

          for v in $VARIANTS_TO_DOWNLOAD; do
            echo "Downloading $v..."
            START=$(date +%s)
            download_variant "2026-04-04" /tmp/build-old "$v" &
            download_variant "2026-04-05" /tmp/build-new "$v" &
            wait
            echo "  $v done in $(($(date +%s)-START))s"
          done

          echo "Old: $(find /tmp/build-old -type f | wc -l) files, $(du -sh /tmp/build-old | cut -f1)"
          echo "New: $(find /tmp/build-new -type f | wc -l) files, $(du -sh /tmp/build-new | cut -f1)"

      - name: Profile small variants
        run: |
          OLD="/tmp/build-old"
          NEW="/tmp/build-new"
          WORKDIR="/tmp/profile"
          mkdir -p "$WORKDIR"

          echo "CPUs: $(nproc)"
          echo "Memory: $(free -h | awk '/Mem:/{print $2}')"
          echo "Cgroup mem: $(cat /sys/fs/cgroup/memory.max 2>/dev/null | numfmt --to=iec 2>/dev/null || echo unknown)"

          echo "## Patch Profile Results (mmap+sequential)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Variant | Files | Diff (s) | Diff Mem (MB) | Patch KB | Patch (s) | Patch Mem (MB) | Verify | Total (s) |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|----------|---------------|----------|-----------|----------------|--------|-----------|" >> "$GITHUB_STEP_SUMMARY"

          # Helper function
          profile_variant() {
            local variant=$1
            local N_NEW=$(ls "$NEW/$variant/"*.bin 2>/dev/null | wc -l)
            local N_OLD=$(ls "$OLD/$variant/"*.bin 2>/dev/null | wc -l)
            [ "$N_NEW" -lt 2 ] && return 0
            [ "$N_OLD" -ne "$N_NEW" ] && return 0

            local SAFE=$(echo "$variant" | tr '/' '_')
            local PATCH="$WORKDIR/${SAFE}.gcpatch"
            local VERIFY="$WORKDIR/verify-${SAFE}"
            mkdir -p "$VERIFY"

            local TOTAL_START=$(date +%s)

            /usr/bin/time -v geocoder-diff "$OLD/$variant/" "$NEW/$variant/" -o "$PATCH" 2>"$WORKDIR/t-diff"
            local DIFF_S=$(( $(date +%s) - TOTAL_START ))
            local DIFF_MEM=$(grep "Maximum resident" "$WORKDIR/t-diff" | awk '{print int($NF/1024)}')
            local PATCH_KB=$(( $(stat -c%s "$PATCH" 2>/dev/null || echo 0) / 1024 ))

            /usr/bin/time -v geocoder-patch "$OLD/$variant/" "$PATCH" -o "$VERIFY/" 2>"$WORKDIR/t-patch"
            local PATCH_S=$(( $(date +%s) - TOTAL_START - DIFF_S ))
            local PATCH_MEM=$(grep "Maximum resident" "$WORKDIR/t-patch" | awk '{print int($NF/1024)}')

            local MATCH=0
            for f in "$NEW/$variant/"*.bin; do
              local b=$(basename "$f")
              cmp -s "$VERIFY/$b" "$NEW/$variant/$b" && MATCH=$((MATCH + 1))
            done

            local TOTAL_S=$(( $(date +%s) - TOTAL_START ))
            local STATUS="$MATCH/$N_NEW"
            [ "$MATCH" -ne "$N_NEW" ] && STATUS="FAIL:$MATCH/$N_NEW"

            echo "$variant: diff=${DIFF_S}s(${DIFF_MEM}MB) patch=${PATCH_S}s(${PATCH_MEM}MB) total=${TOTAL_S}s ${STATUS}"
            echo "| $variant | $N_NEW | $DIFF_S | $DIFF_MEM | $PATCH_KB | $PATCH_S | $PATCH_MEM | $STATUS | $TOTAL_S |" >> "$GITHUB_STEP_SUMMARY"

            rm -f "$PATCH"
            rm -rf "$VERIFY"
          }

          # Export function for use in subsequent steps
          declare -f profile_variant > /tmp/profile_fn.sh
          echo "export OLD NEW WORKDIR" >> /tmp/profile_fn.sh

          # Profile europe/full as a mid-size correctness test
          profile_variant "europe/full"

      - name: Profile no-addresses
        if: always()
        run: |
          OLD="/tmp/build-old"
          NEW="/tmp/build-new"
          WORKDIR="/tmp/profile"
          mkdir -p "$WORKDIR"

          variant="no-addresses"
          N_NEW=$(ls "$NEW/$variant/"*.bin 2>/dev/null | wc -l)
          N_OLD=$(ls "$OLD/$variant/"*.bin 2>/dev/null | wc -l)
          [ "$N_NEW" -lt 2 ] && { echo "Skipping $variant"; exit 0; }
          [ "$N_OLD" -ne "$N_NEW" ] && { echo "Skipping $variant (file count mismatch)"; exit 0; }

          PATCH="$WORKDIR/no-addresses.gcpatch"
          VERIFY="$WORKDIR/verify-no-addresses"
          mkdir -p "$VERIFY"

          echo "=== Diff ==="
          TOTAL_START=$(date +%s)
          /usr/bin/time -v geocoder-diff "$OLD/$variant/" "$NEW/$variant/" -o "$PATCH" 2>&1
          DIFF_S=$(( $(date +%s) - TOTAL_START ))
          DIFF_MEM=$(/usr/bin/time -v true 2>&1 | head -1; grep "Maximum resident" "$WORKDIR/t-diff" 2>/dev/null | awk '{print int($NF/1024)}' || echo 0)

          echo "=== Patch ==="
          PATCH_START=$(date +%s)
          /usr/bin/time -v geocoder-patch "$OLD/$variant/" "$PATCH" -o "$VERIFY/" 2>&1
          PATCH_S=$(( $(date +%s) - PATCH_START ))

          echo "=== Verify ==="
          MATCH=0
          for f in "$NEW/$variant/"*.bin; do
            b=$(basename "$f")
            cmp -s "$VERIFY/$b" "$NEW/$variant/$b" && MATCH=$((MATCH + 1))
          done
          TOTAL_S=$(( $(date +%s) - TOTAL_START ))
          echo "no-addresses: diff=${DIFF_S}s patch=${PATCH_S}s total=${TOTAL_S}s verify=$MATCH/$N_NEW"

          rm -f "$PATCH"; rm -rf "$VERIFY"

      - name: Profile full
        if: always()
        run: |
          OLD="/tmp/build-old"
          NEW="/tmp/build-new"
          WORKDIR="/tmp/profile"
          mkdir -p "$WORKDIR"

          variant="full"
          N_NEW=$(ls "$NEW/$variant/"*.bin 2>/dev/null | wc -l)
          N_OLD=$(ls "$OLD/$variant/"*.bin 2>/dev/null | wc -l)
          [ "$N_NEW" -lt 2 ] && { echo "Skipping $variant"; exit 0; }
          [ "$N_OLD" -ne "$N_NEW" ] && { echo "Skipping $variant (file count mismatch)"; exit 0; }

          PATCH="$WORKDIR/full.gcpatch"
          VERIFY="$WORKDIR/verify-full"
          mkdir -p "$VERIFY"

          echo "=== Diff ==="
          TOTAL_START=$(date +%s)
          /usr/bin/time -v geocoder-diff "$OLD/$variant/" "$NEW/$variant/" -o "$PATCH" 2>&1
          DIFF_S=$(( $(date +%s) - TOTAL_START ))

          echo "=== Patch ==="
          PATCH_START=$(date +%s)
          /usr/bin/time -v geocoder-patch "$OLD/$variant/" "$PATCH" -o "$VERIFY/" 2>&1
          PATCH_S=$(( $(date +%s) - PATCH_START ))

          echo "=== Verify ==="
          MATCH=0
          for f in "$NEW/$variant/"*.bin; do
            b=$(basename "$f")
            cmp -s "$VERIFY/$b" "$NEW/$variant/$b" && MATCH=$((MATCH + 1))
          done
          TOTAL_S=$(( $(date +%s) - TOTAL_START ))
          echo "full: diff=${DIFF_S}s patch=${PATCH_S}s total=${TOTAL_S}s verify=$MATCH/$N_NEW"

          rm -f "$PATCH"; rm -rf "$VERIFY"
