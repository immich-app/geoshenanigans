name: Profile Patch Pipeline

concurrency:
  group: geocoder-profile
  cancel-in-progress: true

on:
  push:
    paths:
      - '.github/workflows/geocoder-profile.yml'
  workflow_dispatch:

env:
  S3_BUCKET: geoshenanigans-reverse-geocoding
  S3_ENDPOINT: https://t3.storage.dev

permissions:
  contents: read

jobs:
  debug-cache:
    runs-on: pokedex-giant
    timeout-minutes: 5
    steps:
      - name: Debug cache
        run: |
          echo "=== Environment ==="
          echo "BUCKET_HOST=$BUCKET_HOST"
          echo "BUCKET_PORT=$BUCKET_PORT"
          echo "BUCKET_NAME=$BUCKET_NAME"
          echo "AWS_ACCESS_KEY_ID is set: $([ -n "$AWS_ACCESS_KEY_ID" ] && echo yes || echo no)"
          echo ""
          CACHE_ENDPOINT="http://${BUCKET_HOST}:${BUCKET_PORT}"
          echo "Cache endpoint: $CACHE_ENDPOINT"
          echo ""
          echo "=== s5cmd ls bucket root ==="
          s5cmd --endpoint-url "$CACHE_ENDPOINT" ls "s3://$BUCKET_NAME/" 2>&1 | head -20
          echo ""
          echo "=== s5cmd ls geocoder-cache/ ==="
          s5cmd --endpoint-url "$CACHE_ENDPOINT" ls "s3://$BUCKET_NAME/geocoder-cache/" 2>&1 | head -20
          echo ""
          echo "=== s5cmd ls geocoder-cache/builds/ ==="
          s5cmd --endpoint-url "$CACHE_ENDPOINT" ls "s3://$BUCKET_NAME/geocoder-cache/builds/" 2>&1 | head -20
          echo ""
          echo "=== s5cmd ls geocoder-cache/builds/2026-04-03/ ==="
          s5cmd --endpoint-url "$CACHE_ENDPOINT" ls "s3://$BUCKET_NAME/geocoder-cache/builds/2026-04-03/" 2>&1 | head -20
          echo ""
          echo "=== s5cmd ls geocoder-cache/builds/2026-04-04/ ==="
          s5cmd --endpoint-url "$CACHE_ENDPOINT" ls "s3://$BUCKET_NAME/geocoder-cache/builds/2026-04-04/" 2>&1 | head -20

  profile:
    runs-on: pokedex-giant
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake g++ libz-dev libzstd-dev \
            libbz2-dev libexpat1-dev libosmium2-dev jq time
          curl -sL "https://github.com/peak/s5cmd/releases/download/v2.3.0/s5cmd_2.3.0_Linux-64bit.tar.gz" \
            -o /tmp/s5cmd.tar.gz
          sudo tar xzf /tmp/s5cmd.tar.gz -C /usr/local/bin s5cmd

      - name: Setup workdir
        id: setup
        run: |
          echo "cache_endpoint=http://${BUCKET_HOST}:${BUCKET_PORT}" >> "$GITHUB_OUTPUT"
          echo "cache_bucket=$BUCKET_NAME" >> "$GITHUB_OUTPUT"
          echo "Cache endpoint: http://${BUCKET_HOST}:${BUCKET_PORT}"
          echo "Cache bucket: $BUCKET_NAME"

      - name: Configure credentials
        run: |
          echo "::add-mask::$AWS_ACCESS_KEY_ID"
          echo "::add-mask::$AWS_SECRET_ACCESS_KEY"
          echo "CACHE_AWS_KEY=$AWS_ACCESS_KEY_ID" >> "$GITHUB_ENV"
          echo "CACHE_AWS_SECRET=$AWS_SECRET_ACCESS_KEY" >> "$GITHUB_ENV"
          echo "AWS_ACCESS_KEY_ID=$KEY" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$SECRET" >> "$GITHUB_ENV"
        env:
          KEY: ${{ secrets.TIGRIS_WRITE_KEY_ID }}
          SECRET: ${{ secrets.TIGRIS_WRITE_ACCESS_KEY }}

      - name: Build tools
        run: |
          cd geocoder/builder && mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc) geocoder-diff geocoder-patch
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Download two builds
        env:
          CACHE_ENDPOINT: ${{ steps.setup.outputs.cache_endpoint }}
          CACHE_BUCKET: ${{ steps.setup.outputs.cache_bucket }}
        run: |
          CACHE="env AWS_ACCESS_KEY_ID=$CACHE_AWS_KEY AWS_SECRET_ACCESS_KEY=$CACHE_AWS_SECRET s5cmd --endpoint-url $CACHE_ENDPOINT"
          S5="s5cmd --endpoint-url $S3_ENDPOINT"

          echo "Cache endpoint: $CACHE_ENDPOINT"
          echo "Cache bucket: $CACHE_BUCKET"

          # Try cache first (local S3, ~700 MB/s), fall back to Tigris (~80 MB/s)
          download_build() {
            local DATE=$1 DEST=$2
            local CACHE_PATH="s3://$CACHE_BUCKET/geocoder-cache/builds/$DATE"
            echo "Downloading $DATE build..."
            START=$(date +%s)
            echo "  Trying cache: $CACHE_PATH/"
            if $CACHE ls "$CACHE_PATH/" 2>/dev/null | head -1 | grep -q .; then
              echo "  Source: local cache"
              $CACHE cp "$CACHE_PATH/*" "$DEST/"
            else
              echo "  Cache miss, falling back to Tigris"
              $S5 cp "s3://$S3_BUCKET/geocoder/builds/$DATE/*" "$DEST/"
            fi
            echo "  $(find "$DEST" -type f | wc -l) files in $(($(date +%s)-START))s"
          }

          download_build "2026-04-03" /tmp/build-old
          download_build "2026-04-04" /tmp/build-new

      - name: Profile each variant
        run: |
          OLD="/tmp/build-old"
          NEW="/tmp/build-new"
          WORKDIR="/tmp/profile"
          mkdir -p "$WORKDIR"

          echo "CPUs: $(nproc)"
          echo "Memory: $(free -h | awk '/Mem:/{print $2}')"
          echo "Cgroup mem: $(cat /sys/fs/cgroup/memory.max 2>/dev/null | numfmt --to=iec 2>/dev/null || echo unknown)"
          echo ""

          # Sort variants: full and no-addresses first (biggest, most interesting for memory profiling)
          ALL_VARIANTS=$(cd "$NEW" && find . -name "*.bin" -exec dirname {} \; | sort -u | sed 's|^\./||')
          PRIORITY="full no-addresses"
          REST=$(echo "$ALL_VARIANTS" | grep -v -x -E "full|no-addresses" || true)
          VARIANTS="$PRIORITY $REST"

          # Header
          echo "## Patch Profile Results (mmap optimized)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Variant | Files | Diff (s) | Diff Mem (MB) | Patch Size (KB) | Patch (s) | Patch Mem (MB) | Verify | Total (s) |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|----------|---------------|-----------------|-----------|----------------|--------|-----------|" >> "$GITHUB_STEP_SUMMARY"

          for variant in $VARIANTS; do
            N_NEW=$(ls "$NEW/$variant/"*.bin 2>/dev/null | wc -l)
            N_OLD=$(ls "$OLD/$variant/"*.bin 2>/dev/null | wc -l)
            [ "$N_NEW" -lt 2 ] && continue
            [ "$N_OLD" -ne "$N_NEW" ] && continue

            SAFE=$(echo "$variant" | tr '/' '_')
            PATCH="$WORKDIR/${SAFE}.gcpatch"
            VERIFY="$WORKDIR/verify-${SAFE}"
            mkdir -p "$VERIFY"

            TOTAL_START=$(date +%s)

            # Diff — capture stderr (has RSS reports) and time -v output
            /usr/bin/time -v geocoder-diff "$OLD/$variant/" "$NEW/$variant/" -o "$PATCH" 2>"$WORKDIR/t-diff"
            DIFF_END=$(date +%s)
            DIFF_S=$((DIFF_END - TOTAL_START))
            DIFF_MEM=$(grep "Maximum resident" "$WORKDIR/t-diff" | awk '{print int($NF/1024)}')
            PATCH_KB=$(( $(stat -c%s "$PATCH" 2>/dev/null || echo 0) / 1024 ))
            # Show diff stderr for RSS debugging
            echo "=== $variant diff stderr ==="
            cat "$WORKDIR/t-diff"

            # Patch
            PATCH_START=$(date +%s)
            /usr/bin/time -v geocoder-patch "$OLD/$variant/" "$PATCH" -o "$VERIFY/" 2>"$WORKDIR/t-patch"
            PATCH_END=$(date +%s)
            PATCH_S=$((PATCH_END - PATCH_START))
            PATCH_MEM=$(grep "Maximum resident" "$WORKDIR/t-patch" | awk '{print int($NF/1024)}')

            # Verify
            MATCH=0
            for f in "$NEW/$variant/"*.bin; do
              b=$(basename "$f")
              cmp -s "$VERIFY/$b" "$NEW/$variant/$b" && MATCH=$((MATCH + 1))
            done

            TOTAL_END=$(date +%s)
            TOTAL_S=$((TOTAL_END - TOTAL_START))

            STATUS="$MATCH/$N_NEW"
            [ "$MATCH" -ne "$N_NEW" ] && STATUS="FAIL:$MATCH/$N_NEW"

            echo "$variant: diff=${DIFF_S}s(${DIFF_MEM}MB) patch=${PATCH_S}s(${PATCH_MEM}MB) total=${TOTAL_S}s ${STATUS}"
            echo "| $variant | $N_NEW | $DIFF_S | $DIFF_MEM | $PATCH_KB | $PATCH_S | $PATCH_MEM | $STATUS | $TOTAL_S |" >> "$GITHUB_STEP_SUMMARY"

            rm -f "$PATCH"
            rm -rf "$VERIFY"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
