name: Geocoder Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      build_date:
        description: 'Build date (YYYY-MM-DD). Leave empty for today.'
        required: false
        type: string
      max_attempts:
        description: 'Max retry attempts'
        required: false
        type: number
        default: 3

permissions:
  contents: read
  actions: write    # needed to trigger workflows + read run status

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # just under 6h GitHub-hosted limit
    steps:
      - name: Trigger and monitor build
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_DATE: ${{ inputs.build_date || '' }}
          MAX_ATTEMPTS: ${{ inputs.max_attempts || 3 }}
        run: |
          REPO="${GITHUB_REPOSITORY}"
          WORKFLOW="geocoder-build.yml"
          REF="${GITHUB_REF_NAME}"
          ATTEMPT=0
          SUCCESS=false
          JOB_START=$(date +%s)
          TIMEOUT_SECONDS=$((340 * 60))  # 340 min — leave 10 min buffer before 350 min job timeout
          RUN_ID=""

          # Build the dispatch args
          ARGS=""
          [ -n "$BUILD_DATE" ] && ARGS="-f build_date=$BUILD_DATE"

          check_timeout() {
            ELAPSED=$(( $(date +%s) - JOB_START ))
            REMAINING=$(( TIMEOUT_SECONDS - ELAPSED ))
            if [ $REMAINING -lt 300 ]; then  # less than 5 min remaining
              echo ""
              echo "::error::Orchestrator timeout imminent (${ELAPSED}s elapsed, ${REMAINING}s remaining)"
              echo "::error::Nightly build did not complete after $ATTEMPT attempts"
              [ -n "$RUN_ID" ] && echo "::error::Last run: https://github.com/$REPO/actions/runs/$RUN_ID"
              echo ""
              echo "## Nightly Build Timeout" >> "$GITHUB_STEP_SUMMARY"
              echo "Build did not complete after $ATTEMPT attempt(s)." >> "$GITHUB_STEP_SUMMARY"
              echo "Orchestrator ran for $((ELAPSED / 60)) minutes before timing out." >> "$GITHUB_STEP_SUMMARY"
              [ -n "$RUN_ID" ] && echo "Last run: https://github.com/$REPO/actions/runs/$RUN_ID" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
          }

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            check_timeout
            ATTEMPT=$((ATTEMPT + 1))
            echo ""
            echo "════════════════════════════════════════════════"
            echo "  Attempt $ATTEMPT/$MAX_ATTEMPTS ($(( ($(date +%s) - JOB_START) / 60 ))min elapsed)"
            echo "════════════════════════════════════════════════"

            # Trigger the build workflow
            echo "Triggering build workflow..."
            BEFORE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            gh workflow run "$WORKFLOW" --repo "$REPO" --ref "$REF" $ARGS
            sleep 10

            # Find the run that was just triggered
            RUN_ID=$(gh run list --repo "$REPO" --workflow "$WORKFLOW" \
              --json databaseId,createdAt,event \
              --jq "[.[] | select(.event == \"workflow_dispatch\" and .createdAt >= \"$BEFORE\")] | sort_by(.createdAt) | last | .databaseId")

            if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
              echo "::warning::Could not find triggered run, retrying in 30s..."
              sleep 30
              RUN_ID=$(gh run list --repo "$REPO" --workflow "$WORKFLOW" \
                --json databaseId,createdAt,event \
                --jq "[.[] | select(.event == \"workflow_dispatch\" and .createdAt >= \"$BEFORE\")] | sort_by(.createdAt) | last | .databaseId")
            fi

            echo "Run ID: $RUN_ID"
            echo "https://github.com/$REPO/actions/runs/$RUN_ID"

            # Poll until complete or timeout
            while true; do
              sleep 60
              check_timeout

              STATUS=$(gh run view "$RUN_ID" --repo "$REPO" --json status,conclusion \
                --jq '"\(.status) \(.conclusion)"')
              STAT=$(echo "$STATUS" | awk '{print $1}')
              CONC=$(echo "$STATUS" | awk '{print $2}')

              ELAPSED=$(( ($(date +%s) - JOB_START) / 60 ))
              if [ "$STAT" = "completed" ]; then
                echo "  Run completed: $CONC (${ELAPSED}min elapsed)"
                break
              fi
              echo "  $(date -u +%H:%M:%S) status=$STAT (${ELAPSED}min elapsed)"
            done

            if [ "$CONC" = "success" ]; then
              SUCCESS=true
              echo ""
              echo "Build succeeded on attempt $ATTEMPT"
              break
            fi

            FAILED_STEP=$(gh run view "$RUN_ID" --repo "$REPO" --json jobs \
              --jq '.jobs[0].steps[] | select(.conclusion != "success" and .conclusion != "skipped" and .conclusion != "") | .name' | head -1)
            echo "Failed step: ${FAILED_STEP:-unknown}"

            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              echo "Retrying immediately..."
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$SUCCESS" = "true" ]; then
            echo "## Nightly Build Success" >> "$GITHUB_STEP_SUMMARY"
            echo "Completed on attempt $ATTEMPT/$MAX_ATTEMPTS." >> "$GITHUB_STEP_SUMMARY"
            echo "Run: https://github.com/$REPO/actions/runs/$RUN_ID" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Nightly Build Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "Failed after $MAX_ATTEMPTS attempts." >> "$GITHUB_STEP_SUMMARY"
            echo "Last run: https://github.com/$REPO/actions/runs/$RUN_ID" >> "$GITHUB_STEP_SUMMARY"
            echo ""
            echo "::error::Nightly build failed after $MAX_ATTEMPTS attempts. Last run: https://github.com/$REPO/actions/runs/$RUN_ID"
            exit 1
          fi
